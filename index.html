      <textarea class="sn-ta" id="sn_log_inp" placeholder="Add log entry..." rows="2"></textarea>
      <button class="sn-save-btn" id="sn_log_add" style="background:var(--green)">+ Add Entry</button>
      <div style="margin-top:.75rem" id="sn_log_list"></div>
    </div>
  </div>`;

  // Populate WhatsApp preview
  const waPreview = document.getElementById('sn_wa_preview');
  if (waPreview) waPreview.value = buildWhatsAppSummary();

  document.getElementById('sn_wa_refresh').onclick=()=>{
    const p=document.getElementById('sn_wa_preview');
    if(p){ p.value=buildWhatsAppSummary(); toast('↺ Refreshed', 1200); }
  };
  document.getElementById('sn_wa_copy').onclick=()=>{
    const text=buildWhatsAppSummary();
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(()=>toast('✅ Copied to clipboard!', 2000)).catch(()=>fallbackCopy(text));
    } else { fallbackCopy(text); }
  };
  function fallbackCopy(text){
    const ta=document.createElement('textarea');
    ta.value=text; ta.style.cssText='position:fixed;opacity:0;top:0;left:0';
    document.body.appendChild(ta); ta.select();
    try{ document.execCommand('copy'); toast('✅ Copied!', 2000); }
    catch(e){ toast('⚠️ Copy failed — select text manually', 3000); }
    document.body.removeChild(ta);
  }

  document.getElementById('sn_oncall_save').onclick=()=>{
    const sn2=getShiftNotes(); sn2.onCallName=document.getElementById('sn_oncall').value.trim();
    saveShiftNotes(sn2); toast('✅ Saved', 1600);
    const p=document.getElementById('sn_wa_preview'); if(p) p.value=buildWhatsAppSummary();
  };
  document.getElementById('sn_summary_save').onclick=()=>{
    const sn2=getShiftNotes(); sn2.summary=document.getElementById('sn_summary').value.trim();
    saveShiftNotes(sn2); toast('✅ Summary saved', 1600);
    const p=document.getElementById('sn_wa_preview'); if(p) p.value=buildWhatsAppSummary();
  };
  document.getElementById('sn_log_add').onclick=()=>{
    const text=document.getElementById('sn_log_inp').value.trim(); if(!text) return;
    const sn2=getShiftNotes(); if(!sn2.log) sn2.log=[];
    sn2.log.unshift({text,by:currentUser,ts:new Date().toISOString()});
    saveShiftNotes(sn2); renderShiftLog(sn2.log);
    document.getElementById('sn_log_inp').value='';
    toast('✅ Added', 1600);
    const p=document.getElementById('sn_wa_preview'); if(p) p.value=buildWhatsAppSummary();
  };
  renderShiftLog(sn.log||[]);
}
function renderShiftLog(log){
  const el=document.getElementById('sn_log_list'); if(!el) return;
  el.innerHTML='';
  log.forEach((e,i)=>{
    const div=document.createElement('div'); div.className='sn-log-item';
    div.innerHTML=`<div class="sn-log-meta"><span>${esc(e.by||'—')}</span><span>${timeAgo(e.ts)}</span>
      <button class="sn-log-del" onclick="deleteShiftLog(${i})">✕</button></div>
      <div class="sn-log-text">${esc(e.text)}</div>`;
    el.appendChild(div);
  });
}
window.deleteShiftLog=function(i){
  const sn=getShiftNotes(); if(!sn.log||i<0||i>=sn.log.length) return;
  sn.log.splice(i,1); saveShiftNotes(sn); renderShiftLog(sn.log);
};

const LINK_ICONS={'Guidelines':'📋','Calculator':'🧮','Anatomy':'🫀','Reference':'📖','General':'🌐','Other':'🔗','Medical':'🏥','Social':'💬'};

function getLinkIcon(l){
  const site=SOCIAL_SITES.find(s=>l.socialType===s.name||(l.url&&l.url.includes(s.url.split('/')[0])));
  if(site) return site.icon;
  return LINK_ICONS[l.cat]||'🔗';
}

function renderLinks(list){
  list.innerHTML='';
  const links=getLinks();

  // ── ADD FORM ──
  const form=document.createElement('div'); form.className='link-add-bar';
  form.innerHTML=`<div class="link-add-title">➕ Add New Link</div>
    <input class="finp" id="lnk_title" placeholder="Title" style="height:34px">
    <input class="finp" id="lnk_url" placeholder="URL or paste link" style="height:34px">
    <div style="font-family:var(--mono);font-size:.58rem;color:var(--text-muted);margin-bottom:3px">Quick — Social Sites</div>
    <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px" id="lnk_social_btns">
      ${SOCIAL_SITES.map(s=>`<button type="button" class="toggle-btn" style="display:flex;align-items:center;gap:4px;font-size:.68rem;height:28px;padding:0 8px" data-sname="${s.name}" data-surl="${s.url}" data-scat="${s.cat}">${typeof s.icon==='string'&&s.icon.startsWith('<')?s.icon:s.icon} ${s.name}</button>`).join('')}
    </div>
    <div style="font-family:var(--mono);font-size:.58rem;color:var(--text-muted);margin-bottom:3px">Category</div>
    <div style="display:flex;gap:5px;flex-wrap:wrap" id="lnk_cat_group">
      ${['General','Guidelines','Calculator','Anatomy','Reference','Medical','Social','Other'].map(c=>`<button type="button" class="toggle-btn" data-cat="${c}">${c}</button>`).join('')}
    </div>
    <button class="submit-btn" id="lnk_add" style="height:38px;font-size:.82rem">🔗 Add Link</button>`;
  list.appendChild(form);

  document.getElementById('lnk_social_btns').addEventListener('click',e=>{
    const b=e.target.closest('.toggle-btn'); if(!b) return;
    document.querySelectorAll('#lnk_social_btns .toggle-btn').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    const urlEl=document.getElementById('lnk_url');
    const titleEl=document.getElementById('lnk_title');
    if(urlEl&&!urlEl.value) urlEl.value='https://'+b.dataset.surl;
    if(titleEl&&!titleEl.value) titleEl.value=b.dataset.sname;
    // auto-select social category
    document.querySelectorAll('#lnk_cat_group .toggle-btn').forEach(x=>x.classList.toggle('on',x.dataset.cat===b.dataset.scat));
  });
  document.getElementById('lnk_cat_group').addEventListener('click',e=>{
    const b=e.target.closest('.toggle-btn'); if(!b) return;
    document.querySelectorAll('#lnk_cat_group .toggle-btn').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
  });
  document.getElementById('lnk_add').onclick=()=>{
    const title=(document.getElementById('lnk_title').value||'').trim();
    const url=(document.getElementById('lnk_url').value||'').trim();
    if(!title||!url){toast('⚠️ Title and URL required',1800);return;}
    const cat=document.querySelector('#lnk_cat_group .toggle-btn.on')?.dataset.cat||'General';
    const socialBtn=document.querySelector('#lnk_social_btns .toggle-btn.on');
    const socialType=socialBtn?.dataset.sname||'';
    const lArr=getLinks();
    lArr.unshift({id:'lnk_'+Date.now(),title,url,cat,socialType,addedBy:currentUser,addedAt:new Date().toISOString()});
    saveLinks(lArr); updateCounts(); renderLinks(list);
    toast('🔗 Link added',1600);
  };

  if(!links.length){
    const emp=document.createElement('div'); emp.className='empty';
    emp.innerHTML=`<div class="empty-icon">🔗</div><div class="empty-title">No links yet</div><div class="empty-sub">Add useful links above</div>`;
    list.appendChild(emp); return;
  }

  // Group by category
  const cats={};
  links.forEach(l=>{ const cat=l.cat||'General'; if(!cats[cat]) cats[cat]=[]; cats[cat].push(l); });
  Object.entries(cats).forEach(([cat,items])=>{
    const hdr=document.createElement('div');
    hdr.style.cssText='font-family:var(--mono);font-size:.6rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.1em;padding:.35rem 0 .4rem;margin-top:.3rem';
    hdr.textContent=cat; list.appendChild(hdr);
    items.forEach(l=>{
      const card=document.createElement('div'); card.className='link-card';
      const iconHtml=getLinkIcon(l);
      const iconIsHtml=typeof iconHtml==='string'&&iconHtml.startsWith('<');
      card.innerHTML=`
        <div class="link-icon" style="overflow:visible">${iconIsHtml?iconHtml:iconHtml}</div>
        <div style="flex:1;min-width:0">
          <div class="link-title" id="ltitle_${l.id}">${esc(l.title)}</div>
          <div class="link-url" id="lurl_${l.id}">${esc(l.url)}</div>
          ${l.addedBy?`<div style="font-family:var(--mono);font-size:.55rem;color:var(--text-muted);margin-top:2px">by ${esc(l.addedBy)}</div>`:''}
        </div>
        <div style="display:flex;flex-direction:column;gap:4px;flex-shrink:0">
          <button class="link-del-btn" title="Edit" data-action="edit" data-lid="${esc(l.id)}" style="color:var(--blue)">✎</button>
          <button class="link-del-btn" title="Delete" data-action="del" data-lid="${esc(l.id)}">🗑</button>
        </div>`;
      // open on click — NOT if editing, NOT on buttons, NOT on inputs
      card.addEventListener('click',e=>{
        if(e.target.closest('.link-del-btn')) return;
        if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
        // If card is currently in edit mode (has inputs), don't open link
        if(card.querySelector('input')) return;
        let href=l.url; if(!/^https?:\/\//i.test(href)) href='https://'+href;
        window.open(href,'_blank','noopener');
      });
      card.querySelectorAll('.link-del-btn').forEach(btn=>{
        btn.onclick=e=>{ e.stopPropagation();
          if(btn.dataset.action==='del'){
            if(!confirm('Remove this link?')) return;
            const arr=getLinks().filter(x=>x.id!==l.id); saveLinks(arr); updateCounts(); renderLinks(list); toast('🗑 Removed',1600);
          } else {
            // inline edit
            const titleEl=document.getElementById('ltitle_'+l.id);
            const urlEl=document.getElementById('lurl_'+l.id);
            if(btn.textContent==='✎'){
              // turn into inputs — stop click propagation on inputs explicitly
              const tVal=titleEl.textContent;
              const uVal=urlEl.textContent;
              titleEl.innerHTML=`<input class="finp" style="height:28px;font-size:.8rem;width:100%" value="${esc(tVal)}">`;
              urlEl.innerHTML=`<input class="finp" style="height:26px;font-size:.72rem;width:100%" value="${esc(uVal)}">`;
              // Prevent any click inside inputs from bubbling to card
              titleEl.querySelector('input').addEventListener('click',ev=>ev.stopPropagation());
              titleEl.querySelector('input').addEventListener('mousedown',ev=>ev.stopPropagation());
              urlEl.querySelector('input').addEventListener('click',ev=>ev.stopPropagation());
              urlEl.querySelector('input').addEventListener('mousedown',ev=>ev.stopPropagation());
              btn.textContent='💾';
              // Focus title input
              titleEl.querySelector('input').focus();
              titleEl.querySelector('input').select();
            } else {
              const newTitle=titleEl.querySelector('input')?.value.trim()||l.title;
              const newUrl=urlEl.querySelector('input')?.value.trim()||l.url;
              const arr=getLinks(); const idx=arr.findIndex(x=>x.id===l.id);
              if(idx>=0){arr[idx].title=newTitle;arr[idx].url=newUrl;saveLinks(arr);}
              renderLinks(list); toast('✅ Updated',1400);
            }
          }
        };
      });
      list.appendChild(card);
    });
  });
}

function renderArticles(list){
  list.innerHTML='';
  const articles=getArticles();

  // Add form
  const form=document.createElement('div'); form.className='article-add-form';
  form.innerHTML=`<div style="font-family:var(--mono);font-size:.6rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em">📰 Add Article / Note</div>
    <input class="finp" id="art_title" placeholder="Title" style="height:34px">
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin:-2px 0" id="art_tag_group">
      ${['Technique','Protocol','Evidence','Case Report','Anatomy','Tip','Other'].map(t=>`<button type="button" class="toggle-btn" data-tag="${t}">${t}</button>`).join('')}
    </div>
    <textarea class="ftextarea" id="art_body" placeholder="Article content, notes, key points..." rows="3"></textarea>
    <input class="finp" id="art_ref" placeholder="Reference / DOI (optional)" style="height:32px;font-size:.78rem">
    <button class="submit-btn" id="art_add" style="height:38px;font-size:.82rem">📌 Save Article</button>`;
  list.appendChild(form);
  document.getElementById('art_tag_group').addEventListener('click',e=>{
    const b=e.target.closest('.toggle-btn'); if(!b) return;
    document.querySelectorAll('#art_tag_group .toggle-btn').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
  });
  document.getElementById('art_add').onclick=()=>{
    const title=(document.getElementById('art_title').value||'').trim();
    const body=(document.getElementById('art_body').value||'').trim();
    if(!title){toast('⚠️ Title required',1800);return;}
    const tag=document.querySelector('#art_tag_group .toggle-btn.on')?.dataset.tag||'Other';
    const ref=(document.getElementById('art_ref').value||'').trim();
    const arr=getArticles();
    arr.unshift({id:'art_'+Date.now(),title,body,tag,ref,addedBy:currentUser,addedAt:new Date().toISOString()});
    saveArticles(arr); updateCounts(); renderArticles(list);
    toast('📰 Article saved',1800);
  };

  if(!articles.length){
    const emp=document.createElement('div'); emp.className='empty';
    emp.innerHTML=`<div class="empty-icon">📰</div><div class="empty-title">No articles yet</div><div class="empty-sub">Save key articles & protocols above</div>`;
    list.appendChild(emp); return;
  }

  articles.forEach((a,i)=>{
    const card=document.createElement('div'); card.className='article-card';
    const bodyId='artbody_'+i;
    card.innerHTML=`<span class="article-badge">${esc(a.tag||'Other')}</span>
      <div class="article-title">${esc(a.title)}</div>
      ${a.body?`<div class="article-expand" id="${bodyId}"><div class="article-body">${esc(a.body)}</div></div>
        <button style="background:none;border:none;color:var(--blue);font-family:var(--mono);font-size:.6rem;cursor:pointer;padding:4px 0;margin-top:2px" onclick="toggleArticleExpand('${bodyId}',this)">▾ Show more</button>`:''}
      <div class="article-meta">
        ${a.addedBy?`<span>📌 ${esc(a.addedBy)}</span>`:''}
        ${a.addedAt?`<span>${timeAgo(a.addedAt)}</span>`:''}
        ${a.ref?`<span style="color:var(--blue)">📄 ${esc(a.ref)}</span>`:''}
        <button style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:12px;margin-left:auto" onclick="deleteArticle('${a.id}')">🗑</button>
      </div>`;
    list.appendChild(card);
  });
}

window.toggleArticleExpand=function(id,btn){
  const el=document.getElementById(id); if(!el) return;
  el.classList.toggle('open');
  btn.textContent=el.classList.contains('open')?'▴ Show less':'▾ Show more';
};
window.deleteArticle=function(aid){
  if(!confirm('Delete this article?')) return;
  const arr=getArticles().filter(a=>a.id!==aid); saveArticles(arr); updateCounts();
  renderArticles(document.getElementById('casesList'));
  toast('🗑 Deleted',1600);
};

function renderTools(list){
  list.innerHTML='';
  const TOOL_GROUPS=[
    {label:'🔥 Burns',color:'var(--orange)',tools:[
      {id:'tbsa',title:'🔥 TBSA / Parkland',build:buildTBSA},
      {id:'fluid',title:'💧 Fluid Balance',build:buildFluid},
      {id:'baux',title:'📊 Baux Score / Mortality',build:buildBaux},
      {id:'burnwound',title:'🩹 Burn Wound Depth',build:buildBurnWound},
      {id:'burndress',title:'🧴 Dressing Protocol',build:buildBurnDressing},
    ]},
    {label:'✂️ Plastic Surgery',color:'var(--purple)',tools:[
      {id:'flap',title:'🗺️ Flap Selection Guide',build:buildFlapGuide},
      {id:'recon',title:'🔧 Reconstruction Ladder',build:buildReconLadder},
      {id:'skinarea',title:'📐 Skin Defect Area',build:buildSkinArea},
      {id:'expander',title:'🔵 Tissue Expander Vol.',build:buildExpander},
      {id:'aesthetic',title:'💉 Aesthetic Dose Calc.',build:buildAestheticDose},
      {id:'keloid',title:'🟤 Keloid Protocol',build:buildKeloidProtocol},
    ]},
    {label:'📊 General',color:'var(--blue)',tools:[
      {id:'news2',title:'📊 NEWS2 Score',build:buildNEWS2},
      {id:'bmi',title:'⚖️ BMI Calculator',build:buildBMI},
      {id:'drug',title:'💊 Drug Interactions',build:buildDrug},
    ]},
  ];
  TOOL_GROUPS.forEach(grp=>{
    const grpHdr=document.createElement('div');
    grpHdr.style.cssText=`font-family:var(--mono);font-size:.6rem;color:${grp.color};text-transform:uppercase;letter-spacing:.1em;padding:.5rem 0 .3rem;font-weight:700`;
    grpHdr.textContent=grp.label; list.appendChild(grpHdr);
    const grid=document.createElement('div'); grid.style.cssText='display:flex;flex-direction:column;gap:7px;margin-bottom:10px';
    grp.tools.forEach(t=>{
      const card=document.createElement('div'); card.className='tool-card';
      const hdr=document.createElement('div'); hdr.className='tool-card-hdr';
      hdr.innerHTML=`<span class="tool-card-title">${t.title}</span><span style="color:var(--text-muted);transition:transform .2s">▾</span>`;
      const body=document.createElement('div'); body.className='tool-card-body'; body.id='tb_'+t.id;
      t.build(body);
      hdr.addEventListener('click',()=>{ const open=body.classList.toggle('open'); hdr.querySelector('span:last-child').style.transform=open?'rotate(180deg)':''; });
      card.appendChild(hdr); card.appendChild(body); grid.appendChild(card);
    });
    list.appendChild(grid);
  });
}
function mkInp(p,type='text',id=''){return`<input class="tool-inp"${id?' id="'+id+'"':''} type="${type}" placeholder="${p}">`;}
function mkSel(id,opts){return`<select class="tool-sel" id="${id}">${opts.map(([v,l])=>`<option value="${v}">${l}</option>`).join('')}</select>`;}
function mkBtn(id,label){return`<button class="tool-run-btn" id="${id}">${label}</button>`;}
function mkRes(id){return`<div class="tool-result" id="${id}"></div>`;}
function showRes(id,html){const el=document.getElementById(id);if(el){el.innerHTML=html;el.classList.add('show');}}

function buildNEWS2(body){
  body.innerHTML=`<div class="two-col">${mkInp('HR','number','n_hr')}${mkInp('RR','number','n_rr')}</div>
  <div class="two-col">${mkInp('SpO2 %','number','n_spo2')}${mkInp('SBP','number','n_sbp')}</div>
  <div class="two-col">${mkInp('Temp °C','number','n_temp')}${mkSel('n_avpu',[['A','A — Alert'],['V','V — Voice'],['P','P — Pain'],['U','U — Unresponsive']])}</div>
  <label style="display:flex;align-items:center;gap:6px;font-size:.78rem;color:var(--text-dim)"><input type="checkbox" id="n_o2"> On supplemental O2</label>
  ${mkBtn('n_calc','Calculate NEWS2')}${mkRes('n_res')}`;
  body.querySelector('#n_calc').onclick=()=>{
    const hr=+body.querySelector('#n_hr').value||0,rr=+body.querySelector('#n_rr').value||0,spo2=+body.querySelector('#n_spo2').value||0,sbp=+body.querySelector('#n_sbp').value||0,temp=+body.querySelector('#n_temp').value||0,avpu=body.querySelector('#n_avpu').value,o2=body.querySelector('#n_o2').checked;
    if(!hr||!rr||!spo2||!sbp||!temp){showRes('n_res','<span style="color:var(--red)">Fill all fields</span>');return;}
    let s=0;
    if(hr<=40||hr>=131)s+=3;else if(hr<=50||hr>=111)s+=1;else if(hr>=91)s+=1;
    if(rr<=8||rr>=25)s+=3;else if(rr<=11)s+=1;else if(rr>=21)s+=2;
    if(spo2<=91)s+=3;else if(spo2<=93)s+=2;else if(spo2<=95)s+=1;
    if(sbp<=90||sbp>=220)s+=3;else if(sbp<=100)s+=2;else if(sbp<=110)s+=1;
    if(temp<=35||temp>=39.1)s+=2;else if(temp<=36)s+=1;else if(temp>=38.1)s+=1;
    if(avpu!=='A')s+=3; if(o2)s+=2;
    const risk=s<=4?{l:'LOW',c:'var(--green)'}:s<=6?{l:'MEDIUM',c:'var(--yellow)'}:{l:'HIGH',c:'var(--red)'};
    showRes('n_res',`<strong style="color:${risk.c}">NEWS2: ${s} — ${risk.l} RISK</strong><br><span style="font-size:.72rem;color:var(--text-muted)">HR:${hr} RR:${rr} SpO2:${spo2}% SBP:${sbp} T:${temp}°C ${avpu}${o2?' O2':''}</span>`);
  };
}
function buildTBSA(body){
  body.innerHTML=`<div class="two-col">${mkInp('Weight kg','number','t_wt')}${mkInp('Age','number','t_age')}</div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:5px" id="tbsa_grid"></div>
  <div style="font-family:var(--mono);font-size:.72rem;color:var(--blue);text-align:center;margin:4px 0">TBSA: <span id="tbsa_live">0</span>%</div>
  ${mkBtn('t_calc','Calculate Parkland')}${mkRes('t_res')}`;
  const REGIONS=[['Head',9],['Neck',1],['Chest',9],['Abdomen',9],['Upper Back',9],['Lower Back',9],['R Upper Arm',4],['L Upper Arm',4],['R Lower Arm',3],['L Lower Arm',3],['R Hand',2.5],['L Hand',2.5],['R Thigh',9],['L Thigh',9],['R Lower Leg',7],['L Lower Leg',7],['R Foot',3.5],['L Foot',3.5]];
  const grid=body.querySelector('#tbsa_grid'); const sel=new Set();
  REGIONS.forEach(([name,pct])=>{
    const btn=document.createElement('button'); btn.type='button';
    btn.style.cssText='height:30px;border-radius:7px;border:1.5px solid var(--border2);background:var(--surface2);color:var(--text-muted);font-size:.65rem;cursor:pointer;transition:all .15s';
    btn.textContent=name;
    btn.onclick=()=>{
      if(sel.has(name)){sel.delete(name);btn.style.background='var(--surface2)';btn.style.color='var(--text-muted)';btn.style.borderColor='var(--border2)';}
      else{sel.add(name);btn.style.background='var(--orange-glow)';btn.style.color='var(--orange)';btn.style.borderColor='rgba(247,136,79,.4)';}
      let total=0;sel.forEach(n=>{const r=REGIONS.find(r=>r[0]===n);if(r)total+=r[1];});
      body.querySelector('#tbsa_live').textContent=total;
    };
    grid.appendChild(btn);
  });
  body.querySelector('#t_calc').onclick=()=>{
    let total=0;sel.forEach(n=>{const r=REGIONS.find(r=>r[0]===n);if(r)total+=r[1];});
    if(!total){showRes('t_res','<span style="color:var(--red)">Select burned areas</span>');return;}
    const wt=+body.querySelector('#t_wt').value||0;
    let html=`<strong style="color:var(--orange)">TBSA: ${total}%</strong>`;
    if(wt){const park=4*wt*total;html+=`<br>Parkland: <strong>${park.toFixed(0)} ml</strong> RL in 24h<br>First 8h: <strong>${(park/2).toFixed(0)} ml</strong> (${(park/16).toFixed(0)} ml/hr)<br>Next 16h: <strong>${(park/2).toFixed(0)} ml</strong> (${(park/32).toFixed(0)} ml/hr)`;}
    showRes('t_res',html);
  };
}
function buildFluid(body){
  body.innerHTML=`<div style="font-family:var(--mono);font-size:.62rem;color:var(--text-muted);margin-bottom:4px">IN (ml)</div>
  <div class="three-col" style="margin-bottom:6px">${mkInp('IV','number','fl_iv')}${mkInp('Oral','number','fl_oral')}${mkInp('Blood','number','fl_blood')}</div>
  <div style="font-family:var(--mono);font-size:.62rem;color:var(--text-muted);margin-bottom:4px">OUT (ml)</div>
  <div class="three-col" style="margin-bottom:6px">${mkInp('Urine','number','fl_urine')}${mkInp('Drains','number','fl_drain')}${mkInp('Other','number','fl_other')}</div>
  ${mkBtn('fl_calc','Calculate Balance')}${mkRes('fl_res')}`;
  body.querySelector('#fl_calc').onclick=()=>{
    const iv=+body.querySelector('#fl_iv').value||0,oral=+body.querySelector('#fl_oral').value||0,blood=+body.querySelector('#fl_blood').value||0;
    const urine=+body.querySelector('#fl_urine').value||0,drain=+body.querySelector('#fl_drain').value||0,other=+body.querySelector('#fl_other').value||0;
    const inn=iv+oral+blood,out=urine+drain+other,bal=inn-out;
    const c=bal>500?'var(--yellow)':bal<-500?'var(--red)':'var(--green)';
    showRes('fl_res',`IN: <strong>${inn}</strong> ml &nbsp;|&nbsp; OUT: <strong>${out}</strong> ml<br><strong style="color:${c}">Balance: ${bal>=0?'+':''}${bal} ml</strong>`);
  };
}
function buildBaux(body){
  body.innerHTML=`<div style="font-size:.75rem;color:var(--text-muted);margin-bottom:4px">Baux Score = Age + TBSA% (Revised adds inhalation +17)</div>
  <div class="two-col">${mkInp('Age (years)','number','baux_age')}${mkInp('TBSA %','number','baux_tbsa')}</div>
  <label style="display:flex;align-items:center;gap:6px;font-size:.78rem;color:var(--text-dim)"><input type="checkbox" id="baux_inh"> Inhalation injury (+17)</label>
  ${mkBtn('baux_calc','Calculate')}${mkRes('baux_res')}`;
  body.querySelector('#baux_calc').onclick=()=>{
    const age=+body.querySelector('#baux_age').value||0,tbsa=+body.querySelector('#baux_tbsa').value||0,inh=body.querySelector('#baux_inh').checked;
    if(!age||!tbsa){showRes('baux_res','<span style="color:var(--red)">Enter age and TBSA</span>');return;}
    const baux=age+tbsa+(inh?17:0);
    const mort=baux>=140?'>90%':baux>=120?'~75%':baux>=100?'~50%':baux>=80?'~25%':baux>=60?'~10%':'<5%';
    const c=baux>=100?'var(--red)':baux>=80?'var(--yellow)':'var(--green)';
    showRes('baux_res',`<strong style="color:${c}">Revised Baux: ${baux}</strong><br>Predicted mortality: <strong>${mort}</strong><br><span style="font-size:.7rem;color:var(--text-muted)">Age ${age} + TBSA ${tbsa}%${inh?' + inhalation 17':''}</span>`);
  };
}
function buildBurnWound(body){
  body.innerHTML=`<div style="font-size:.75rem;color:var(--text-muted);margin-bottom:6px">Select wound characteristics to determine depth</div>
  <div style="font-family:var(--mono);font-size:.62rem;color:var(--text-muted);margin-bottom:3px">Appearance</div>
  <div id="bw_appear" style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px">${['Erythema only','Moist/blistered','Pale/waxy','Dry/leathery','Charred/black'].map(v=>`<button type="button" class="toggle-btn" data-v="${v}">${v}</button>`).join('')}</div>
  <div style="font-family:var(--mono);font-size:.62rem;color:var(--text-muted);margin-bottom:3px">Sensation</div>
  <div id="bw_sens" style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px">${['Painful','Reduced pain','Painless'].map(v=>`<button type="button" class="toggle-btn" data-v="${v}">${v}</button>`).join('')}</div>
  <div style="font-family:var(--mono);font-size:.62rem;color:var(--text-muted);margin-bottom:3px">Capillary refill</div>
  <div id="bw_cap" style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px">${['Brisk','Sluggish','Absent'].map(v=>`<button type="button" class="toggle-btn" data-v="${v}">${v}</button>`).join('')}</div>
  ${mkBtn('bw_calc','Assess Depth')}${mkRes('bw_res')}`;
  ['bw_appear','bw_sens','bw_cap'].forEach(gid=>{
    body.querySelector('#'+gid).addEventListener('click',e=>{const b=e.target.closest('.toggle-btn');if(!b)return;body.querySelectorAll('#'+gid+' .toggle-btn').forEach(x=>x.classList.remove('on'));b.classList.add('on');});
  });
  body.querySelector('#bw_calc').onclick=()=>{
    const appear=body.querySelector('#bw_appear .toggle-btn.on')?.dataset.v||'',sens=body.querySelector('#bw_sens .toggle-btn.on')?.dataset.v||'',cap=body.querySelector('#bw_cap .toggle-btn.on')?.dataset.v||'';
    let depth='',mgmt='',c='var(--text-muted)';
    if(appear==='Erythema only'){depth='Superficial (1st degree)';mgmt='Moisturizer, analgesia. Heals 3–5 days.';c='var(--yellow)';}
    else if(appear==='Moist/blistered'&&sens==='Painful'){depth='Superficial Partial Thickness';mgmt='Mepitel/Biobrane dressing. Heals 7–14 days.';c='var(--yellow)';}
    else if(appear==='Pale/waxy'||sens==='Reduced pain'){depth='Deep Partial Thickness';mgmt='Consider excision + SSG if not healed in 14–21 days.';c='var(--orange)';}
    else if(appear==='Dry/leathery'||sens==='Painless'||cap==='Absent'){depth='Full Thickness (3rd degree)';mgmt='Excision and grafting required. Escharotomy if circumferential.';c='var(--red)';}
    else if(appear==='Charred/black'){depth='Full Thickness / 4th degree';mgmt='Major surgery. ICU management. Amputation may be needed.';c='var(--red)';}
    else{showRes('bw_res','<span style="color:var(--text-muted)">Select all characteristics</span>');return;}
    showRes('bw_res',`<strong style="color:${c}">${depth}</strong><br><span style="font-size:.75rem">${mgmt}</span>`);
  };
}
function buildBurnDressing(body){
  const items=[['Superficial','SSD or Mepitel One. Change every 1–2 days.','var(--yellow)'],['Partial Thickness','Biobrane / Mepitel Ag / AWBAT. Leave 5–7 days. Monitor for infection.','var(--orange)'],['Full Thickness (pre-op)','Flamazine + absorbent. Plan excision + SSG within 48–72h.','var(--red)'],['Infected burn','Acticoat (nanocrystalline silver) or PHMB. Daily assessment.','var(--red)'],['Donor site (SSG)','Paraffin gauze + absorbent. Leave 10–14 days.','var(--blue)'],['Facial burn','Liquid paraffin + honey. Avoid tight occlusion. No SSD on face.','var(--purple)']];
  body.innerHTML=`<div style="font-size:.75rem;color:var(--text-muted);margin-bottom:6px">Tap burn type for dressing protocol</div>
  <div style="display:flex;flex-direction:column;gap:5px">${items.map(([t,m,c])=>`<div style="border-left:3px solid ${c};padding:.4rem .6rem;border-radius:0 8px 8px 0;background:var(--surface2);cursor:pointer" onclick="showRes('bd_res','<strong style=&quot;color:${c}&quot;>${t}</strong><br><span style=&quot;font-size:.75rem&quot;>${m}</span>')"><span style="font-family:var(--display);font-weight:700;font-size:.78rem;color:${c}">${t}</span></div>`).join('')}</div>
  ${mkRes('bd_res')}`;
}
function buildFlapGuide(body){
  const FLAP_DB={'Scalp':'Rotation/transposition • Galeal scoring • Tissue expansion • Free flap (LD/ALT)','Face/Cheek':'Cervicofacial rotation • Nasolabial • FAMM • Deltopectoral • Free ALT','Nose':'Paramedian forehead • Bilobed • Nasolabial • Composite ear graft','Lip':'Abbe–Estlander • Karapandzic • Gillies fan • Bernard-Burow','Ear':'Post-auricular • Bilobed • Temporoparietal fascia • Prosthesis','Neck':'Platysma • Deltopectoral • Pectoralis major • Supraclavicular','Chest/Breast':'TRAM • DIEP • LD • TAP • TUG • Pectoralis major advancement','Abdomen':'Advancement • Component separation • VRAM • Free flap','Upper Limb':'Radial forearm (pedicled/free) • Post. interosseous • Groin • Free ALT','Hand':'Thenar • Cross-finger • Homodigital island • Groin • Free toe transfer','Lower Limb':'Prox 1/3: gastrocnemius • Mid 1/3: soleus • Distal: fasciocutaneous/free flap','Foot/Heel':'Sural (reverse) • Dorsalis pedis • Free flap (gracilis/ALT) • Instep island'};
  body.innerHTML=`<div id="flap_loc" style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px">${Object.keys(FLAP_DB).map(v=>`<button type="button" class="toggle-btn" data-v="${v}">${v}</button>`).join('')}</div>${mkBtn('flap_calc','Show Flap Options')}${mkRes('flap_res')}`;
  body.querySelector('#flap_loc').addEventListener('click',e=>{const b=e.target.closest('.toggle-btn');if(!b)return;body.querySelectorAll('#flap_loc .toggle-btn').forEach(x=>x.classList.remove('on'));b.classList.add('on');});
  body.querySelector('#flap_calc').onclick=()=>{const loc=body.querySelector('#flap_loc .toggle-btn.on')?.dataset.v;if(!loc){showRes('flap_res','<span style="color:var(--text-muted)">Select a location</span>');return;}showRes('flap_res',`<strong style="color:var(--purple)">${loc}</strong><br><span style="font-size:.75rem;line-height:1.7">${FLAP_DB[loc]}</span>`);};
}
function buildReconLadder(body){
  body.innerHTML=`<div style="font-size:.75rem;color:var(--text-muted);margin-bottom:8px">From simplest to most complex</div>${[['1️⃣ Primary Closure','Direct closure, no tension. Small clean defects.','var(--green)'],['2️⃣ Secondary Intention','Allow granulation. Contaminated or concave wounds.','var(--green)'],['3️⃣ Skin Graft (SSG/FSG)','SSG for large areas; FSG for cosmetic areas. Needs vascularized bed.','var(--blue)'],['4️⃣ Local Flap','Rotation, advancement, transposition. Good colour match.','var(--yellow)'],['5️⃣ Regional Flap','Pedicled from adjacent region. e.g. LD, pectoralis.','var(--orange)'],['6️⃣ Free Flap','Microvascular. Maximum versatility. e.g. ALT, DIEP, gracilis.','var(--red)']].map(([t,m,c])=>`<div style="border-left:3px solid ${c};padding:.4rem .6rem;margin-bottom:5px;border-radius:0 8px 8px 0;background:var(--surface2)"><div style="font-family:var(--display);font-weight:700;font-size:.78rem;color:${c}">${t}</div><div style="font-size:.72rem;color:var(--text-muted);margin-top:1px">${m}</div></div>`).join('')}`;
}
function buildSkinArea(body){
  body.innerHTML=`<div class="two-col">${mkInp('Length (cm)','number','sa_l')}${mkInp('Width (cm)','number','sa_w')}</div>
  <div id="sa_shape" style="display:flex;gap:5px;margin-bottom:6px">${['Ellipse','Rectangle','Circle','Irregular (×0.8)'].map(v=>`<button type="button" class="toggle-btn" data-v="${v}">${v}</button>`).join('')}</div>
  ${mkBtn('sa_calc','Calculate')}${mkRes('sa_res')}`;
  body.querySelector('#sa_shape').addEventListener('click',e=>{const b=e.target.closest('.toggle-btn');if(!b)return;body.querySelectorAll('#sa_shape .toggle-btn').forEach(x=>x.classList.remove('on'));b.classList.add('on');});
  body.querySelector('#sa_calc').onclick=()=>{
    const l=+body.querySelector('#sa_l').value||0,w=+body.querySelector('#sa_w').value||0;
    const shape=body.querySelector('#sa_shape .toggle-btn.on')?.dataset.v||'Rectangle';
    if(!l||!w){showRes('sa_res','<span style="color:var(--red)">Enter dimensions</span>');return;}
    let area=shape==='Ellipse'?Math.PI*(l/2)*(w/2):shape==='Circle'?Math.PI*(l/2)*(l/2):shape==='Irregular (×0.8)'?l*w*0.8:l*w;
    showRes('sa_res',`<strong>Defect: ${area.toFixed(1)} cm²</strong><br>Donor site: ~${(area*1.1).toFixed(1)} cm²<br><span style="font-size:.7rem;color:var(--text-muted)">${shape} ${l}×${w} cm</span>`);
  };
}
function buildExpander(body){
  body.innerHTML=`<div class="two-col">${mkInp('Defect width (cm)','number','exp_dw')}${mkInp('Defect length (cm)','number','exp_dl')}</div>${mkInp('Expander base width (cm)','number','exp_bw')}${mkBtn('exp_calc','Calculate')}${mkRes('exp_res')}`;
  body.querySelector('#exp_calc').onclick=()=>{
    const dw=+body.querySelector('#exp_dw').value||0,dl=+body.querySelector('#exp_dl').value||0,bw=+body.querySelector('#exp_bw').value||0;
    if(!dw||!dl){showRes('exp_res','<span style="color:var(--red)">Enter dimensions</span>');return;}
    const vol=bw?Math.PI*(bw/2)*(bw/2)*(dw/2):dw*dl*1.5;
    showRes('exp_res',`<strong>Expansion needed: ${dw.toFixed(1)} cm</strong><br>Volume: ~${vol.toFixed(0)} ml<br><span style="font-size:.7rem;color:var(--text-muted)">Defect: ${dw}×${dl} cm²</span>`);
  };
}
function buildAestheticDose(body){
  const AES={'Glabella':'20–40 U total (5 points, 4–8 U each). Inject >1cm above orbital rim. Avoid ptosis.','Forehead':'10–20 U (4–6 points). Keep low to avoid brow ptosis. Inject >2cm above brow.','Crow\'s feet':'10–15 U per side (3 points, ~3–4 U each). Inject laterally.','Bunny lines':'5–10 U per side into nasalis.','Brow lift':'2–4 U lateral orbicularis just below brow tail.','Lip flip':'4–6 U orbicularis at Cupid\'s bow and corners (1–2 U per point).','Masseters':'25–50 U per side into masseter bulk. Repeat every 4–6 months.','Neck bands':'20–40 U total into platysmal bands. Avoid dysphagia.','Hyperhidrosis':'50–100 U per axilla. Intradermal injections 1.5 cm apart after Minor\'s test.'};
  body.innerHTML=`<div id="aes_region" style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px">${Object.keys(AES).map(v=>`<button type="button" class="toggle-btn" data-v="${v}">${v}</button>`).join('')}</div>${mkBtn('aes_calc','Show Dosing')}${mkRes('aes_res')}`;
  body.querySelector('#aes_region').addEventListener('click',e=>{const b=e.target.closest('.toggle-btn');if(!b)return;body.querySelectorAll('#aes_region .toggle-btn').forEach(x=>x.classList.remove('on'));b.classList.add('on');});
  body.querySelector('#aes_calc').onclick=()=>{const reg=body.querySelector('#aes_region .toggle-btn.on')?.dataset.v;if(!reg){showRes('aes_res','<span style="color:var(--text-muted)">Select a region</span>');return;}showRes('aes_res',`<strong style="color:var(--purple)">${reg}</strong><br><span style="font-size:.75rem;line-height:1.6">${AES[reg]}</span>`);};

function buildKeloidProtocol(body){

function sendComment(){
  const text=document.getElementById('commentInp').value.trim(); if(!text||!_commentCaseId) return;
  const cases=getCases();
  let found=null;
  Object.keys(cases).forEach(tabId=>{ const idx=(cases[tabId]||[]).findIndex(c=>c&&c._id===_commentCaseId); if(idx>=0) found={tabId,idx}; });
  if (!found) return;
  if (!cases[found.tabId][found.idx].comments) cases[found.tabId][found.idx].comments=[];
  cases[found.tabId][found.idx].comments.unshift({text,author:currentUser,authorDevId:currentDevId,timestamp:new Date().toISOString(),id:'cm_'+Date.now()});
  saveCases(cases);
  document.getElementById('commentInp').value='';
  renderComments(_commentCaseId);
  renderList();
}
window.deleteComment=function(caseId,cmId){
  if(!confirm('Delete comment?')) return;
  const cases=getCases();
  Object.keys(cases).forEach(tabId=>{
    const c=(cases[tabId]||[]).find(x=>x&&x._id===caseId);
    if(c&&c.comments){
      // Delete by id if available, fallback to index for old comments without id
      const idx=isNaN(cmId)
        ? c.comments.findIndex(cm=>cm.id===cmId)
        : parseInt(cmId);
      if(idx>=0 && idx<c.comments.length) c.comments.splice(idx,1);
    }
  });
  saveCases(cases); renderComments(caseId); renderList();
};

function pushNotif(title,body,tag){

  try{const n=new Notification(title,{body,tag:tag||'psx',icon:'./icon-192.png',renotify:true});n.onclick=()=>{window.focus();n.close()};setTimeout(()=>n.close(),7000);}catch(e){}

function diffCases(old, nw){
  if (!old||!nw) return;
  const followed=getFollowed();
  Object.keys(nw).forEach(tabId=>{
    const oldArr=(old[tabId]||[]),newArr=(nw[tabId]||[]);
    const oldMap={}; oldArr.forEach(c=>{if(c&&c._id) oldMap[c._id]=c;});
    newArr.forEach(c=>{
      if(!c||!c._id||!c.patientName) return;
      if(c.addedByDevId===currentDevId||c.editedByDevId===currentDevId) return;
      if(!oldMap[c._id]){
        const ts=c.addedAt?new Date(c.addedAt).getTime():0;
        if(ts<_notifBootTs-5000) return;
        const by=c.addedBy||'Someone';
        pushNotif('🆕 New case',by+' added '+c.patientName+' → '+getTabLabel(tabId),'new-'+c._id);
        storeNotif({type:'new_case',read:false,title:'New case',message:by+' added '+c.patientName+' ('+getTabLabel(tabId)+')',timestamp:new Date().toISOString()});
        return;
      }
      if(!followed.includes(c._id)) return;
      const old2=oldMap[c._id]; if(!c.editedAt||c.editedAt===old2.editedAt) return;
      const changes=[];
      if(c.status!==old2.status) changes.push('Status: '+old2.status+' → '+c.status);
      if(c.plan!==old2.plan) changes.push('Plan updated');
      if(!changes.length) return;
      pushNotif('✏️ Case updated',(c.editedBy||'?')+' edited '+c.patientName+' — '+changes[0],'edit-'+c._id);
      storeNotif({type:'case_edited',read:false,title:'Case updated',message:(c.editedBy||'?')+' edited '+c.patientName,details:changes.join(', '),timestamp:new Date().toISOString()});
    });
  });
}

function hash(s){ let h=0; for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;} return Math.abs(h).toString(36); }

function showPasswordView(devId,name){
  const box=document.getElementById('wsBox');
  box.innerHTML=`<button class="ws-back" id="ws_back">← Back</button>
  <div style="text-align:center;margin-bottom:1rem">
    <div class="ws-avatar" style="margin:0 auto .5rem;background:var(--blue);font-size:1.3rem">${name.charAt(0).toUpperCase()}</div>
    <div style="font-family:var(--display);font-weight:700;font-size:1rem">${esc(name)}</div>
  </div>
  <input class="finp" id="ws_pass" type="password" placeholder="Password" autocomplete="current-password">
  <div class="ws-error" id="ws_err"></div>
  <button class="submit-btn" id="ws_submit">Login →</button>`;
  document.getElementById('ws_back').onclick=()=>renderWelcome();
  const doLogin=()=>{
    const pass=document.getElementById('ws_pass').value.trim();
    if(!pass){document.getElementById('ws_err').textContent='Enter password';return;}
    const users=getUsers(); const u=users[devId];
    if(!u){document.getElementById('ws_err').textContent='User not found';return;}
    const h=hash(u.name.toLowerCase()+pass);
    if(u.password&&u.password!==h){document.getElementById('ws_err').textContent='❌ Wrong password';document.getElementById('ws_pass').value='';return;}
    if(!u.password) u.password=h;
    const now=new Date().toISOString();
    u.lastSeen=now;
    // Patch only this user's record in local cache
    users[devId]=u; _toCache('psx_users',users);
    // Safe remote patch: read fresh → merge → write (avoids overwriting other users)
    // Firebase: patch only this user's node (lastSeen + password if new)
    _fbPatchUser(devId, u)
      .catch(e=>console.warn('[FB] Login patch error',e));
    localStorage.setItem('psx_device_id',devId); currentDevId=devId;
    loginSuccess(u.name);

  updateChatUnreadBadge();
  reqNotifPermission(); updateNotifBadge();
  logActivity('Logged in','','🔓');
  toast('Welcome, '+name+'! 👋', 2500);
  // Force fresh fetch from Firebase so latest data appears right after login
  db.ref('psx_data/psx_cases').once('value').then(snap => {
    const val = _parseVal('psx_cases', snap.val());
    if (_prevCasesSnap) {
      try { diffCases(JSON.parse(_prevCasesSnap), val); } catch(e) {}

// ── Enhanced Lightbox with navigation + Before/After slider ──
(function(){
  let _imgs=[], _idx=0, _baMode=false;

  function closeLB(){
    document.getElementById('lightbox').classList.remove('open');
    _imgs=[]; _idx=0; _baMode=false;
  }

  function renderLB(){
    const img=document.getElementById('lightboxImg');
    const baDiv=document.getElementById('lightboxBA');
    const nav=document.getElementById('lightboxNav');
    const counter=document.getElementById('lightboxCounter');
    const baBtn=document.getElementById('lightboxBABtn');

    // update counter
    counter.textContent=(_imgs.length>1)?(_idx+1)+' / '+_imgs.length:'';
    nav.style.display=_imgs.length>0?'flex':'none';

    // show before/after btn only if case has tagged before+after photos
    const beforePhotos=_imgs.filter(i=>i.tag==='before');
    const afterPhotos=_imgs.filter(i=>i.tag==='after');
    const canBA=beforePhotos.length>0&&afterPhotos.length>0;
    baBtn.style.display=canBA?'':'none';
    baBtn.classList.toggle('active',_baMode);

    if(_baMode&&canBA){
      img.style.display='none';
      baDiv.style.display='block';
      buildBASlider(baDiv, beforePhotos[0].src, afterPhotos[afterPhotos.length-1].src);
    } else {
      baDiv.style.display='none';
      img.style.display='block';
      img.src=_imgs[_idx]?_imgs[_idx].src:'';
    }
  }

  function buildBASlider(container, beforeSrc, afterSrc){
    container.innerHTML='';
    const wrap=document.createElement('div');
    wrap.className='ba-slider-wrap';
    let pct=50;
    wrap.innerHTML=`
      <img src="${beforeSrc}" alt="Before" draggable="false">
      <div class="ba-after-clip" id="baAfterClip" style="clip-path:inset(0 0 0 ${pct}%)">
        <img src="${afterSrc}" alt="After" draggable="false">
      </div>
      <div class="ba-divider" id="baDivider" style="left:${pct}%">
        <div class="ba-handle">⇔</div>
      </div>
      <div class="ba-label before">Before</div>
      <div class="ba-label after">After</div>`;
    container.appendChild(wrap);

    function setPos(x){
      const rect=wrap.getBoundingClientRect();
      pct=Math.max(2,Math.min(98,((x-rect.left)/rect.width)*100));
      wrap.querySelector('#baDivider').style.left=pct+'%';
      wrap.querySelector('#baAfterClip').style.clipPath=`inset(0 0 0 ${pct}%)`;
    }
    let dragging=false;
    wrap.addEventListener('mousedown',e=>{dragging=true;setPos(e.clientX);});
    window.addEventListener('mousemove',e=>{if(dragging)setPos(e.clientX);});
    window.addEventListener('mouseup',()=>dragging=false);
    wrap.addEventListener('touchstart',e=>{dragging=true;setPos(e.touches[0].clientX);},{passive:true});
    window.addEventListener('touchmove',e=>{if(dragging)setPos(e.touches[0].clientX);},{passive:true});
    window.addEventListener('touchend',()=>dragging=false);
  }

  // open with single src (backward compat)
  window.openLightbox=function(src, allSrcs){
    _baMode=false;
    if(allSrcs&&allSrcs.length){
      _imgs=allSrcs.map(s=>typeof s==='object'?s:{src:s,tag:''});
      _idx=allSrcs.findIndex(s=>(typeof s==='object'?s.src:s)===src);
      if(_idx<0)_idx=0;
    } else {
      _imgs=[{src,tag:''}];
      _idx=0;
    }
    document.getElementById('lightbox').classList.add('open');
    renderLB();
  };

  // open with tagged photos array (before/after aware)
  window.openLightboxPhotos=function(photos, startIdx){
    _baMode=false;
    _imgs=photos.map(p=>typeof p==='object'&&p.src?p:{src:p,tag:''});
    _idx=startIdx||0;
    document.getElementById('lightbox').classList.add('open');
    renderLB();
  };

  document.getElementById('lightboxClose').addEventListener('click',closeLB);
  document.getElementById('lightbox').addEventListener('click',e=>{
    if(e.target===document.getElementById('lightbox'))closeLB();
  });
  document.getElementById('lightboxPrev').addEventListener('click',e=>{
    e.stopPropagation();
    _idx=(_idx-1+_imgs.length)%_imgs.length;
    _baMode=false; renderLB();
  });
  document.getElementById('lightboxNext').addEventListener('click',e=>{
    e.stopPropagation();
    _idx=(_idx+1)%_imgs.length;
    _baMode=false; renderLB();
  });
  document.getElementById('lightboxBABtn').addEventListener('click',e=>{
    e.stopPropagation();
    _baMode=!_baMode; renderLB();
  });
  // swipe support
  let _tx=0;
  document.getElementById('lightbox').addEventListener('touchstart',e=>{_tx=e.touches[0].clientX;},{passive:true});
  document.getElementById('lightbox').addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-_tx;
    if(Math.abs(dx)>50&&_imgs.length>1){
      _idx=dx<0?(_idx+1)%_imgs.length:(_idx-1+_imgs.length)%_imgs.length;
      _baMode=false; renderLB();
    }
  });
  // keyboard nav
  document.addEventListener('keydown',e=>{
    if(!document.getElementById('lightbox').classList.contains('open'))return;
    if(e.key==='ArrowRight'){_idx=(_idx+1)%_imgs.length;_baMode=false;renderLB();}
    if(e.key==='ArrowLeft'){_idx=(_idx-1+_imgs.length)%_imgs.length;_baMode=false;renderLB();}
    if(e.key==='Escape')closeLB();
  });
})();

function _runBackupDownload(){
  try{
    const payload={
      timestamp: new Date().toISOString(),
      cases: getCases(),
      archive: getArchive(),
      ops: getOps(),
      opsArchive: getOpsArch(),
      users: getUsers(),
      shiftNotes: getShiftNotes(),
      links: getLinks(),
      articles: getArticles(),
      todos: getTodos(),
      actlog: getActLog(),
      chat: getChat(),
    };
    const json=JSON.stringify(payload,null,2);
    const blob=new Blob([json],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    const dateStr=new Date().toISOString().slice(0,16).replace('T','_').replace(/:/g,'-');
    a.download=`MUH_Handover_Backup_${dateStr}.json`;
    document.body.appendChild(a); a.click();
    setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); },1000);
    localStorage.setItem('psx_last_backup',new Date().toISOString());
    updateBackupBadge();
    return true;
  }catch(e){ toast('⚠️ Backup failed: '+e.message,3000); return false; }
}

function doBackup(isAuto=false){
  if(isAuto){
    // Show confirmation toast-style dialog for auto backup
    _showAutoBackupConfirm();
  } else {
    if(_runBackupDownload()) toast('💾 Backup downloaded!',2500);
  }
}

document.getElementById('restoreBtn').addEventListener('click',()=>{

document.getElementById('restoreFileInput').addEventListener('change',function(){
  const file=this.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const payload=JSON.parse(e.target.result);
      if(!payload||typeof payload!=='object') throw new Error('Invalid file');

      // Restore all available keys
      if(payload.cases)      { _toCache('psx_cases', payload.cases);      _fbWrite('psx_cases', payload.cases); }
      if(payload.archive)    { _toCache('psx_archive', payload.archive);  _fbWrite('psx_archive', payload.archive); }
      if(payload.ops)        { _toCache('psx_ops', payload.ops);          _fbWrite('psx_ops', payload.ops); }
      if(payload.opsArchive) { _toCache('psx_ops_arch', payload.opsArchive); _fbWrite('psx_ops_arch', payload.opsArchive); }
      if(payload.users)      { _toCache('psx_users', payload.users);      _fbWrite('psx_users', payload.users); }
      if(payload.shiftNotes) { _toCache('psx_shift', payload.shiftNotes); _fbWrite('psx_shift', payload.shiftNotes); }
      if(payload.links)      { _toCache('psx_links', payload.links);      _fbWrite('psx_links', payload.links); }
      if(payload.articles)   { _toCache('psx_articles', payload.articles);_fbWrite('psx_articles', payload.articles); }
      if(payload.todos)      { _toCache('psx_todos', payload.todos);       _fbWrite('psx_todos', payload.todos); }
      if(payload.actlog)     { _toCache('psx_actlog', payload.actlog);     _fbWrite('psx_actlog', payload.actlog); }
      if(payload.chat)       { _toCache('psx_chat', payload.chat);         _fbWrite('psx_chat', payload.chat); }

      const ts=payload.timestamp?new Date(payload.timestamp).toLocaleString('en-GB'):'unknown';
      renderSidebar(); renderList(); updateCounts();
      toast('✅ Backup restored from '+ts, 3500);
    }catch(err){
      toast('❌ Invalid backup file: '+err.message, 3000);
    }
    this.value='';
  };
  reader.readAsText(file);
});

function renderActLog(list){
  list.innerHTML='';
  const now=Date.now();
  // Auto-purge entries older than 24h
  let log=getActLog().filter(e=>(now-e.ts)<ACT_EXPIRE_MS);

  // Header toolbar
  const hdr=document.createElement('div');
  hdr.style.cssText='display:flex;align-items:center;gap:8px;padding:10px 14px 8px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0';

  <div style="font-family:var(--mono);font-size:.6rem;color:var(--text-muted)">Auto-expires after 24h</div>
  <button id="actlogClearBtn" style="height:28px;padding:0 10px;border-radius:8px;border:1.5px solid var(--border2);background:var(--surface2);color:var(--text-muted);font-family:var(--display);font-size:.68rem;font-weight:600;cursor:pointer">🗑 Clear</button>`;
  list.appendChild(hdr);

  if(!log.length){
    const empty=document.createElement('div'); empty.className='actlog-empty';
    empty.innerHTML=`<div style="font-size:44px;opacity:.4">📋</div><div style="font-family:var(--display);font-weight:700;font-size:.95rem;color:var(--text-dim)">No activity yet</div><div style="font-size:.78rem">Actions will appear here automatically</div>`;
    list.appendChild(empty);
    hdr.querySelector('#actlogClearBtn').onclick=()=>{};
    return;
  }

  const scroll=document.createElement('div');
  scroll.style.cssText='flex:1;overflow-y:auto;display:flex;flex-direction:column';

  // Group by relative time
  const TODAY=new Date(); TODAY.setHours(0,0,0,0);
  const groups={};
  log.forEach(e=>{
    const d=new Date(e.ts); d.setHours(0,0,0,0);
    const label=d.getTime()===TODAY.getTime()?'Today':d.toLocaleDateString('en-GB',{weekday:'short',day:'2-digit',month:'short'});
    if(!groups[label]) groups[label]=[];
    groups[label].push(e);
  });

  Object.entries(groups).forEach(([label,entries])=>{
    const sep=document.createElement('div');
    sep.className='chat-day-sep';
    sep.style.cssText='padding:8px 14px 4px;font-family:var(--mono);font-size:.6rem;color:var(--text-muted);background:var(--bg);';
    sep.textContent=label;
    scroll.appendChild(sep);
    entries.forEach(e=>{
      const row=document.createElement('div'); row.className='actlog-row';
      const remain=ACT_EXPIRE_MS-(now-e.ts);
      const h=Math.floor(remain/3600000);
      const expStr=h>=1?h+'h left':'<1h left';
      row.innerHTML=`<div class="actlog-icon">${esc(e.icon||'📋')}</div>
      <div class="actlog-body">
        <div class="actlog-action">${esc(e.action)}</div>
        ${e.details?`<div style="font-size:.75rem;color:var(--text-dim);margin-top:1px">${esc(e.details)}</div>`:''}
        <div class="actlog-meta">
          <span class="actlog-user-chip">👤 ${esc(e.user)}</span>
          <span>${new Date(e.ts).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}</span>
          <span style="color:var(--text-muted);font-size:.52rem">⏱ ${expStr}</span>
        </div>
      </div>`;
      scroll.appendChild(row);
    });
  });

  list.appendChild(scroll);
  hdr.querySelector('#actlogClearBtn').onclick=()=>{
    if(!confirm('Clear all activity log entries?')) return;
    saveActLog([]);
    renderList();
    toast('🗑 Activity log cleared',1800);
  };
}

  const unread=msgs.filter(m=>m.ts>last&&m.devId!==currentDevId).length;
  const el=document.getElementById('cnt-__chat__');
  if(el){ el.textContent=unread>0?unread:''; el.style.background=unread>0?'rgba(79,217,160,.2)':''; el.style.color=unread>0?'var(--green)':''; }
}

function markChatRead(){
  localStorage.setItem('psx_chat_last_read_'+currentDevId, String(Date.now()));
  updateChatUnreadBadge();
}

function _compressChatPhoto(file, cb){
  const reader=new FileReader();
  reader.onload=e2=>{
    const img=new Image();
    img.onload=()=>{
      const MAX=900, Q=0.72;
      let w=img.width, h=img.height;
      if(w>MAX||h>MAX){ if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;} }
      const c=document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      cb(c.toDataURL('image/jpeg',Q));
    };
    img.src=e2.target.result;
  };
  reader.readAsDataURL(file);
}

function renderChat(list){
  list.innerHTML='';
  markChatRead();

  const wrap=document.createElement('div'); wrap.className='chat-wrap';

  // msgs area
  const msgsEl=document.createElement('div'); msgsEl.className='chat-msgs'; msgsEl.id='chatMsgs';
  wrap.appendChild(msgsEl);

  // emoji picker
  const emojiPicker=document.createElement('div'); emojiPicker.className='chat-emoji-picker'; emojiPicker.id='chatEmojiPicker';
  emojiPicker.style.display='none';
  CHAT_EMOJIS.forEach(em=>{
    const sp=document.createElement('span'); sp.textContent=em;
    sp.onclick=()=>{ const inp=document.getElementById('chatInp'); if(inp){inp.value=(inp.value||'')+em; inp.focus();} };
    emojiPicker.appendChild(sp);
  });

  // reply banner
  const replyBanner=document.createElement('div'); replyBanner.className='chat-reply-banner'; replyBanner.id='chatReplyBanner';
  replyBanner.style.display='none';
  replyBanner.innerHTML=`<span style="color:var(--blue);font-size:13px">↩</span><span class="chat-reply-banner-text" id="chatReplyText"></span><button class="chat-reply-cancel" id="chatReplyCancel">✕</button>`;

  // edit banner
  const editBanner=document.createElement('div'); editBanner.className='chat-edit-banner'; editBanner.id='chatEditBanner';
  editBanner.style.display='none';
  editBanner.innerHTML=`<span style="font-size:13px">✏️</span><span class="chat-edit-banner-text">Editing message</span><button class="chat-edit-cancel" id="chatEditCancel">✕</button>`;

  // input bar
  const inputBar=document.createElement('div'); inputBar.className='chat-input-bar';
  inputBar.appendChild(replyBanner);
  inputBar.appendChild(editBanner);
  inputBar.appendChild(emojiPicker);
  const inputRow=document.createElement('div'); inputRow.className='chat-input-row';
  inputRow.innerHTML=`
    <button class="chat-emoji-btn" id="chatEmojiBtn" title="Emoji">😊</button>
    <button class="chat-photo-btn" id="chatPhotoBtn" title="Send photo">📷</button>
    <input type="file" id="chatPhotoInput" accept="image/*" style="display:none">
    <textarea class="chat-inp" id="chatInp" placeholder="Message..." rows="1"></textarea>
    <button class="chat-send-btn" id="chatSendBtn" title="Send">➤</button>`;
  inputBar.appendChild(inputRow);
  wrap.appendChild(inputBar);
  list.appendChild(wrap);

  _renderChatMessages(msgsEl);
  setTimeout(()=>{ msgsEl.scrollTop=msgsEl.scrollHeight; },80);

  // ── helper: set reply ──
  function _setReply(m){
    _chatReplyTo={id:m.id,user:m.user,text:m.text,photo:m.photo||null};
    _chatEditId=null;
    const rb=document.getElementById('chatReplyBanner');
    const rt=document.getElementById('chatReplyText');
    const eb=document.getElementById('chatEditBanner');
    if(rb&&rt){ rt.textContent=m.user+': '+(m.photo?'📷 Photo':m.text.slice(0,60)); rb.style.display='flex'; }
    if(eb) eb.style.display='none';
    const inp=document.getElementById('chatInp');
    if(inp){ inp.classList.remove('editing'); inp.value=''; inp.focus(); }
    const sb=document.getElementById('chatSendBtn');
    if(sb){ sb.classList.remove('edit-mode'); sb.textContent='➤'; }
  }

  // ── helper: set edit ──
  function _setEdit(m){
    _chatEditId=m.id;
    _chatReplyTo=null;
    const rb=document.getElementById('chatReplyBanner');
    const eb=document.getElementById('chatEditBanner');
    if(rb) rb.style.display='none';
    if(eb) eb.style.display='flex';
    const inp=document.getElementById('chatInp');
    if(inp){ inp.value=m.text||''; inp.classList.add('editing'); inp.focus(); inp.style.height=''; inp.style.height=Math.min(inp.scrollHeight,100)+'px'; }
    const sb=document.getElementById('chatSendBtn');
    if(sb){ sb.classList.add('edit-mode'); sb.textContent='✓'; }
  }

  function _clearCompose(){
    _chatReplyTo=null; _chatEditId=null;
    const rb=document.getElementById('chatReplyBanner');
    const eb=document.getElementById('chatEditBanner');
    const inp=document.getElementById('chatInp');
    const sb=document.getElementById('chatSendBtn');
    if(rb) rb.style.display='none';
    if(eb) eb.style.display='none';
    if(inp){ inp.value=''; inp.style.height=''; inp.classList.remove('editing'); }
    if(sb){ sb.classList.remove('edit-mode'); sb.textContent='➤'; }
    emojiPicker.style.display='none'; _chatEmojiOpen=false;
  }

  // ── send / update ──
  const sendOrUpdate=()=>{
    if(!currentUser){ toast('⚠️ Please log in first',2000); return; }
    const inp=document.getElementById('chatInp');
    if(!inp) return;
    const text=inp.value.trim();

    // EDIT mode
    if(_chatEditId){
      if(!text){ _clearCompose(); return; }
      const msgs=getChat();
      const idx=msgs.findIndex(x=>x.id===_chatEditId);
      if(idx>=0){ msgs[idx].text=text; msgs[idx].edited=true; msgs[idx].editedAt=Date.now(); saveChat(msgs); }
      _clearCompose();
      const me=document.getElementById('chatMsgs');
      if(me){ _renderChatMessages(me); me.scrollTop=me.scrollHeight; }
      return;
    }

    if(!text) return;
    const msgs=getChat();
    const msg={
      id:'msg_'+Date.now()+'_'+Math.random().toString(36).slice(2,5),
      user:currentUser, devId:currentDevId,
      text, ts:Date.now(),
      replyTo:_chatReplyTo?{id:_chatReplyTo.id,user:_chatReplyTo.user,text:_chatReplyTo.text||'',photo:_chatReplyTo.photo||null}:null
    };
    msgs.push(msg);
    if(msgs.length>500) msgs.splice(0,msgs.length-500);
    saveChat(msgs);
    _clearCompose();
    _renderChatMessages(msgsEl);
    markChatRead();
    setTimeout(()=>{ msgsEl.scrollTop=msgsEl.scrollHeight; },60);
    logActivity('Sent chat message', text.slice(0,40), '💬');
  };

  // ── send photo ──
  document.getElementById('chatPhotoInput').addEventListener('change',function(){
    const file=this.files[0]; if(!file) return;
    this.value='';
    if(!currentUser){ toast('⚠️ Please log in first',2000); return; }
    toast('📷 Compressing…',1200);
    _compressChatPhoto(file, dataUrl=>{
      const msgs=getChat();
      const msg={
        id:'msg_'+Date.now()+'_'+Math.random().toString(36).slice(2,5),
        user:currentUser, devId:currentDevId,
        text:'', photo:dataUrl, ts:Date.now(),
        replyTo:_chatReplyTo?{id:_chatReplyTo.id,user:_chatReplyTo.user,text:_chatReplyTo.text||'',photo:_chatReplyTo.photo||null}:null
      };
      msgs.push(msg);
      if(msgs.length>500) msgs.splice(0,msgs.length-500);
      saveChat(msgs);
      _clearCompose();
      _renderChatMessages(msgsEl);
      markChatRead();
      setTimeout(()=>{ msgsEl.scrollTop=msgsEl.scrollHeight; },60);
      toast('📷 Photo sent',1600);
    });
  });

  document.getElementById('chatPhotoBtn').addEventListener('click',()=>document.getElementById('chatPhotoInput').click());
  document.getElementById('chatReplyCancel').onclick=_clearCompose;
  document.getElementById('chatEditCancel').onclick=_clearCompose;
  document.getElementById('chatEmojiBtn').onclick=()=>{
    _chatEmojiOpen=!_chatEmojiOpen;
    emojiPicker.style.display=_chatEmojiOpen?'flex':'none';
  };
  document.getElementById('chatSendBtn').onclick=sendOrUpdate;
  document.getElementById('chatInp').addEventListener('keydown',e=>{
    if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendOrUpdate(); }
    if(e.key==='Escape'){ _clearCompose(); }
  });
  document.getElementById('chatInp').addEventListener('input',function(){
    this.style.height=''; this.style.height=Math.min(this.scrollHeight,100)+'px';
  });

  // expose setReply/setEdit for _renderChatMessages
  window._chatSetReply=_setReply;
  window._chatSetEdit=_setEdit;
}

function _renderChatMessages(msgsEl){
  const msgs=getChat();
  msgsEl.innerHTML='';
  if(!msgs.length){
    msgsEl.innerHTML=`<div class="actlog-empty"><div style="font-size:44px;opacity:.4">💬</div><div style="font-family:var(--display);font-weight:700;font-size:.95rem;color:var(--text-dim)">No messages yet</div><div style="font-size:.78rem">Be the first to say something!</div></div>`;
    return;
  }

  const TODAY=new Date(); TODAY.setHours(0,0,0,0);
  let lastDay='';

  msgs.forEach(m=>{
    const d=new Date(m.ts); d.setHours(0,0,0,0);
    const dayLabel=d.getTime()===TODAY.getTime()?'Today':d.toLocaleDateString('en-GB',{weekday:'short',day:'2-digit',month:'short'});
    if(dayLabel!==lastDay){
      lastDay=dayLabel;
      const sep=document.createElement('div'); sep.className='chat-day-sep'; sep.textContent=dayLabel;
      msgsEl.appendChild(sep);
    }

    const mine=m.devId===currentDevId;
    const row=document.createElement('div');
    row.className='chat-bubble-row '+(mine?'mine':'theirs');
    row.dataset.msgId=m.id;

    // swipe-reply hint icon
    const hint=document.createElement('div'); hint.className='chat-reply-hint'; hint.textContent='↩';
    row.appendChild(hint);

    // avatar
    const av=document.createElement('div'); av.className='chat-avatar-sm';
    const users=getUsers();
    const uEntry=Object.entries(users).find(([id,u])=>id===m.devId||(u&&u.name===m.user));
    const uData=uEntry?uEntry[1]:null;
    av.style.background=mine?'var(--blue)':'var(--purple)';
    if(uData&&uData.avatar){ av.innerHTML=`<img src="${uData.avatar}" alt="">`; av.style.background='transparent'; }
    else av.textContent=(m.user||'?').charAt(0).toUpperCase();

    const bubble=document.createElement('div'); bubble.className='chat-bubble';
    let html='';
    if(!mine) html+=`<div class="chat-bubble-name">${esc(m.user)}</div>`;
    if(m.replyTo){
      const rPreview = m.replyTo.photo
        ? `📷 Photo`
        : esc((m.replyTo.text||'').slice(0,60));
      html+=`<div class="chat-reply-preview">↩ <strong>${esc(m.replyTo.user)}</strong>: ${rPreview}</div>`;
    }
    if(m.photo) html+=`<img class="chat-photo-img" src="${m.photo}" alt="photo" data-photo="${m.id}">`;
    if(m.text)  html+=`<div class="chat-bubble-text">${esc(m.text).replace(/\n/g,'<br>')}</div>`;
    const editedLabel = m.edited ? `<span class="chat-edited-label">edited</span>` : '';
    html+=`<div class="chat-bubble-time">${new Date(m.ts).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}${editedLabel}</div>`;
    bubble.innerHTML=html;

    // photo lightbox
    bubble.querySelectorAll('[data-photo]').forEach(img=>{
      img.addEventListener('click',()=>openLightbox(m.photo));
    });

    // ── Long-press / right-click actions ──
    let pressTimer=null;
    const showActions=()=>{
      document.querySelectorAll('.chat-msg-actions').forEach(x=>x.remove());
      const ac=document.createElement('div'); ac.className='chat-msg-actions';
      ac.innerHTML=`
        <button class="chat-msg-action-btn" data-act="reply">↩ Reply</button>
        ${mine&&!m.photo?`<button class="chat-msg-action-btn" data-act="edit">✏️ Edit</button>`:''}
        ${mine?`<button class="chat-msg-action-btn" data-act="delete" style="color:var(--red)">🗑 Delete</button>`:''}`;
      ac.querySelector('[data-act="reply"]').onclick=e=>{ e.stopPropagation(); window._chatSetReply&&window._chatSetReply(m); ac.remove(); };
      if(mine&&!m.photo){
        ac.querySelector('[data-act="edit"]').onclick=e=>{ e.stopPropagation(); window._chatSetEdit&&window._chatSetEdit(m); ac.remove(); };
      }
      if(mine){
        ac.querySelector('[data-act="delete"]').onclick=e=>{
          e.stopPropagation();
          const arr=getChat().filter(x=>x.id!==m.id); saveChat(arr);
          const me=document.getElementById('chatMsgs'); if(me) _renderChatMessages(me);
          ac.remove();
        };
      }
      bubble.style.position='relative'; bubble.appendChild(ac);
      setTimeout(()=>document.addEventListener('click',function h(){ ac.remove(); document.removeEventListener('click',h); },{once:true}),50);
    };

    bubble.addEventListener('contextmenu',e=>{ e.preventDefault(); showActions(); });
    bubble.addEventListener('touchstart',()=>{ pressTimer=setTimeout(showActions,500); },{passive:true});
    bubble.addEventListener('touchend',()=>clearTimeout(pressTimer));
    bubble.addEventListener('touchmove',()=>clearTimeout(pressTimer));

    // ── Swipe-left to reply ──
    let swipeStartX=0, swipeStartY=0, swiping=false, locked=false, replied=false;
    const SWIPE_THRESHOLD=60;

    bubble.addEventListener('pointerdown',e=>{
      swipeStartX=e.clientX; swipeStartY=e.clientY;
      swiping=false; locked=false; replied=false;
      bubble.style.transition='none';
    },{passive:true});

    bubble.addEventListener('pointermove',e=>{
      if(locked) return;
      const dx=e.clientX-swipeStartX;
      const dy=e.clientY-swipeStartY;
      // lock to vertical scroll if moving more vertically
      if(!swiping&&Math.abs(dy)>Math.abs(dx)*1.5){ locked=true; return; }
      if(!swiping&&Math.abs(dx)>8) swiping=true;
      if(!swiping) return;
      // only allow swipe-left (negative dx)
      if(dx>=0) return;
      const move=Math.max(dx,-SWIPE_THRESHOLD*1.2);
      bubble.style.transform=`translateX(${move}px)`;
      const pct=Math.min(Math.abs(move)/SWIPE_THRESHOLD,1);
      hint.style.opacity=String(pct);
      if(!replied&&Math.abs(move)>=SWIPE_THRESHOLD){
        replied=true;
        window._chatSetReply&&window._chatSetReply(m);
        // haptic if available
        if(navigator.vibrate) navigator.vibrate(40);
      }
    },{passive:true});

    const resetSwipe=()=>{
      if(!swiping) return;
      bubble.style.transition='transform .22s cubic-bezier(.25,.46,.45,.94)';
      bubble.style.transform='';
      hint.style.opacity='0';
      swiping=false;
    };
    bubble.addEventListener('pointerup',resetSwipe);
    bubble.addEventListener('pointercancel',resetSwipe);

    if(!mine){ row.appendChild(av); row.appendChild(bubble); }
    else { row.appendChild(bubble); row.appendChild(av); }
    msgsEl.appendChild(row);
  });
}

function _compressProfilePic(file, cb){
  const reader=new FileReader();
  reader.onload=e2=>{
    const img=new Image();
    img.onload=()=>{
      const SIZE=200;
      let w=img.width, h=img.height;
      const min=Math.min(w,h);
      // center-crop square then resize
      const canvas=document.createElement('canvas'); canvas.width=SIZE; canvas.height=SIZE;
      const ctx=canvas.getContext('2d');
      const sx=(w-min)/2, sy=(h-min)/2;
      ctx.drawImage(img,sx,sy,min,min,0,0,SIZE,SIZE);
      cb(canvas.toDataURL('image/jpeg',0.80));
    };
    img.src=e2.target.result;
  };
  reader.readAsDataURL(file);
}

window.uploadProfilePic=function(){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*';
  inp.onchange=()=>{
    const file=inp.files[0]; if(!file) return;
    _compressProfilePic(file, (dataUrl)=>{
      const users=getUsers();
      if(!users[currentDevId]) return;
      users[currentDevId].avatar=dataUrl;
      _toCache('psx_users',users);
      _fbPatchUser(currentDevId,{avatar:dataUrl}).catch(e=>console.warn('[FB] avatar patch error',e));
      // Update header
      _renderHeaderAvatar(dataUrl);
      if(currentTab==='__users__') renderList();
      toast('✅ Profile picture updated',2000);
    });
  };
  inp.click();
};

function _renderHeaderAvatar(src){
  const el=document.getElementById('headerUser');
  if(!el) return;
  if(src){
    el.innerHTML=`<img src="${src}" alt="" style="width:22px;height:22px;border-radius:6px;object-fit:cover;cursor:pointer;border:1.5px solid var(--border2)" onclick="uploadProfilePic()" title="Change profile pic"> ${esc(currentUser)}`;
  } else {
    el.textContent='👤 '+currentUser;
  }
}

window.openChangePassword=function(devId){
  // Remove any existing
  document.getElementById('chpwOverlay')?.remove();
  const ov=document.createElement('div');
  ov.id='chpwOverlay';
  ov.style.cssText='position:fixed;inset:0;z-index:5000;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;padding:20px';
  ov.innerHTML=`<div style="width:100%;max-width:360px;background:var(--surface);border-radius:18px;padding:20px;display:flex;flex-direction:column;gap:12px;box-shadow:0 8px 40px rgba(0,0,0,.5)">
    <div style="font-family:var(--display);font-weight:800;font-size:.95rem;color:var(--text)">🔑 Change Password</div>
    <input class="finp" id="chpw_old" type="password" placeholder="Current password" autocomplete="current-password">
    <input class="finp" id="chpw_new" type="password" placeholder="New password (min 4 chars)" autocomplete="new-password">
    <input class="finp" id="chpw_confirm" type="password" placeholder="Confirm new password" autocomplete="new-password">
    <div class="ws-error" id="chpw_err"></div>
    <div style="display:flex;gap:8px">
      <button id="chpw_cancel" style="flex:1;height:42px;border-radius:12px;border:1.5px solid var(--border2);background:var(--surface2);color:var(--text-muted);font-family:var(--display);font-weight:700;font-size:.85rem;cursor:pointer">Cancel</button>
      <button id="chpw_save" style="flex:2;height:42px;border-radius:12px;border:none;background:var(--blue);color:#fff;font-family:var(--display);font-weight:700;font-size:.85rem;cursor:pointer">Save Password</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
  ov.querySelector('#chpw_cancel').onclick=()=>ov.remove();
  ov.addEventListener('click',e=>{ if(e.target===ov) ov.remove(); });
  setTimeout(()=>ov.querySelector('#chpw_old')?.focus(),200);

  ov.querySelector('#chpw_save').onclick=()=>{
    const oldPw=ov.querySelector('#chpw_old').value.trim();
    const newPw=ov.querySelector('#chpw_new').value.trim();
    const confirm2=ov.querySelector('#chpw_confirm').value.trim();
    const errEl=ov.querySelector('#chpw_err');
    errEl.textContent='';
    const users=getUsers(); const u=users[devId];
    if(!u){errEl.textContent='User not found';return;}
    const expectedHash=hash(u.name.toLowerCase()+oldPw);
    if(u.password&&u.password!==expectedHash){errEl.textContent='❌ Current password is wrong';return;}
    if(newPw.length<4){errEl.textContent='New password must be at least 4 characters';return;}
    if(newPw!==confirm2){errEl.textContent='Passwords do not match';return;}
    const newHash=hash(u.name.toLowerCase()+newPw);
    users[devId].password=newHash;
    _toCache('psx_users',users);
    _fbPatchUser(devId,{password:newHash}).catch(e=>console.warn('[FB] chpw patch error',e));
    ov.remove();
    toast('✅ Password changed successfully',2500);
    logActivity('Changed password','','🔑');
  };
};

// ═══════════════════════════════════════════════════════
// PWA — SERVICE WORKER (base64 data URL — works in all browsers)
// Blob URLs are rejected by browsers for SW registration (security policy).
// Base64 data URLs are accepted as a workaround for single-file PWAs.
// ═══════════════════════════════════════════════════════
(function registerSW(){
  if (!('serviceWorker' in navigator)) return;

  // SW source — will be base64-encoded and registered as a data: URL
  const swSource = `
const CACHE = 'muh-psx-v2';
const FONTS_URL = 'https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap';

self.addEventListener('install', e => {
  e.waitUntil(
    caches.open(CACHE)
      .then(c => c.add(FONTS_URL).catch(()=>{}))
      .then(() => self.skipWaiting())
  );
});

self.addEventListener('activate', e => {
  e.waitUntil(
    caches.keys()
      .then(keys => Promise.all(
        keys.filter(k => k !== CACHE).map(k => caches.delete(k))
      ))
      .then(() => self.clients.claim())
  );
});

self.addEventListener('fetch', e => {
  const url = e.request.url;

  // Never touch Supabase — always live
  if (url.includes('firebase') || url.includes('googleapis.com') || url.includes('gstatic.com')) return;

  // Fonts → cache first
  if (url.includes('fonts.googleapis.com') || url.includes('fonts.gstatic.com')) {
    e.respondWith(
      caches.match(e.request).then(hit => hit || fetch(e.request).then(res => {
        const clone = res.clone();
        caches.open(CACHE).then(c => c.put(e.request, clone));
        return res;
      }))
    );
    return;
  }

  // HTML page → network first, cache fallback
  if (e.request.mode === 'navigate') {
    e.respondWith(
      fetch(e.request)
        .then(res => {
          const clone = res.clone();
          caches.open(CACHE).then(c => c.put(e.request, clone));
          return res;
        })
        .catch(() => caches.match(e.request).then(hit => hit ||
          new Response(
            '<h2 style="font-family:sans-serif;padding:2rem;color:#e8eaf0;background:#0d0f14;min-height:100vh;margin:0;display:flex;align-items:center;justify-content:center">⚠️ You are offline — reconnect to sync data</h2>',
            { headers: { 'Content-Type': 'text/html' } }
          )
        ))
    );
    return;
  }
});
`;

  // Encode to base64 — the only protocol browsers allow for SW registration
  // apart from https:// and localhost (which require an actual file)
  try {
    const b64 = btoa(unescape(encodeURIComponent(swSource)));
    const swUrl = 'data:application/javascript;base64,' + b64;

    navigator.serviceWorker.register(swUrl, { scope: './' })
      .then(reg => {
        console.log('[PWA] SW registered ✅');
        reg.update();
      })
      .catch(err => {
        // data: URLs also rejected on some stricter browsers — log only, don't crash
        console.log('[PWA] SW not supported in this environment:', err.message);
      });
  } catch(e) {
    console.log('[PWA] SW setup skipped:', e.message);
  }

  // Install prompt (Android Chrome)
  let deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    if (document.getElementById('pwaInstallBtn')) return;
    const btn = document.createElement('button');
    btn.id = 'pwaInstallBtn';
    btn.textContent = '📲 Install App';
    btn.style.cssText = 'position:fixed;bottom:calc(90px + var(--safe-b));right:12px;height:36px;padding:0 14px;border-radius:10px;border:1.5px solid var(--blue);background:var(--blue-glow);color:var(--blue);font-family:var(--display);font-weight:700;font-size:.78rem;cursor:pointer;z-index:800;backdrop-filter:blur(4px);box-shadow:0 4px 16px rgba(79,142,247,.2)';
    btn.onclick = () => {
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(() => { deferredPrompt = null; btn.remove(); });
    };
    document.body.appendChild(btn);
  });

function tutToggle(secId){
  const body=document.getElementById(secId+'-body');
  const arr=document.getElementById(secId+'-arr');
  if(!body||!arr) return;
  const isOpen=!body.classList.contains('hidden');
  body.classList.toggle('hidden', isOpen);
  arr.classList.toggle('open', !isOpen);
}
