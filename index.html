  document.querySelectorAll('#opf_day_group .toggle-btn').forEach(b=>b.classList.remove('on'));

  if(prefill && !editId){
    document.getElementById('opf_name').value=prefill.patientName||'';
    document.getElementById('opf_age').value=prefill.age||'';
    document.getElementById('opf_dx').value=prefill.dx||'';
    document.getElementById('opf_surgeon').value=prefill.surgeon||prefill.surgeonHand||'';
  }
  if(editId){
    const op=getOps().find(o=>o._id===editId); if(!op) return;
    document.getElementById('opf_name').value=op.name||'';
    document.getElementById('opf_age').value=op.age||'';
    document.getElementById('opf_dx').value=op.dx||'';
    document.getElementById('opf_decision').value=op.decision||'';
    document.getElementById('opf_surgeon').value=op.surgeon||'';
    document.getElementById('opf_date').value=op.date||today;
    document.getElementById('opf_notes').value=op.notes||'';
    _opFormDay=op.day||'';
    document.querySelectorAll('#opf_day_group .toggle-btn').forEach(b=>b.classList.toggle('on',b.dataset.day===_opFormDay));
  }

  overlay.classList.add('show');
  setTimeout(()=>document.getElementById('opf_name')?.focus(),300);
}

document.getElementById('opsFormClose').addEventListener('click',()=>document.getElementById('opsFormOverlay').classList.remove('show'));
document.getElementById('opsFormOverlay').addEventListener('click',e=>{ if(e.target===document.getElementById('opsFormOverlay')) document.getElementById('opsFormOverlay').classList.remove('show'); });

document.getElementById('opf_day_group').addEventListener('click',e=>{
  const b=e.target.closest('.toggle-btn'); if(!b) return;
  document.querySelectorAll('#opf_day_group .toggle-btn').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); _opFormDay=b.dataset.day;
});

document.getElementById('opsFormSubmit').addEventListener('click',()=>{
  const name=(document.getElementById('opf_name').value||'').trim();
  if(!name){ toast('⚠️ Patient name required',2000); return; }
  const op={
    _id: _opEditId||('op_'+Date.now()+'_'+Math.random().toString(36).slice(2,5)),
    name, age:(document.getElementById('opf_age').value||'').trim(),
    dx:(document.getElementById('opf_dx').value||'').trim(),
    decision:(document.getElementById('opf_decision').value||'').trim(),
    surgeon:(document.getElementById('opf_surgeon').value||'').trim(),
    date:(document.getElementById('opf_date').value||''),
    day:_opFormDay,
    notes:(document.getElementById('opf_notes').value||'').trim(),
    addedBy:currentUser, addedAt:new Date().toISOString()
  };
  let ops=getOps();
  if(_opEditId){
    const idx=ops.findIndex(o=>o._id===_opEditId);
    if(idx>=0){ op.addedBy=ops[idx].addedBy; op.addedAt=ops[idx].addedAt; op.editedBy=currentUser; op.editedAt=new Date().toISOString(); ops[idx]=op; }
    toast('✅ Updated: '+name,2000);
  } else {
    ops.unshift(op);
    toast('🏥 Added to Ops List: '+name,2200);
  }
  saveOps(ops); updateCounts();
  document.getElementById('opsFormOverlay').classList.remove('show');
  if(currentTab==='__operations__') renderList();
});

function archiveOp(id){
  if(!confirm('Move this operation to archive?')) return;
  let ops=getOps(); const idx=ops.findIndex(o=>o._id===id); if(idx<0) return;
  const op=ops.splice(idx,1)[0];
  op._archivedAt=new Date().toISOString(); op._deletedBy=currentUser;
  const arch=getOpsArch(); arch.unshift(op); saveOpsArch(arch); saveOps(ops);
  updateCounts(); renderList(); toast('📁 Moved to Ops Archive',2000);
}

function restoreOp(i){
  const arch=getOpsArch(); const op=arch.splice(i,1)[0];
  delete op._archivedAt; delete op._deletedBy;
  op.restoredBy=currentUser; op.restoredAt=new Date().toISOString();
  const ops=getOps(); ops.unshift(op); saveOps(ops); saveOpsArch(arch);
  updateCounts(); renderList(); toast('↩ Restored to Ops List',2000);
}

function permDeleteOp(i){
  if(!confirm('Permanently delete this operation?')) return;
  const arch=getOpsArch(); arch.splice(i,1); saveOpsArch(arch);
  updateCounts(); renderList(); toast('🗑 Deleted permanently',1800);
}

function exportOpsPDF(){
  const ops=getOps();
  if(!ops.length){ toast('⚠️ No operations to export',1800); return; }

  // Group by day
  const byDay={};
  ops.forEach(op=>{ const day=op.day||'غير محدد'; if(!byDay[day]) byDay[day]=[]; byDay[day].push(op); });
  const dayOrder=[...OP_DAYS,'غير محدد'];

  let rows='';
  dayOrder.forEach(day=>{
    if(!byDay[day]||!byDay[day].length) return;
    rows+=`<tr style="background:#f0f4ff"><td colspan="7" style="font-weight:700;padding:8px 12px;color:#2c6ef2;font-size:13px">📅 ${day}</td></tr>`;
    byDay[day].forEach((op,i)=>{
      rows+=`<tr>
        <td style="text-align:center;color:#888">${i+1}</td>
        <td style="font-weight:600">${op.name||'—'}</td>
        <td style="text-align:center">${op.age||'—'}</td>
        <td>${op.dx||'—'}</td>
        <td>${op.decision||'—'}</td>
        <td>${op.surgeon||'—'}</td>
        <td style="font-size:12px;color:#666">${op.date?fmtDate(op.date):'—'}</td>
      </tr>`;
    });
  });

  const html=`<!DOCTYPE html><html dir="rtl" lang="ar"><head><meta charset="UTF-8">
  <title>Ops List - MUH Plastic Surgery</title>
  <style>
    body{font-family:'Segoe UI',Arial,sans-serif;margin:0;padding:20px;color:#1a1d2e;direction:rtl}
    h1{font-size:18px;margin-bottom:4px;color:#1a1d2e}
    .sub{font-size:12px;color:#666;margin-bottom:18px}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th{background:#1a1d2e;color:#fff;padding:8px 12px;text-align:right;font-weight:600;font-size:12px}
    td{padding:7px 12px;border-bottom:1px solid #e0e0e0;text-align:right}
    tr:last-child td{border-bottom:none}
    @media print{body{padding:10px}}
  </style></head><body>
  <h1>🏥 Ops List — MUH Plastic Surgery</h1>
  <div class="sub">Exported: ${new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'})} | Total: ${ops.length} operations</div>
  <table><thead><tr><th>#</th><th>الاسم</th><th>العمر</th><th>التشخيص</th><th>القرار</th><th>الجراح</th><th>التاريخ</th></tr></thead>
  <tbody>${rows}</tbody></table>
  <script>window.onload=()=>window.print();<\/script>
  </body></html>`;

  const blob=new Blob([html],{type:'text/html'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url;
  a.download='Ops_List_MUH_'+new Date().toISOString().slice(0,10)+'.html';
  document.body.appendChild(a); a.click();
  setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); },1000);
  toast('📄 Ops List PDF exported',2000);
}

function renderArchive(list){
  list.innerHTML='';
  let arr=getArchive();
  if (!arr.length){ list.innerHTML=`<div class="empty"><div class="empty-icon">🗂</div><div class="empty-title">Archive is empty</div></div>`; return; }
  if (_search){ const q=_search.toLowerCase(); arr=arr.filter(c=>(c.patientName||'').toLowerCase().includes(q)||(c.dx||'').toLowerCase().includes(q)); }
  arr.forEach((c,i)=>{
    const card=document.createElement('div');
    card.style.cssText='background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:.7rem .9rem;margin-bottom:8px';
    card.innerHTML=`<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
      <div>
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
          <span class="arch-tag">${esc(c._fromLabel||c._fromTab||'—')}</span>
          <span style="font-family:var(--display);font-weight:700;font-size:.9rem;color:var(--text)">${esc(c.patientName)}</span>
        </div>
        <div style="font-family:var(--mono);font-size:.6rem;color:var(--text-muted);margin-top:3px">${c._archivedAt?timeAgo(c._archivedAt):''} ${c._deletedBy?'by '+esc(c._deletedBy):''}</div>
        ${c.dx?`<div style="font-size:.8rem;color:var(--text-dim);margin-top:4px">${esc(c.dx)}</div>`:''}
      </div>
      <div style="display:flex;gap:5px;flex-shrink:0">
        <button class="act-btn" title="Restore" onclick="restoreCase(${i})" style="color:var(--purple)">↩</button>
        <button class="act-btn del" title="Delete" onclick="permDeleteCase(${i})">✕</button>
      </div>
    </div>`;
    list.appendChild(card);
  });
}

window.restoreCase=function(i){
  const arch=getArchive(); const c=arch.splice(i,1)[0]; saveArchive(arch);
  const cases=getCases(); const tab=c._fromTab||'er_hand';
  if (!cases[tab]) cases[tab]=[];
  delete c._fromTab; delete c._fromLabel; delete c._archivedAt; delete c._deletedBy;
  c.restoredBy=currentUser; c.restoredAt=new Date().toISOString();
  cases[tab].unshift(c); saveCases(cases);
  renderList(); updateCounts(); toast('↩ Restored: '+c.patientName, 2000);
};
window.permDeleteCase=function(i){
  if (!confirm('Permanently delete?')) return;
  const arch=getArchive(); arch.splice(i,1); saveArchive(arch);
  renderList(); updateCounts(); toast('🗑 Deleted permanently', 1800);
};

const ADMIN_NAME = 'Elsheikh'; // Admin user who can remove others

function isAdmin() {
  return currentUser && currentUser.toLowerCase().includes(ADMIN_NAME.toLowerCase());
}

function renderUsers(list){
  list.innerHTML='';
  const users=getUsers();
  const entries=Object.entries(users).filter(([,u])=>u&&u.name);
  if (!entries.length){ list.innerHTML=`<div class="empty"><div class="empty-icon">👥</div><div class="empty-title">No users yet</div></div>`; return; }
  entries.sort((a,b)=>(a[1].name||'').localeCompare(b[1].name||''));
  const ROLES=['Resident','Specialist','Consultant','Other'];
  const amAdmin=isAdmin();

  if(amAdmin){
    const adminBanner=document.createElement('div');
    adminBanner.style.cssText='background:rgba(247,136,79,.1);border:1px solid rgba(247,136,79,.3);border-radius:10px;padding:8px 12px;margin-bottom:8px;font-family:var(--mono);font-size:.68rem;color:var(--orange);display:flex;align-items:center;gap:6px';
    adminBanner.innerHTML='🛡️ Admin mode — you can remove any user';
    list.appendChild(adminBanner);
  }

  entries.forEach(([devId,u])=>{
    const isOnline=u.lastSeen&&(Date.now()-new Date(u.lastSeen).getTime())<ONLINE_MS*2;
    const isMe=devId===currentDevId;
    const canDelete=isMe||(amAdmin&&!isMe);
    const card=document.createElement('div'); card.className='user-card'; card.style.flexDirection='column';
    card.innerHTML=`
      <div style="display:flex;align-items:center;gap:.75rem;width:100%">
        <div class="user-avatar" style="background:${isMe?'var(--blue)':amAdmin?'var(--orange)':'var(--purple)'}">${(u.name||'?').charAt(0).toUpperCase()}</div>
        <div style="flex:1;min-width:0">
          <div class="user-name">${esc(u.name)}${isMe?` <span style="font-family:var(--mono);font-size:.58rem;color:var(--blue);background:var(--blue-glow);padding:1px 6px;border-radius:5px">me</span>`:''}${amAdmin&&!isMe?` <span style="font-family:var(--mono);font-size:.55rem;color:var(--orange);background:rgba(247,136,79,.1);padding:1px 6px;border-radius:5px;border:1px solid rgba(247,136,79,.3)">admin view</span>`:''}</div>
          ${u.role?`<div class="user-role">${esc(u.role)}</div>`:'<div class="user-role" style="color:var(--text-muted)">No role set</div>'}
          <div class="user-online ${isOnline?'online-dot':'offline-dot'}">${isOnline?'🟢 Online':'⚫ Offline'}${u.lastSeen?'  '+timeAgo(u.lastSeen):''}</div>
          ${u.phone?`<div style="font-family:var(--mono);font-size:.62rem;color:var(--text-muted)">📞 ${esc(u.phone)}</div>`:''}
        </div>
        <div style="display:flex;gap:5px;flex-shrink:0">
          ${isMe?`<button class="user-action-btn" onclick="toggleUserEdit('ue_${devId}')">✏️ Edit</button>`:''}
          ${canDelete&&!isMe?`<button class="user-action-btn danger" onclick="adminRemoveUser('${devId}','${esc(u.name||'')}')">🗑 Remove</button>`:''}
        </div>
      </div>
      ${isMe?`<div id="ue_${devId}" style="display:none;width:100%;margin-top:.65rem;border-top:1px solid var(--border);padding-top:.65rem">
        <div style="font-family:var(--mono);font-size:.58rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px">Edit Profile</div>
        <div class="user-edit-row" style="margin-bottom:5px">
          <input class="user-edit-inp" id="ue_name_${devId}" placeholder="Name" value="${esc(u.name||'')}">
        </div>
        <div class="user-edit-row" style="margin-bottom:5px">
          <input class="user-edit-inp" id="ue_phone_${devId}" placeholder="Phone e.g. +20..." value="${esc(u.phone||'')}">
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px">
          ${ROLES.map(r=>`<button type="button" class="toggle-btn${u.role===r?' on':''}" onclick="selectUserRole(this,'${devId}')" data-role="${r}">${r}</button>`).join('')}
        </div>
        <div class="user-edit-row">
          <button class="user-edit-save" onclick="saveUserEdit('${devId}')">💾 Save</button>
          <button class="user-action-btn danger" onclick="confirmDeleteUser('${devId}')" style="margin-left:4px;height:32px">🗑 Delete Account</button>
        </div>
      </div>`:''}`;
    list.appendChild(card);
  });
}

window.adminRemoveUser=function(devId, name){
  if(!isAdmin()){ toast('⛔ Admin only',1800); return; }
  if(!confirm(`Remove user "${name}" from the system?\n\nThis will delete their account permanently.`)) return;
  const users=getUsers(); delete users[devId]; saveUsers(users);
  renderList(); toast('🗑 Removed: '+name,2000);
};

window.toggleUserEdit=function(id){ const el=document.getElementById(id); if(el) el.style.display=el.style.display==='none'?'block':'none'; };
window.selectUserRole=function(btn,devId){
  const container=btn.closest('div[style*="flex-wrap"]');
  if(container) container.querySelectorAll('.toggle-btn').forEach(b=>b.classList.toggle('on',b===btn));
};
window.saveUserEdit=function(devId){
  const name=(document.getElementById('ue_name_'+devId)?.value||'').trim();
  const phone=(document.getElementById('ue_phone_'+devId)?.value||'').trim();
  const roleBtn=document.querySelector(`#ue_${devId} .toggle-btn.on`);
  const role=roleBtn?roleBtn.dataset.role:'';
  if(!name){toast('⚠️ Name required',1800);return;}
  const users=getUsers();
  if(!users[devId]){toast('User not found',1800);return;}
  users[devId].name=name; users[devId].phone=phone; if(role) users[devId].role=role;
  saveUsers(users);
  if(devId===currentDevId){currentUser=name;localStorage.setItem('psx_username',name);document.getElementById('headerUser').textContent='👤 '+name;}
  renderList(); toast('✅ Profile updated',1800);
};
window.confirmDeleteUser=function(devId){
  if(!confirm('Delete this account permanently? This cannot be undone.')) return;
  const users=getUsers(); delete users[devId]; saveUsers(users);
  if(devId===currentDevId){
    currentUser=''; localStorage.removeItem('psx_username'); localStorage.removeItem('psx_device_id');
    document.getElementById('headerUser').textContent=''; document.getElementById('logoutBtn').style.display='none';
    document.getElementById('welcomeScreen').style.display='flex'; renderWelcome();
  } else { renderList(); }
  toast('🗑 Account deleted',2000);
};

  };
  document.getElementById('sn_summary_save').onclick=()=>{
    const sn2=getShiftNotes(); sn2.summary=document.getElementById('sn_summary').value.trim();
    saveShiftNotes(sn2); toast('✅ Summary saved', 1600);
  };
  document.getElementById('sn_log_add').onclick=()=>{
    const text=document.getElementById('sn_log_inp').value.trim(); if(!text) return;
    const sn2=getShiftNotes(); if(!sn2.log) sn2.log=[];
    sn2.log.unshift({text,by:currentUser,ts:new Date().toISOString()});
    saveShiftNotes(sn2); renderShiftLog(sn2.log);
    document.getElementById('sn_log_inp').value='';
    toast('✅ Added', 1600);
  };
  renderShiftLog(sn.log||[]);

function renderShiftLog(log){
  const el=document.getElementById('sn_log_list'); if(!el) return;
  el.innerHTML='';
  log.forEach((e,i)=>{
    const div=document.createElement('div'); div.className='sn-log-item';
    div.innerHTML=`<div class="sn-log-meta"><span>${esc(e.by||'—')}</span><span>${timeAgo(e.ts)}</span>
      <button class="sn-log-del" onclick="deleteShiftLog(${i})">✕</button></div>
      <div class="sn-log-text">${esc(e.text)}</div>`;
    el.appendChild(div);
  });
}
window.deleteShiftLog=function(i){
  const sn=getShiftNotes(); if(!sn.log||i<0||i>=sn.log.length) return;
  sn.log.splice(i,1); saveShiftNotes(sn); renderShiftLog(sn.log);
};

const LINK_ICONS={'Guidelines':'📋','Calculator':'🧮','Anatomy':'🫀','Reference':'📖','General':'🌐','Other':'🔗','Medical':'🏥','Social':'💬'};

function getLinkIcon(l){
  const site=SOCIAL_SITES.find(s=>l.socialType===s.name||(l.url&&l.url.includes(s.url.split('/')[0])));
  if(site) return site.icon;
  return LINK_ICONS[l.cat]||'🔗';
}

function renderLinks(list){
  list.innerHTML='';
  const links=getLinks();

  // ── ADD FORM ──
  const form=document.createElement('div'); form.className='link-add-bar';
  form.innerHTML=`<div class="link-add-title">➕ Add New Link</div>
    <input class="finp" id="lnk_title" placeholder="Title" style="height:34px">
    <input class="finp" id="lnk_url" placeholder="URL or paste link" style="height:34px">
    <div style="font-family:var(--mono);font-size:.58rem;color:var(--text-muted);margin-bottom:3px">Quick — Social Sites</div>
    <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px" id="lnk_social_btns">
      ${SOCIAL_SITES.map(s=>`<button type="button" class="toggle-btn" style="display:flex;align-items:center;gap:4px;font-size:.68rem;height:28px;padding:0 8px" data-sname="${s.name}" data-surl="${s.url}" data-scat="${s.cat}">${typeof s.icon==='string'&&s.icon.startsWith('<')?s.icon:s.icon} ${s.name}</button>`).join('')}
    </div>
    <div style="font-family:var(--mono);font-size:.58rem;color:var(--text-muted);margin-bottom:3px">Category</div>
    <div style="display:flex;gap:5px;flex-wrap:wrap" id="lnk_cat_group">
      ${['General','Guidelines','Calculator','Anatomy','Reference','Medical','Social','Other'].map(c=>`<button type="button" class="toggle-btn" data-cat="${c}">${c}</button>`).join('')}
    </div>
    <button class="submit-btn" id="lnk_add" style="height:38px;font-size:.82rem">🔗 Add Link</button>`;
  list.appendChild(form);

  document.getElementById('lnk_social_btns').addEventListener('click',e=>{
    const b=e.target.closest('.toggle-btn'); if(!b) return;
    document.querySelectorAll('#lnk_social_btns .toggle-btn').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    const urlEl=document.getElementById('lnk_url');
    const titleEl=document.getElementById('lnk_title');
    if(urlEl&&!urlEl.value) urlEl.value='https://'+b.dataset.surl;
    if(titleEl&&!titleEl.value) titleEl.value=b.dataset.sname;
    // auto-select social category
    document.querySelectorAll('#lnk_cat_group .toggle-btn').forEach(x=>x.classList.toggle('on',x.dataset.cat===b.dataset.scat));
  });
  document.getElementById('lnk_cat_group').addEventListener('click',e=>{
    const b=e.target.closest('.toggle-btn'); if(!b) return;
    document.querySelectorAll('#lnk_cat_group .toggle-btn').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
  });
  document.getElementById('lnk_add').onclick=()=>{
    const title=(document.getElementById('lnk_title').value||'').trim();
    const url=(document.getElementById('lnk_url').value||'').trim();
    if(!title||!url){toast('⚠️ Title and URL required',1800);return;}
    const cat=document.querySelector('#lnk_cat_group .toggle-btn.on')?.dataset.cat||'General';
    const socialBtn=document.querySelector('#lnk_social_btns .toggle-btn.on');
    const socialType=socialBtn?.dataset.sname||'';
    const lArr=getLinks();
    lArr.unshift({id:'lnk_'+Date.now(),title,url,cat,socialType,addedBy:currentUser,addedAt:new Date().toISOString()});
    saveLinks(lArr); updateCounts(); renderLinks(list);
    toast('🔗 Link added',1600);
  };

  if(!links.length){
    const emp=document.createElement('div'); emp.className='empty';
    emp.innerHTML=`<div class="empty-icon">🔗</div><div class="empty-title">No links yet</div><div class="empty-sub">Add useful links above</div>`;
    list.appendChild(emp); return;
  }

  // Group by category
  const cats={};
  links.forEach(l=>{ const cat=l.cat||'General'; if(!cats[cat]) cats[cat]=[]; cats[cat].push(l); });
  Object.entries(cats).forEach(([cat,items])=>{
    const hdr=document.createElement('div');
    hdr.style.cssText='font-family:var(--mono);font-size:.6rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.1em;padding:.35rem 0 .4rem;margin-top:.3rem';
    hdr.textContent=cat; list.appendChild(hdr);
    items.forEach(l=>{
      const card=document.createElement('div'); card.className='link-card';
      const iconHtml=getLinkIcon(l);
      const iconIsHtml=typeof iconHtml==='string'&&iconHtml.startsWith('<');
      card.innerHTML=`
        <div class="link-icon" style="overflow:visible">${iconIsHtml?iconHtml:iconHtml}</div>
        <div style="flex:1;min-width:0">
          <div class="link-title" id="ltitle_${l.id}">${esc(l.title)}</div>
          <div class="link-url" id="lurl_${l.id}">${esc(l.url)}</div>
          ${l.addedBy?`<div style="font-family:var(--mono);font-size:.55rem;color:var(--text-muted);margin-top:2px">by ${esc(l.addedBy)}</div>`:''}
        </div>
        <div style="display:flex;flex-direction:column;gap:4px;flex-shrink:0">
          <button class="link-del-btn" title="Edit" data-action="edit" data-lid="${esc(l.id)}" style="color:var(--blue)">✎</button>
          <button class="link-del-btn" title="Delete" data-action="del" data-lid="${esc(l.id)}">🗑</button>
        </div>`;
      // open on click — NOT if editing, NOT on buttons, NOT on inputs
      card.addEventListener('click',e=>{
        if(e.target.closest('.link-del-btn')) return;
        if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
        // If card is currently in edit mode (has inputs), don't open link
        if(card.querySelector('input')) return;
        let href=l.url; if(!/^https?:\/\//i.test(href)) href='https://'+href;
        window.open(href,'_blank','noopener');
      });
      card.querySelectorAll('.link-del-btn').forEach(btn=>{
        btn.onclick=e=>{ e.stopPropagation();
          if(btn.dataset.action==='del'){
            if(!confirm('Remove this link?')) return;
            const arr=getLinks().filter(x=>x.id!==l.id); saveLinks(arr); updateCounts(); renderLinks(list); toast('🗑 Removed',1600);
          } else {
            // inline edit
            const titleEl=document.getElementById('ltitle_'+l.id);
            const urlEl=document.getElementById('lurl_'+l.id);
            if(btn.textContent==='✎'){
              // turn into inputs — stop click propagation on inputs explicitly
              const tVal=titleEl.textContent;
              const uVal=urlEl.textContent;
              titleEl.innerHTML=`<input class="finp" style="height:28px;font-size:.8rem;width:100%" value="${esc(tVal)}">`;
              urlEl.innerHTML=`<input class="finp" style="height:26px;font-size:.72rem;width:100%" value="${esc(uVal)}">`;
              // Prevent any click inside inputs from bubbling to card
              titleEl.querySelector('input').addEventListener('click',ev=>ev.stopPropagation());
              titleEl.querySelector('input').addEventListener('mousedown',ev=>ev.stopPropagation());
              urlEl.querySelector('input').addEventListener('click',ev=>ev.stopPropagation());
              urlEl.querySelector('input').addEventListener('mousedown',ev=>ev.stopPropagation());
              btn.textContent='💾';
              // Focus title input
              titleEl.querySelector('input').focus();
              titleEl.querySelector('input').select();
            } else {
              const newTitle=titleEl.querySelector('input')?.value.trim()||l.title;
              const newUrl=urlEl.querySelector('input')?.value.trim()||l.url;
              const arr=getLinks(); const idx=arr.findIndex(x=>x.id===l.id);
              if(idx>=0){arr[idx].title=newTitle;arr[idx].url=newUrl;saveLinks(arr);}
              renderLinks(list); toast('✅ Updated',1400);
            }
          }
        };
      });
      list.appendChild(card);
    });
  });
}

function renderArticles(list){
  list.innerHTML='';
  const articles=getArticles();

  // Add form
  const form=document.createElement('div'); form.className='article-add-form';
  form.innerHTML=`<div style="font-family:var(--mono);font-size:.6rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em">📰 Add Article / Note</div>
    <input class="finp" id="art_title" placeholder="Title" style="height:34px">
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin:-2px 0" id="art_tag_group">
      ${['Technique','Protocol','Evidence','Case Report','Anatomy','Tip','Other'].map(t=>`<button type="button" class="toggle-btn" data-tag="${t}">${t}</button>`).join('')}
    </div>
    <textarea class="ftextarea" id="art_body" placeholder="Article content, notes, key points..." rows="3"></textarea>
    <input class="finp" id="art_ref" placeholder="Reference / DOI (optional)" style="height:32px;font-size:.78rem">
    <button class="submit-btn" id="art_add" style="height:38px;font-size:.82rem">📌 Save Article</button>`;
  list.appendChild(form);
  document.getElementById('art_tag_group').addEventListener('click',e=>{
    const b=e.target.closest('.toggle-btn'); if(!b) return;
    document.querySelectorAll('#art_tag_group .toggle-btn').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
  });
  document.getElementById('art_add').onclick=()=>{
    const title=(document.getElementById('art_title').value||'').trim();
    const body=(document.getElementById('art_body').value||'').trim();
    if(!title){toast('⚠️ Title required',1800);return;}
    const tag=document.querySelector('#art_tag_group .toggle-btn.on')?.dataset.tag||'Other';
    const ref=(document.getElementById('art_ref').value||'').trim();
    const arr=getArticles();
    arr.unshift({id:'art_'+Date.now(),title,body,tag,ref,addedBy:currentUser,addedAt:new Date().toISOString()});
    saveArticles(arr); updateCounts(); renderArticles(list);
    toast('📰 Article saved',1800);
  };

  if(!articles.length){
    const emp=document.createElement('div'); emp.className='empty';
    emp.innerHTML=`<div class="empty-icon">📰</div><div class="empty-title">No articles yet</div><div class="empty-sub">Save key articles & protocols above</div>`;
    list.appendChild(emp); return;
  }

  articles.forEach((a,i)=>{
    const card=document.createElement('div'); card.className='article-card';
    const bodyId='artbody_'+i;
    card.innerHTML=`<span class="article-badge">${esc(a.tag||'Other')}</span>
      <div class="article-title">${esc(a.title)}</div>
      ${a.body?`<div class="article-expand" id="${bodyId}"><div class="article-body">${esc(a.body)}</div></div>
        <button style="background:none;border:none;color:var(--blue);font-family:var(--mono);font-size:.6rem;cursor:pointer;padding:4px 0;margin-top:2px" onclick="toggleArticleExpand('${bodyId}',this)">▾ Show more</button>`:''}
      <div class="article-meta">
        ${a.addedBy?`<span>📌 ${esc(a.addedBy)}</span>`:''}
        ${a.addedAt?`<span>${timeAgo(a.addedAt)}</span>`:''}
        ${a.ref?`<span style="color:var(--blue)">📄 ${esc(a.ref)}</span>`:''}
        <button style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:12px;margin-left:auto" onclick="deleteArticle('${a.id}')">🗑</button>
      </div>`;
    list.appendChild(card);
  });
}

window.toggleArticleExpand=function(id,btn){
  const el=document.getElementById(id); if(!el) return;
  el.classList.toggle('open');
  btn.textContent=el.classList.contains('open')?'▴ Show less':'▾ Show more';
};
window.deleteArticle=function(aid){
  if(!confirm('Delete this article?')) return;
  const arr=getArticles().filter(a=>a.id!==aid); saveArticles(arr); updateCounts();
  renderArticles(document.getElementById('casesList'));
  toast('🗑 Deleted',1600);
};

function mkInp(p,type='text',id=''){return`<input class="tool-inp"${id?' id="'+id+'"':''} type="${type}" placeholder="${p}">`;}
function mkSel(id,opts){return`<select class="tool-sel" id="${id}">${opts.map(([v,l])=>`<option value="${v}">${l}</option>`).join('')}</select>`;}
function mkBtn(id,label){return`<button class="tool-run-btn" id="${id}">${label}</button>`;}
function mkRes(id){return`<div class="tool-result" id="${id}"></div>`;}
function showRes(id,html){const el=document.getElementById(id);if(el){el.innerHTML=html;el.classList.add('show');}}

function buildNEWS2(body){
  body.innerHTML=`<div class="two-col">${mkInp('HR','number','n_hr')}${mkInp('RR','number','n_rr')}</div>
  <div class="two-col">${mkInp('SpO2 %','number','n_spo2')}${mkInp('SBP','number','n_sbp')}</div>
  <div class="two-col">${mkInp('Temp °C','number','n_temp')}${mkSel('n_avpu',[['A','A — Alert'],['V','V — Voice'],['P','P — Pain'],['U','U — Unresponsive']])}</div>
  <label style="display:flex;align-items:center;gap:6px;font-size:.78rem;color:var(--text-dim)"><input type="checkbox" id="n_o2"> On supplemental O2</label>

function sendComment(){
  const text=document.getElementById('commentInp').value.trim(); if(!text||!_commentCaseId) return;
  const cases=getCases();
  let found=null;
  Object.keys(cases).forEach(tabId=>{ const idx=(cases[tabId]||[]).findIndex(c=>c&&c._id===_commentCaseId); if(idx>=0) found={tabId,idx}; });
  if (!found) return;

  renderComments(_commentCaseId);

}
window.deleteComment=function(caseId,idx){
  if(!confirm('Delete comment?')) return;
  const cases=getCases();
  Object.keys(cases).forEach(tabId=>{
    const c=(cases[tabId]||[]).find(x=>x&&x._id===caseId);
    if(c&&c.comments&&c.comments[idx]!==undefined){c.comments.splice(idx,1);}
  });
  saveCases(cases); renderComments(caseId); renderList();
};

function reqNotifPermission(){

function pushNotif(title,body,tag){
  if(!('Notification' in window)||Notification.permission!=='granted') return;
  try{const n=new Notification(title,{body,tag:tag||'psx',icon:'./icon-192.png',renotify:true});n.onclick=()=>{window.focus();n.close()};setTimeout(()=>n.close(),7000);}catch(e){}

function diffCases(old, nw){
  if (!old||!nw) return;
  const followed=getFollowed();
  Object.keys(nw).forEach(tabId=>{
    const oldArr=(old[tabId]||[]),newArr=(nw[tabId]||[]);
    const oldMap={}; oldArr.forEach(c=>{if(c&&c._id) oldMap[c._id]=c;});
    newArr.forEach(c=>{
      if(!c||!c._id||!c.patientName) return;
      if(c.addedByDevId===currentDevId||c.editedByDevId===currentDevId) return;
      if(!oldMap[c._id]){
        const ts=c.addedAt?new Date(c.addedAt).getTime():0;
        if(ts<_notifBootTs-5000) return;
        const by=c.addedBy||'Someone';
        pushNotif('🆕 New case',by+' added '+c.patientName+' → '+getTabLabel(tabId),'new-'+c._id);
        storeNotif({type:'new_case',read:false,title:'New case',message:by+' added '+c.patientName+' ('+getTabLabel(tabId)+')',timestamp:new Date().toISOString()});
        return;
      }
      if(!followed.includes(c._id)) return;
      const old2=oldMap[c._id]; if(!c.editedAt||c.editedAt===old2.editedAt) return;
      const changes=[];
      if(c.status!==old2.status) changes.push('Status: '+old2.status+' → '+c.status);
      if(c.plan!==old2.plan) changes.push('Plan updated');
      if(!changes.length) return;
      pushNotif('✏️ Case updated',(c.editedBy||'?')+' edited '+c.patientName+' — '+changes[0],'edit-'+c._id);
      storeNotif({type:'case_edited',read:false,title:'Case updated',message:(c.editedBy||'?')+' edited '+c.patientName,details:changes.join(', '),timestamp:new Date().toISOString()});
    });
  });
}

function heartbeat(){

  const now=new Date().toISOString();

  const users=getUsers();

  users[currentDevId].lastSeen=now;

  // Write ONLY this device's lastSeen directly — minimal Firebase traffic
  // Mark as heartbeat so listener ignores it for re-render
  _lastWriteKey='psx_users';
  _lastWriteTs=Date.now();
  if(typeof db!=='undefined') db.ref('psx_users/'+currentDevId+'/lastSeen').set(now).catch(()=>{});
  updateOnlineBadge();
}

    const payload={
      timestamp: new Date().toISOString(),
      cases: getCases(),
      archive: getArchive(),
      ops: getOps(),
      opsArchive: getOpsArch(),
      users: getUsers(),
      shiftNotes: getShiftNotes(),
      links: getLinks(),
      articles: getArticles(),
    };
    const json=JSON.stringify(payload,null,2);
    const blob=new Blob([json],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    const dateStr=new Date().toISOString().slice(0,16).replace('T','_').replace(/:/g,'-');
    a.download=`MUH_Handover_Backup_${dateStr}.json`;
    document.body.appendChild(a); a.click();
    setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); },1000);
    localStorage.setItem('psx_last_backup',new Date().toISOString());
    updateBackupBadge();
    return true;
  }catch(e){ toast('⚠️ Backup failed: '+e.message,3000); return false; }
}

function doBackup(isAuto=false){
  if(isAuto){
    // Show confirmation toast-style dialog for auto backup
    _showAutoBackupConfirm();
  } else {
    if(_runBackupDownload()) toast('💾 Backup downloaded!',2500);
  }
}

function _showAutoBackupConfirm(){
  // Remove any existing confirm banner
  const existing=document.getElementById('autoBackupBanner');
  if(existing) existing.remove();

  const banner=document.createElement('div');
  banner.id='autoBackupBanner';
  banner.style.cssText='position:fixed;bottom:calc(80px + var(--safe-b));left:50%;transform:translateX(-50%);background:var(--surface);border:1.5px solid var(--orange);border-radius:14px;padding:.75rem 1rem;z-index:950;display:flex;align-items:center;gap:10px;box-shadow:0 8px 30px rgba(0,0,0,.35);min-width:260px;max-width:90vw';
  banner.innerHTML=`
    <div style="flex:1;font-family:var(--display);font-size:.82rem;font-weight:600;color:var(--text)">
      📅 Daily auto-backup ready
      <div style="font-family:var(--mono);font-size:.65rem;color:var(--text-muted);margin-top:2px">Download backup file?</div>
    </div>
    <button id="autoBackupYes" style="height:34px;padding:0 12px;border-radius:9px;border:none;background:var(--orange);color:#fff;font-family:var(--display);font-weight:700;font-size:.78rem;cursor:pointer;white-space:nowrap">✓ Yes</button>
    <button id="autoBackupNo" style="height:34px;width:34px;border-radius:9px;border:1px solid var(--border2);background:var(--surface2);color:var(--text-muted);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center">✕</button>`;
  document.body.appendChild(banner);

  document.getElementById('autoBackupYes').onclick=()=>{
    banner.remove();
    if(_runBackupDownload()) toast('💾 Daily backup downloaded!',2500);
  };
  document.getElementById('autoBackupNo').onclick=()=>{
    banner.remove();
    toast('⏭ Auto-backup skipped',1800);
    // Still mark timestamp so we don't ask again until tomorrow
    localStorage.setItem('psx_last_backup',new Date().toISOString());
    updateBackupBadge();
  };

  // Auto-dismiss after 30s
  setTimeout(()=>{ if(document.getElementById('autoBackupBanner')) banner.remove(); },30000);
}

function updateBackupBadge(){
  const btn=document.getElementById('backupBtn'); if(!btn) return;
  const last=localStorage.getItem('psx_last_backup');
  if(last){
    const hrs=Math.floor((Date.now()-new Date(last).getTime())/3600000);
    const label=hrs<1?'<1h ago':hrs<24?hrs+'h ago':Math.floor(hrs/24)+'d ago';
    btn.title=`Last backup: ${label} — Click to backup now`;
  } else {
    btn.title='No backup yet — Click to backup now';
  }
}

// Auto backup once per day — check every 10 minutes
const DAY_MS = 86400000;
setInterval(()=>{
  const last=localStorage.getItem('psx_last_backup');
  if(!last||(Date.now()-new Date(last).getTime())>=DAY_MS){
    doBackup(true);
  }
}, 600000); // check every 10 minutes

document.getElementById('backupBtn').addEventListener('click',()=>doBackup(false));
updateBackupBadge();

// ── RESTORE BACKUP ──
document.getElementById('restoreBtn').addEventListener('click',()=>{
  if(!confirm('⚠️ Restore from a backup file?\n\nThis will REPLACE all current data. Make sure you have a recent backup first.\n\nContinue?')) return;
  document.getElementById('restoreFileInput').click();
});
document.getElementById('restoreFileInput').addEventListener('change',function(){
  const file=this.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const payload=JSON.parse(e.target.result);
      if(!payload||typeof payload!=='object') throw new Error('Invalid file');

      // Restore all available keys
      if(payload.cases)      { _toCache('psx_cases', payload.cases);      _fbWrite('psx_cases', payload.cases); }
      if(payload.archive)    { _toCache('psx_archive', payload.archive);  _fbWrite('psx_archive', payload.archive); }
      if(payload.ops)        { _toCache('psx_ops', payload.ops);          _fbWrite('psx_ops', payload.ops); }
      if(payload.opsArchive) { _toCache('psx_ops_arch', payload.opsArchive); _fbWrite('psx_ops_arch', payload.opsArchive); }
      if(payload.users)      { _toCache('psx_users', payload.users);      _fbWrite('psx_users', payload.users); }
      if(payload.shiftNotes) { _toCache('psx_shift', payload.shiftNotes); _fbWrite('psx_shift', payload.shiftNotes); }
      if(payload.links)      { _toCache('psx_links', payload.links);      _fbWrite('psx_links', payload.links); }
      if(payload.articles)   { _toCache('psx_articles', payload.articles);_fbWrite('psx_articles', payload.articles); }

      const ts=payload.timestamp?new Date(payload.timestamp).toLocaleString('en-GB'):'unknown';
      renderSidebar(); renderList(); updateCounts();
      toast('✅ Backup restored from '+ts, 3500);
    }catch(err){
      toast('❌ Invalid backup file: '+err.message, 3000);
    }
    this.value='';
  };
  reader.readAsText(file);
});

// ═══════════════════════════════════════════════════════

function init(){
  renderSidebar();
  if(currentUser){
    document.getElementById('welcomeScreen').style.display='none';
    document.getElementById('headerUser').textContent='👤 '+currentUser;
    document.getElementById('logoutBtn').style.display='flex';
  } else {
    renderWelcome();
  }
  startFirebaseSync();
  updateNotifBadge();
  updateOnlineBadge();
}
init();
</script>
