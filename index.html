<!DOCTYPE html>
<html lang="ar" dir="auto">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MUH Plastic Surgeons Handover ✌️</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<style>
/* المتغيرات والتنسيقات الأساسية من مشروعك الأصلي مع تحسينات */
:root {
  --bg:#0d0f14; --surface:#141720; --surface2:#1c2030;
  --primary:#4f86f7; --accent:#2ecc71; --danger:#e74c3c;
  --text:#eef0f5; --text-dim:#9499b0;
}

body {
  background: var(--bg); color: var(--text);
  font-family: 'Plus Jakarta Sans', 'Cairo', sans-serif;
  margin: 0; padding-bottom: 80px; overflow-x: hidden;
}

/* التنسيق الجديد للميكروفون */
.voice-input-wrapper {
  display: flex; gap: 8px; align-items: flex-end; width: 100%;
}
.mic-btn {
  background: var(--surface2); border: 1px solid var(--primary);
  color: var(--primary); border-radius: 10px; width: 45px; height: 45px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: 0.3s; flex-shrink: 0;
}
.mic-btn.recording {
  background: var(--danger); border-color: var(--danger);
  color: white; animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { box-shadow: 0 0 15px var(--danger); }
  100% { transform: scale(1); }
}

/* تصميم الكروت */
.case-card {
  background: var(--surface); margin: 12px; padding: 16px;
  border-radius: 16px; border: 1px solid #2a2e3f;
  box-shadow: 0 4px 20px rgba(0,0,0,0.2);
}

.sync-dot {
  width: 10px; height: 10px; border-radius: 50%; display: inline-block;
  margin-right: 8px; background: #555;
}
.sync-active { background: var(--accent); box-shadow: 0 0 8px var(--accent); }

/* زر الإضافة العائم */
.fab {
  position: fixed; bottom: 30px; right: 25px;
  width: 65px; height: 65px; background: var(--primary);
  border-radius: 20px; display: flex; align-items: center;
  justify-content: center; font-size: 30px; color: white;
  box-shadow: 0 10px 25px rgba(79,134,247,0.4); z-index: 100;
}

/* النموذج المنبثق */
.modal-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.85); display: none; z-index: 200;
  backdrop-filter: blur(5px);
}
.modal-content {
  background: var(--surface); margin: 20px auto; padding: 25px;
  width: 90%; max-width: 500px; border-radius: 24px;
  max-height: 85vh; overflow-y: auto;
}

input, textarea, select {
  width: 100%; padding: 12px; margin-top: 8px;
  background: var(--surface2); border: 1px solid #2a2e3f;
  border-radius: 10px; color: white; font-family: inherit;
}
</style>
</head>
<body>

<header style="padding: 20px; display: flex; justify-content: space-between; align-items: center;">
    <div>
        <h1 style="margin:0; font-size: 20px;">Handover <span style="color:var(--primary)">MUH</span></h1>
        <small id="statusText"><span class="sync-dot" id="syncDot"></span> جاري التزامن...</small>
    </div>
    <div style="font-size: 24px;">✌️</div>
</header>

<div id="mainContainer">
    <div id="casesList"></div>
</div>

<div class="fab" onclick="toggleModal(true)">+</div>

<div id="modalOverlay" class="modal-overlay">
    <div class="modal-content">
        <h2 style="margin-top:0">إضافة حالة مريض</h2>
        
        <label>اسم المريض</label>
        <input type="text" id="patientName" placeholder="Full Name">

        <label style="display:block; margin-top:15px;">التشخيص (Diagnosis)</label>
        <div class="voice-input-wrapper">
            <textarea id="diagnosis" rows="3" placeholder="اكتب أو استخدم المايك..."></textarea>
            <button class="mic-btn" id="micDx" onclick="runSpeech('diagnosis', 'micDx')">🎤</button>
        </div>

        <label style="display:block; margin-top:15px;">الخطة (Plan)</label>
        <div class="voice-input-wrapper">
            <textarea id="plan" rows="3" placeholder="الخطة العلاجية..."></textarea>
            <button class="mic-btn" id="micPlan" onclick="runSpeech('plan', 'micPlan')">🎤</button>
        </div>

        <div style="margin-top:25px; display:flex; gap:10px;">
            <button onclick="saveToCloud()" style="flex:2; background:var(--primary); color:white; border:none; padding:15px; border-radius:12px; font-weight:600;">حفظ للسحابة</button>
            <button onclick="toggleModal(false)" style="flex:1; background:transparent; color:var(--text-dim); border:none;">إلغاء</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, addDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    // إعدادات Firebase الخاصة بك
    // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyCZc8g17IYScKDJLYHrjuY749kTvzBvJi4",
  authDomain: "muh-plastic-handover.firebaseapp.com",
  databaseURL: "https://muh-plastic-handover-default-rtdb.firebaseio.com",
  projectId: "muh-plastic-handover",
  storageBucket: "muh-plastic-handover.firebasestorage.app",
  messagingSenderId: "366426667486",
  appId: "1:366426667486:web:086255fb4dba5b3a6a454f",
  measurementId: "G-RFC0MG5C69"
};

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const casesRef = collection(db, "muh_handover");

    // دالة الحفظ للسحابة
    window.saveToCloud = async function() {
        const name = document.getElementById('patientName').value;
        const diag = document.getElementById('diagnosis').value;
        const plan = document.getElementById('plan').value;

        if(!name || !diag) return alert("يرجى ملء الاسم والتشخيص");

        try {
            await addDoc(casesRef, {
                patientName: name,
                diagnosis: diag,
                plan: plan,
                createdAt: serverTimestamp()
            });
            toggleModal(false);
            resetForm();
        } catch (e) {
            alert("خطأ في الاتصال: " + e.message);
        }
    };

    // التزامن اللحظي بين الأجهزة
    onSnapshot(query(casesRef, orderBy("createdAt", "desc")), (snapshot) => {
        const list = document.getElementById('casesList');
        const syncDot = document.getElementById('syncDot');
        list.innerHTML = '';
        
        snapshot.forEach((doc) => {
            const data = doc.data();
            list.innerHTML += `
                <div class="case-card">
                    <div style="display:flex; justify-content:space-between;">
                        <span style="font-weight:800; color:var(--primary)">${data.patientName}</span>
                        <span style="font-size:12px; color:var(--text-dim)">${data.createdAt?.toDate().toLocaleTimeString() || ''}</span>
                    </div>
                    <div style="margin-top:10px; font-family:'IBM Plex Mono'">
                        <div style="font-size:14px; margin-bottom:5px;">📋 <b>Dx:</b> ${data.diagnosis}</div>
                        <div style="font-size:14px; color:var(--accent)">💡 <b>Plan:</b> ${data.plan}</div>
                    </div>
                </div>
            `;
        });
        syncDot.classList.add('sync-active');
        document.getElementById('statusText').innerText = "متصل سحابياً";
    });
</script>

<script>
    function toggleModal(show) {
        document.getElementById('modalOverlay').style.display = show ? 'block' : 'none';
    }

    function resetForm() {
        document.getElementById('patientName').value = '';
        document.getElementById('diagnosis').value = '';
        document.getElementById('plan').value = '';
    }

    // التعرف على الصوت (عربي/إنجليزي)
    function runSpeech(targetId, btnId) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) return alert("متصفحك لا يدعم التسجيل الصوتي");

        const rec = new SpeechRecognition();
        rec.lang = 'ar-SA'; // سيتعرف على الإنجليزية المدمجة أيضاً
        rec.interimResults = false;

        const btn = document.getElementById(btnId);
        const area = document.getElementById(targetId);

        rec.onstart = () => btn.classList.add('recording');
        rec.onend = () => btn.classList.remove('recording');

        rec.onresult = (e) => {
            const transcript = e.results[0][0].transcript;
            area.value += (area.value ? ' ' : '') + transcript;
        };

        rec.start();
    }
</script>

</body>
</html>
