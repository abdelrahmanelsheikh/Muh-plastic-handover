<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%230d0f14'/><rect x='20' y='20' width='140' height='140' rx='26' fill='url(%23g)'/><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%234f8ef7'/><stop offset='1' stop-color='%237b6cf6'/></linearGradient></defs><text x='90' y='112' text-anchor='middle' font-size='76' font-family='Arial'>✌️</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0f14;--surface:#141720;--surface2:#1c2030;--surface3:#242840;
  --border:#2a2f45;--border2:#353b55;
  --text:#e8eaf0;--text-dim:#8891b0;--text-muted:#4a5070;
  --blue:#4f8ef7;--blue-glow:rgba(79,142,247,.15);
  --orange:#f7884f;--orange-glow:rgba(247,136,79,.15);
  --green:#4fd9a0;--green-glow:rgba(79,217,160,.15);
  --red:#f75f5f;--yellow:#f7c84f;--purple:#a78bfa;
  --hdr:52px;--sidebar:72px;
  --mono:'IBM Plex Mono',monospace;
  --display:'Plus Jakarta Sans',sans-serif;
  --body:'Inter',sans-serif;
  --safe-b:env(safe-area-inset-bottom,0px);
}
body.light{
  --bg:#f0f2f7;--surface:#fff;--surface2:#f5f6fa;--surface3:#eceef5;
  --border:#dde0ec;--border2:#c8cce0;
  --text:#1a1d2e;--text-dim:#3d4466;--text-muted:#8890b5;
  --blue:#2c6ef2;--blue-glow:rgba(44,110,242,.12);
  --orange:#d96b20;--orange-glow:rgba(217,107,32,.12);
  --green:#0f9e68;--green-glow:rgba(15,158,104,.12);
  --red:#d93636;--yellow:#b36a00;--purple:#7c3aed;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:var(--body);background:var(--bg);color:var(--text);font-size:15px;-webkit-font-smoothing:antialiased}

/* ── HEADER ── */
.hdr{position:fixed;top:0;left:0;right:0;height:var(--hdr);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;padding:0 10px;z-index:200}
.hdr-logo{width:28px;height:28px;background:linear-gradient(135deg,var(--blue),#7b6cf6);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.hdr-title{font-family:var(--display);font-weight:800;font-size:.78rem;letter-spacing:-.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.hdr-right{display:flex;align-items:center;gap:5px;flex-shrink:0}
.hbtn{height:32px;min-width:32px;padding:0 6px;border:1px solid var(--border2);border-radius:9px;background:var(--surface2);color:var(--text-dim);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;position:relative;transition:all .15s}
.hbtn:active{transform:scale(.91)}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text-muted);flex-shrink:0;transition:background .3s}
.sync-dot.ok{background:var(--green)}
.sync-dot.busy{background:var(--yellow);animation:blink .8s infinite}
.sync-dot.err{background:var(--red)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes pulse-unstable{0%,100%{box-shadow:0 0 0 0 rgba(247,95,95,.5)}50%{box-shadow:0 0 0 5px rgba(247,95,95,0)}}

/* ── SIDEBAR ── */
.sidebar{position:fixed;top:var(--hdr);left:0;bottom:0;width:var(--sidebar);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;padding:4px 0 calc(4px + var(--safe-b))}
.sidebar::-webkit-scrollbar{display:none}
.tab-grp-label{font-family:var(--mono);font-size:.48rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);text-align:center;padding:6px 2px 2px;flex-shrink:0}
.tab-sep{width:36px;height:1px;background:var(--border);margin:3px auto;flex-shrink:0}
.tab-item{width:100%;min-height:50px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;font-family:var(--display);font-size:.5rem;font-weight:700;color:var(--text-muted);border-left:3px solid transparent;transition:all .18s;user-select:none;padding:0 2px;text-align:center;line-height:1.2;flex-shrink:0}
.tab-item .ti{font-size:16px;line-height:1}
.tab-item .tl{max-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tab-item .tbadge{font-family:var(--mono);font-size:.52rem;background:var(--surface2);color:var(--text-muted);border-radius:6px;padding:0 5px;min-width:18px;text-align:center}
.tab-item.active{color:var(--blue);border-left-color:var(--blue);background:var(--blue-glow)}
.tab-item.active .tbadge{background:var(--blue-glow);color:var(--blue)}
.tab-item.t-arch.active{color:var(--purple);border-left-color:var(--purple);background:rgba(167,139,250,.1)}
.tab-item.t-arch.active .tbadge{background:rgba(167,139,250,.15);color:var(--purple)}
.tab-item.t-ops.active{color:#f7884f;border-left-color:#f7884f;background:rgba(247,136,79,.1)}
.tab-item.t-ops.active .tbadge{background:rgba(247,136,79,.15);color:#f7884f}
.tab-item.t-ops-arch.active{color:#a0c4ff;border-left-color:#a0c4ff;background:rgba(160,196,255,.08)}
.tab-item.t-ops-arch.active .tbadge{background:rgba(160,196,255,.12);color:#a0c4ff}
.tab-item.t-shift.active{color:var(--green);border-left-color:var(--green);background:var(--green-glow)}
.tab-item.t-tools.active{color:var(--yellow);border-left-color:var(--yellow);background:rgba(247,200,79,.08)}
.tab-item.t-links.active{color:#4fd9e8;border-left-color:#4fd9e8;background:rgba(79,217,232,.08)}
.tab-item.t-articles.active{color:#f78bfa;border-left-color:#f78bfa;background:rgba(247,139,250,.08)}
.tab-item.t-allpts.active{color:#4fd9e8;border-left-color:#4fd9e8;background:rgba(79,217,232,.1)}
.tab-item.t-todo.active{color:var(--yellow);border-left-color:var(--yellow);background:rgba(247,200,79,.1)}
.tab-item.t-todo.active .tbadge{background:rgba(247,200,79,.15);color:var(--yellow)}
.tab-item.t-actlog.active{color:#a0e0ff;border-left-color:#a0e0ff;background:rgba(160,224,255,.08)}
.tab-item.t-actlog.active .tbadge{background:rgba(160,224,255,.12);color:#a0e0ff}
.tab-item.t-chat.active{color:#4fd9a0;border-left-color:#4fd9a0;background:rgba(79,217,160,.08)}
.tab-item.t-chat.active .tbadge{background:rgba(79,217,160,.12);color:#4fd9a0}
.tab-item.t-tutorial.active{color:#ffd97d;border-left-color:#ffd97d;background:rgba(255,217,125,.08)}
.tab-item.t-tutorial.active .tbadge{background:rgba(255,217,125,.12);color:#ffd97d}
/* ── Tutorial page ── */
.tut-wrap{padding:14px 12px 40px;display:flex;flex-direction:column;gap:16px;direction:rtl;font-family:var(--body)}
.tut-hero{background:linear-gradient(135deg,rgba(255,217,125,.15),rgba(255,217,125,.04));border:1.5px solid rgba(255,217,125,.25);border-radius:16px;padding:18px 16px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px}
.tut-hero-icon{font-size:2.4rem;line-height:1}
.tut-hero-title{font-family:var(--display);font-weight:800;font-size:1.05rem;color:#ffd97d}
.tut-hero-sub{font-size:.78rem;color:var(--text-muted);line-height:1.5}
.tut-section{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.tut-section-hd{display:flex;align-items:center;gap:8px;padding:11px 14px;background:var(--surface2);border-bottom:1px solid var(--border);cursor:pointer;user-select:none}
.tut-section-hd-icon{font-size:1.1rem;flex-shrink:0}
.tut-section-hd-title{font-family:var(--display);font-weight:700;font-size:.88rem;color:var(--text);flex:1}
.tut-section-hd-arrow{font-size:.7rem;color:var(--text-muted);transition:transform .2s;flex-shrink:0}
.tut-section-hd-arrow.open{transform:rotate(180deg)}
.tut-section-body{padding:12px 14px;display:flex;flex-direction:column;gap:10px}
.tut-section-body.hidden{display:none}
.tut-step{display:flex;gap:10px;align-items:flex-start}
.tut-step-num{width:22px;height:22px;border-radius:50%;background:rgba(255,217,125,.18);border:1.5px solid rgba(255,217,125,.4);color:#ffd97d;font-family:var(--display);font-weight:800;font-size:.7rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.tut-step-txt{font-size:.8rem;color:var(--text);line-height:1.6}
.tut-step-txt b{color:#ffd97d;font-weight:700}
.tut-icon-row{display:flex;flex-direction:column;gap:8px}
.tut-icon-item{display:flex;align-items:flex-start;gap:10px;padding:8px 10px;background:var(--surface2);border-radius:10px}
.tut-icon-em{font-size:1.2rem;flex-shrink:0;min-width:26px;text-align:center;margin-top:1px}
.tut-icon-txt{font-size:.78rem;color:var(--text);line-height:1.55}
.tut-icon-txt b{color:var(--text);font-weight:700}
.tut-icon-txt span{color:var(--text-muted);font-size:.72rem}
.tut-tip{display:flex;gap:8px;align-items:flex-start;padding:9px 11px;background:rgba(79,217,160,.07);border:1px solid rgba(79,217,160,.2);border-radius:10px}
.tut-tip-icon{font-size:1rem;flex-shrink:0}
.tut-tip-txt{font-size:.77rem;color:var(--text);line-height:1.55}
.tut-warn{display:flex;gap:8px;align-items:flex-start;padding:9px 11px;background:rgba(247,136,79,.07);border:1px solid rgba(247,136,79,.2);border-radius:10px}
.tut-warn-txt{font-size:.77rem;color:var(--text);line-height:1.55}
.tut-tab-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.tut-tab-chip{padding:7px 10px;border-radius:9px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;gap:6px;font-size:.75rem;color:var(--text)}
.tut-tab-chip span{font-size:.85rem}

/* ── ALL PATIENTS ── */
.allpts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;padding:10px}
.apt-card{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:10px 10px 8px;cursor:pointer;transition:border-color .15s,box-shadow .15s;position:relative;overflow:hidden;display:flex;flex-direction:column;gap:5px}
.apt-card:active{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-glow)}
.apt-card-tab{font-family:var(--mono);font-size:.52rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-bottom:1px}
.apt-card-name{font-family:var(--display);font-weight:700;font-size:.85rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.apt-card-meta{font-family:var(--mono);font-size:.6rem;color:var(--text-muted);display:flex;flex-direction:column;gap:1px}
.apt-card-photo{width:100%;height:72px;object-fit:cover;border-radius:9px;margin-top:3px;border:1px solid var(--border)}
.apt-card-nophoto{width:100%;height:48px;border-radius:9px;border:2px dashed var(--border2);display:flex;align-items:center;justify-content:center;font-size:.62rem;color:var(--text-muted);margin-top:3px;font-family:var(--mono)}
.apt-card-badge{position:absolute;top:7px;right:7px;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.6rem;font-family:var(--mono);font-weight:700;color:#fff}
.apt-search-bar{display:flex;align-items:center;gap:6px;padding:8px 10px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.apt-search-inp{flex:1;height:30px;background:var(--surface2);border:1.5px solid var(--border);border-radius:9px;color:var(--text);font-family:var(--body);font-size:.8rem;padding:0 10px;outline:none}
.apt-search-inp:focus{border-color:var(--blue)}
.apt-count{font-family:var(--mono);font-size:.62rem;color:var(--text-muted);flex-shrink:0}
.apt-wa-share-bar{display:flex;align-items:center;justify-content:center;padding:8px 12px 4px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.apt-wa-share-btn{display:flex;align-items:center;justify-content:center;gap:8px;height:40px;padding:0 28px;border-radius:20px;border:none;background:#25D366;color:#fff;font-family:var(--display);font-weight:700;font-size:.85rem;cursor:pointer;box-shadow:0 2px 10px rgba(37,211,102,.35);transition:opacity .15s,transform .1s}
.apt-wa-share-btn:active{opacity:.85;transform:scale(.97)}
/* photo upload overlay */
.apt-photo-overlay{position:fixed;inset:0;z-index:3000;background:rgba(0,0,0,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:14px}
.apt-photo-box{width:100%;max-width:400px;background:var(--surface);border-radius:18px;padding:18px;display:flex;flex-direction:column;gap:12px}
.apt-photo-title{font-family:var(--display);font-weight:800;font-size:1rem;color:var(--text)}
.apt-photo-sub{font-family:var(--mono);font-size:.65rem;color:var(--text-muted)}
.apt-preview-grid{display:flex;flex-wrap:wrap;gap:6px;max-height:180px;overflow-y:auto}
.apt-preview-img{width:64px;height:64px;object-fit:cover;border-radius:9px;border:1px solid var(--border);position:relative}
.apt-preview-wrap{position:relative;width:64px;height:64px}
.apt-preview-wrap .rm{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.7);color:#fff;border:none;border-radius:4px;width:16px;height:16px;font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.apt-upload-btn{height:42px;border-radius:11px;border:2px dashed var(--border2);background:var(--surface2);color:var(--text-muted);font-family:var(--display);font-weight:700;font-size:.82rem;cursor:pointer;width:100%;transition:all .15s}
.apt-upload-btn:active{border-color:var(--blue);color:var(--blue)}
.apt-action-row{display:flex;gap:8px}
.apt-save-btn{flex:1;height:42px;border-radius:11px;border:none;background:var(--blue);color:#fff;font-family:var(--display);font-weight:700;font-size:.85rem;cursor:pointer}
.apt-wa-btn{height:42px;padding:0 14px;border-radius:11px;border:none;background:#25D366;color:#fff;font-family:var(--display);font-weight:700;font-size:.82rem;cursor:pointer;display:flex;align-items:center;gap:6px;flex-shrink:0;transition:opacity .15s}
.apt-cancel-btn{height:42px;padding:0 16px;border-radius:11px;border:1.5px solid var(--border2);background:var(--surface2);color:var(--text-muted);font-family:var(--display);font-weight:700;font-size:.82rem;cursor:pointer}
/* ── TO-DO CARD ── */
.todo-card{background:var(--surface);border:1.5px solid var(--border);border-radius:16px;margin:10px 10px 0;overflow:hidden;flex-shrink:0}
.todo-card-hdr{display:flex;align-items:center;gap:8px;padding:10px 12px 8px;border-bottom:1px solid var(--border)}
.todo-card-title{font-family:var(--display);font-weight:800;font-size:.82rem;color:var(--text);flex:1;display:flex;align-items:center;gap:6px}
.todo-badge{font-family:var(--mono);font-size:.58rem;background:rgba(247,200,79,.15);color:var(--yellow);border:1px solid rgba(247,200,79,.3);border-radius:6px;padding:1px 6px;min-width:18px;text-align:center}
.todo-add-row{display:flex;gap:6px;padding:8px 12px;border-bottom:1px solid var(--border)}
.todo-add-inp{flex:1;height:30px;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--body);font-size:.8rem;padding:0 9px;outline:none;transition:border-color .2s}
.todo-add-inp:focus{border-color:var(--yellow)}
.todo-add-inp::placeholder{color:var(--text-muted)}
.todo-add-btn{height:30px;padding:0 11px;border-radius:8px;border:none;background:rgba(247,200,79,.2);color:var(--yellow);font-family:var(--display);font-weight:700;font-size:.75rem;cursor:pointer;flex-shrink:0;transition:all .15s}
.todo-add-btn:active{background:rgba(247,200,79,.35)}
.todo-list{display:flex;flex-direction:column;max-height:220px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.todo-list::-webkit-scrollbar{width:3px}
.todo-list::-webkit-scrollbar-thumb{background:var(--border)}
.todo-empty{padding:12px;text-align:center;font-family:var(--mono);font-size:.65rem;color:var(--text-muted)}
/* legacy todo-item (inside case cards) */
.todo-item{font-size:.8rem;padding:2px 0;display:flex;align-items:center;gap:5px;color:var(--text-dim)}
.todo-item.done{color:var(--text-muted);text-decoration:line-through}
.todo-check{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--border2);background:var(--surface2);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .15s;margin-top:1px}
.todo-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
.todo-text{font-size:.8rem;color:var(--text);line-height:1.4;word-break:break-word}
.todo-meta{font-family:var(--mono);font-size:.56rem;color:var(--text-muted);display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.todo-source-tag{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:0 4px;font-size:.52rem}
.todo-del{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:13px;padding:2px 4px;opacity:0;transition:opacity .15s;flex-shrink:0;align-self:flex-start}
.todo-expire-bar{height:2px;background:rgba(247,200,79,.25);position:relative;overflow:hidden;margin-top:4px}
.todo-expire-fill{height:100%;background:var(--yellow);transition:width .5s}
/* ── TODO MINI-CARDS GRID ── */
.todo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:10px;padding:10px}
.todo-minicard{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:10px 10px 8px;display:flex;flex-direction:column;gap:6px;position:relative;transition:border-color .18s,box-shadow .18s;overflow:hidden}
.todo-minicard.done{opacity:.6;border-style:dashed}
.todo-minicard:not(.done){border-left:3px solid var(--yellow)}
.todo-minicard.done{border-left:3px solid var(--green)}
.todo-minicard-top{display:flex;align-items:flex-start;gap:7px}
.todo-minicard-check{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--border2);background:var(--surface2);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .18s;margin-top:1px}
.todo-minicard.done .todo-minicard-check{background:var(--green);border-color:var(--green);color:#fff}
.todo-minicard-text{font-family:var(--display);font-weight:600;font-size:.8rem;color:var(--text);line-height:1.4;word-break:break-word;flex:1}
.todo-minicard.done .todo-minicard-text{text-decoration:line-through;color:var(--text-muted)}
.todo-minicard-del{position:absolute;top:6px;right:6px;background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:12px;padding:2px 5px;border-radius:6px;opacity:0;transition:opacity .15s}
.todo-minicard:hover .todo-minicard-del{opacity:1}
.todo-minicard-meta{display:flex;flex-wrap:wrap;gap:4px}
.todo-minicard-tag{font-family:var(--mono);font-size:.52rem;padding:1px 5px;border-radius:4px;background:var(--surface2);border:1px solid var(--border);color:var(--text-muted)}
.todo-minicard-tag.patient{background:rgba(79,142,247,.08);border-color:rgba(79,142,247,.2);color:var(--blue)}
.todo-minicard-tag.time{color:var(--text-muted)}
.todo-minicard-goto{width:100%;height:22px;border-radius:7px;border:1.5px solid rgba(79,142,247,.25);background:rgba(79,142,247,.06);color:var(--blue);font-family:var(--display);font-weight:700;font-size:.58rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:3px;transition:all .15s;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.todo-minicard-goto:active{background:var(--blue-glow);border-color:var(--blue)}
.todo-minicard-expbar{height:2px;background:rgba(247,200,79,.2);border-radius:1px;overflow:hidden;margin-top:2px}
.todo-minicard-expfill{height:100%;background:var(--green);border-radius:1px;transition:width .5s}
.todo-sec-label{font-family:var(--mono);font-size:.54rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);padding:10px 10px 2px;flex-shrink:0}
.todo-tab-topbar{display:flex;align-items:center;gap:6px;padding:8px 10px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.todo-tab-inp{flex:1;height:34px;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--body);font-size:.84rem;padding:0 10px;outline:none;transition:border-color .2s}
.todo-tab-inp:focus{border-color:var(--yellow);box-shadow:0 0 0 3px rgba(247,200,79,.12)}
.todo-tab-inp::placeholder{color:var(--text-muted)}
.todo-tab-addbtn{height:34px;padding:0 13px;border-radius:10px;border:none;background:rgba(247,200,79,.22);color:var(--yellow);font-family:var(--display);font-weight:700;font-size:.78rem;cursor:pointer;flex-shrink:0;transition:all .15s;white-space:nowrap}
.todo-tab-addbtn:active{background:rgba(247,200,79,.4)}
.todo-tab-wabtn{height:34px;padding:0 12px;border-radius:10px;border:none;background:#25D366;color:#fff;font-family:var(--display);font-weight:700;font-size:.75rem;cursor:pointer;flex-shrink:0;display:flex;align-items:center;gap:5px;transition:all .15s}
.todo-tab-wabtn:active{background:#1da851;transform:scale(.94)}
/* mini-card todo button */
.apt-todo-btn{width:100%;height:24px;border-radius:7px;border:1.5px solid rgba(247,200,79,.3);background:rgba(247,200,79,.08);color:var(--yellow);font-family:var(--display);font-weight:700;font-size:.58rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:3px;margin-top:4px;transition:all .15s}
.apt-todo-btn:active{background:rgba(247,200,79,.2);border-color:var(--yellow)}
.todo-goto-btn{display:inline-flex;align-items:center;gap:4px;margin-top:4px;height:22px;padding:0 8px;border-radius:6px;border:1.5px solid rgba(79,142,247,.3);background:rgba(79,142,247,.07);color:var(--blue);font-family:var(--display);font-weight:700;font-size:.6rem;cursor:pointer;transition:all .15s;white-space:nowrap;max-width:100%;overflow:hidden;text-overflow:ellipsis}
.todo-goto-btn:active{background:var(--blue-glow);border-color:var(--blue)}
/* mass send progress overlay */
.apt-mass-overlay{position:fixed;inset:0;z-index:4000;background:rgba(0,0,0,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:24px}
.apt-mass-box{width:100%;max-width:340px;background:var(--surface);border-radius:18px;padding:22px;display:flex;flex-direction:column;gap:14px;align-items:center}
.apt-mass-title{font-family:var(--display);font-weight:800;font-size:1rem;color:var(--text);text-align:center}
.apt-mass-prog-track{width:100%;height:6px;background:var(--surface3);border-radius:3px;overflow:hidden}
.apt-mass-prog-fill{height:100%;background:#25D366;border-radius:3px;transition:width .2s}
.apt-mass-status{font-family:var(--mono);font-size:.68rem;color:var(--text-muted);text-align:center}
.apt-mass-send-btn{height:46px;width:100%;border-radius:13px;border:none;background:#25D366;color:#fff;font-family:var(--display);font-weight:800;font-size:.92rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.apt-mass-send-btn:disabled{opacity:.5;cursor:not-allowed}
.apt-mass-cancel-btn{background:none;border:none;color:var(--text-muted);font-family:var(--display);font-size:.78rem;cursor:pointer;padding:4px}
.tab-item:active{background:var(--surface2)}

/* ── MAIN ── */
.main{position:fixed;top:var(--hdr);left:var(--sidebar);right:0;bottom:0;display:flex;flex-direction:column;overflow:hidden}
.toolbar{flex-shrink:0;display:flex;align-items:center;gap:6px;padding:8px 10px 6px;background:var(--surface);border-bottom:1px solid var(--border)}
.search-wrap{flex:1;position:relative;min-width:0}
.search-inp{width:100%;height:32px;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--body);font-size:.84rem;padding:0 32px 0 10px;outline:none;transition:border-color .2s}
.search-inp:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-glow)}
.search-inp::placeholder{color:var(--text-muted)}
.search-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:14px;display:none}
.tbtn{height:32px;min-width:32px;padding:0 8px;border:1px solid var(--border2);border-radius:9px;background:var(--surface2);color:var(--text-dim);font-size:.75rem;font-family:var(--display);font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s;display:flex;align-items:center;gap:4px}
.tbtn:active{transform:scale(.93)}
.tbtn.active{color:var(--blue);border-color:var(--blue);background:var(--blue-glow)}
.filter-bar{flex-shrink:0;display:flex;gap:5px;padding:6px 10px;overflow-x:auto;scrollbar-width:none;background:var(--surface);border-bottom:1px solid var(--border)}
.filter-bar::-webkit-scrollbar{display:none}
.fchip{height:26px;padding:0 10px;border-radius:20px;border:1.5px solid var(--border2);background:var(--surface2);color:var(--text-muted);font-family:var(--display);font-size:.68rem;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
.fchip.active{background:var(--blue-glow);border-color:var(--blue);color:var(--blue)}
.fchip:active{transform:scale(.93)}
.cases-list{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px 10px calc(70px + var(--safe-b));scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.cases-list::-webkit-scrollbar{width:3px}
.cases-list::-webkit-scrollbar-thumb{background:var(--border)}

/* ── FAB ── */
/* defined in improvements section below */

/* ── EMPTY STATE ── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:60px 20px;color:var(--text-muted)}
.empty-icon{font-size:44px;opacity:.4}
.empty-title{font-family:var(--display);font-weight:700;font-size:.95rem;color:var(--text-dim)}
.empty-sub{font-size:.78rem;text-align:center}

/* ── SWIPE CARD ── */
.swipe-wrapper{position:relative;overflow:hidden;border-radius:16px;margin-bottom:8px}
.swipe-bg-left{position:absolute;left:0;top:0;bottom:0;width:80px;background:var(--blue-glow);border-radius:16px 0 0 16px;display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--blue);pointer-events:none;opacity:0;transition:opacity .15s}
.swipe-bg-right{position:absolute;right:0;top:0;bottom:0;width:80px;background:rgba(79,217,160,.12);border-radius:0 16px 16px 0;display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--green);pointer-events:none;opacity:0;transition:opacity .15s}
.case-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;will-change:transform;transition:transform .25s cubic-bezier(.25,.46,.45,.94);touch-action:pan-y;position:relative;z-index:1}
.case-card.flagged{border-color:rgba(247,95,95,.4);box-shadow:0 0 0 2px rgba(247,95,95,.1)}
.card-top{padding:.7rem .9rem .5rem;display:flex;flex-direction:column;gap:4px}
.card-name{font-family:var(--display);font-weight:700;font-size:.95rem;color:var(--text);letter-spacing:-.01em}
.card-name.flagged::before{content:'🚨 ';font-size:.85em}
.card-meta{display:flex;flex-wrap:wrap;align-items:center;gap:5px;margin-top:2px}
.card-meta span{font-family:var(--mono);font-size:.6rem;color:var(--text-muted)}
.card-bed{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:1px 6px;color:var(--text-dim)!important}
.status-badge{display:inline-block;font-family:var(--mono);font-size:.6rem;font-weight:600;padding:2px 8px;border-radius:8px;border:1px solid}
.sb-stable{color:#fff;border-color:var(--green);background:var(--green);font-weight:700}
.sb-improving{color:#fff;border-color:var(--blue);background:var(--blue);font-weight:700}
.sb-unstable{color:#fff;border-color:var(--red);background:var(--red);font-weight:700;animation:pulse-unstable 1.6s infinite}
.sb-discharge{color:#fff;border-color:#4fa0d9;background:#4fa0d9;font-weight:700}
.card-dx{padding:.3rem .9rem .5rem;font-size:.82rem;color:var(--text-dim);line-height:1.45}
.card-actions-row{padding:.4rem .9rem .65rem;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.act-btn{width:32px;height:32px;border-radius:10px;border:1.5px solid var(--border2);background:var(--surface2);color:var(--text-muted);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.act-btn:active{transform:scale(.88)}
.act-btn.edit:active,.act-btn.edit:hover{color:var(--blue);border-color:var(--blue);background:var(--blue-glow)}
.act-btn.del:active,.act-btn.del:hover{color:var(--red);border-color:rgba(247,95,95,.4);background:rgba(247,95,95,.1)}
.act-btn.arch:active,.act-btn.arch:hover{color:var(--green);border-color:rgba(79,217,160,.4);background:var(--green-glow)}
.act-btn.flag-btn.on{color:var(--red);border-color:rgba(247,95,95,.4);background:rgba(247,95,95,.1)}
.act-btn.comment-btn{position:relative}
.comment-badge{position:absolute;top:-5px;right:-5px;background:var(--blue);color:#fff;font-size:.5rem;padding:1px 4px;border-radius:10px;min-width:16px;text-align:center;font-weight:700}
.qs-btn-sm{height:26px;padding:0 8px;border-radius:8px;border:1.5px solid var(--border2);background:var(--surface2);color:var(--text-muted);font-family:var(--mono);font-size:.6rem;cursor:pointer;transition:all .15s;flex-shrink:0}
.qs-btn-sm:active{transform:scale(.9)}
/* expand */
.card-expand-btn{width:100%;padding:.5rem .9rem;display:flex;align-items:center;justify-content:space-between;background:none;border:none;border-top:1px solid var(--border);color:var(--text-muted);font-family:var(--display);font-size:.72rem;font-weight:600;cursor:pointer;transition:color .15s}
.card-expand-btn:active{color:var(--blue)}
.expand-arr{transition:transform .2s;font-size:11px}
.card-details{display:none;border-top:1px solid var(--border);padding:.7rem .9rem .9rem;display:flex;flex-direction:column;gap:8px}
.card-details.closed{display:none}
.detail-label{font-family:var(--mono);font-size:.58rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:2px}
.detail-val{font-size:.82rem;color:var(--text-dim);line-height:1.4}
.lab-chip{display:inline-flex;align-items:center;gap:3px;border:1px solid var(--border2);border-radius:6px;padding:1px 6px;font-family:var(--mono);font-size:.62rem;margin:1px}
.lab-chip .lk{color:var(--text-muted)}
.lab-chip .lv{color:var(--text);font-weight:500}
.lab-chip.abn{border-color:rgba(247,95,95,.4);background:rgba(247,95,95,.08)}
.lab-chip.abn .lv{color:var(--red)}
.vtag{display:inline-block;font-family:var(--mono);font-size:.58rem;padding:1px 6px;border-radius:5px;background:var(--orange-glow);color:var(--orange);border:1px solid rgba(247,136,79,.3);margin:1px}
.med-chip{display:inline-block;font-family:var(--mono);font-size:.6rem;padding:2px 7px;border-radius:6px;background:var(--surface2);border:1px solid var(--border2);color:var(--text-dim);margin:1px}
.todo-item{font-size:.8rem;padding:2px 0;display:flex;align-items:center;gap:5px;color:var(--text-dim)}
.todo-item.done{color:var(--text-muted);text-decoration:line-through}
/* selection */
.swipe-wrapper.sel-on{outline:2px solid var(--blue);outline-offset:1px;border-radius:16px}
.swipe-wrapper.sel-on .case-card{background:rgba(79,142,247,.05)}
.sel-bar{position:fixed;bottom:0;left:var(--sidebar);right:0;background:var(--surface);border-top:1px solid var(--border2);padding:.6rem 10px calc(.6rem + var(--safe-b));display:none;align-items:center;gap:8px;z-index:160}
.sel-bar.show{display:flex}
.sel-count{font-family:var(--display);font-weight:700;font-size:.85rem;color:var(--blue);flex:1}
.sel-action-btn{height:34px;padding:0 12px;border-radius:10px;border:1.5px solid var(--border2);background:var(--surface2);color:var(--text-dim);font-family:var(--display);font-weight:600;font-size:.78rem;cursor:pointer;transition:all .15s}
.sel-action-btn:active{transform:scale(.93)}
.sel-action-btn.danger{color:var(--red);border-color:rgba(247,95,95,.4);background:rgba(247,95,95,.08)}
.sel-cancel-btn{height:34px;width:34px;border-radius:10px;border:1.5px solid var(--border2);background:var(--surface2);color:var(--text-muted);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}

/* ── SHEET / OVERLAY ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(5px);z-index:500;display:flex;align-items:flex-end;opacity:0;transition:opacity .22s;pointer-events:none}
.overlay.show{opacity:1;pointer-events:all}
.sheet{background:var(--surface);border-radius:24px 24px 0 0;width:100%;max-height:92vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1)}
.overlay.show .sheet{transform:translateY(0)}
.sheet-hdr{display:flex;align-items:center;justify-content:space-between;padding:.9rem 1rem .6rem;border-bottom:1px solid var(--border);flex-shrink:0}
.sheet-title{font-family:var(--display);font-weight:800;font-size:1rem;letter-spacing:-.02em}
.sheet-close{width:32px;height:32px;border-radius:10px;background:var(--surface2);border:1.5px solid var(--border2);color:var(--text-muted);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sheet-body{overflow-y:auto;flex:1;padding:1rem}
.sheet-footer{padding:.75rem 1rem calc(.75rem + var(--safe-b));border-top:1px solid var(--border);flex-shrink:0}
/* form fields */
.field-group{margin-bottom:.85rem}
.field-label{font-family:var(--mono);font-size:.6rem;color:var(--text-muted);letter-spacing:.08em;text-transform:uppercase;display:block;margin-bottom:4px}
.finp{width:100%;height:38px;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--body);font-size:.88rem;padding:0 10px;outline:none;transition:border-color .2s}
.finp:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-glow)}
.finp::placeholder{color:var(--text-muted)}
.ftextarea{width:100%;min-height:72px;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--body);font-size:.88rem;padding:8px 10px;outline:none;resize:vertical;transition:border-color .2s}
.ftextarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-glow)}
.ftextarea::placeholder{color:var(--text-muted)}
.fselect{width:100%;height:38px;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--body);font-size:.88rem;padding:0 10px;outline:none;cursor:pointer;transition:border-color .2s}
.fselect:focus{border-color:var(--blue)}
.toggle-group{display:flex;flex-wrap:wrap;gap:5px}
.toggle-btn{height:30px;padding:0 12px;border-radius:8px;border:1.5px solid var(--border2);background:var(--surface2);color:var(--text-muted);font-family:var(--display);font-size:.72rem;font-weight:600;cursor:pointer;transition:all .15s}
.toggle-btn.on{background:var(--blue-glow);border-color:var(--blue);color:var(--blue)}
.toggle-btn:active{transform:scale(.92)}
/* Status-specific colored toggle buttons */
.toggle-btn.status-stable.on{background:var(--green-glow);border-color:var(--green);color:var(--green)}
.toggle-btn.status-improving.on{background:var(--blue-glow);border-color:var(--blue);color:var(--blue)}
.toggle-btn.status-unstable.on{background:rgba(247,95,95,.1);border-color:var(--red);color:var(--red)}
.toggle-btn.status-discharge.on{background:rgba(79,160,217,.1);border-color:#4fa0d9;color:#4fa0d9}
.submit-btn{width:100%;height:44px;border-radius:12px;border:none;background:var(--blue);color:#fff;font-family:var(--display);font-weight:700;font-size:.92rem;cursor:pointer;transition:opacity .15s}
.submit-btn:active{opacity:.82}
.submit-btn.edit-mode{background:var(--green)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}

/* ── QUICK STATUS ── */
.qs-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);z-index:600;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .18s;pointer-events:none}
.qs-overlay.show{opacity:1;pointer-events:all}
.qs-card{background:var(--surface);border-radius:20px;padding:1.2rem;width:min(320px,90vw);display:flex;flex-direction:column;gap:10px}
.qs-name{font-family:var(--display);font-weight:700;font-size:.9rem;color:var(--text);text-align:center}
.qs-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.qs-opt{height:48px;border-radius:12px;border:2px solid var(--border2);background:var(--surface2);color:var(--text-muted);font-family:var(--display);font-weight:700;font-size:.82rem;cursor:pointer;transition:all .15s}
.qs-opt:active{transform:scale(.93)}
.qs-opt.on{border-color:var(--blue);background:var(--blue-glow);color:var(--blue)}
.qs-opt[data-s="Stable"].on{border-color:var(--green);background:var(--green-glow);color:var(--green)}
.qs-opt[data-s="Unstable"].on{border-color:var(--red);background:rgba(247,95,95,.1);color:var(--red)}
.qs-opt[data-s="Discharge"].on{border-color:#4fa0d9;background:rgba(79,160,217,.1);color:#4fa0d9}

/* ── TOAST ── */
.toast{position:fixed;bottom:calc(80px + var(--safe-b));left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface3);color:var(--text);font-family:var(--display);font-size:.82rem;font-weight:600;padding:.5rem 1.1rem;border-radius:12px;border:1px solid var(--border2);box-shadow:0 4px 20px rgba(0,0,0,.3);z-index:900;opacity:0;transition:opacity .2s,transform .2s;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── BADGE in header ── */
.notif-badge{position:absolute;top:-3px;right:-3px;background:var(--red);color:#fff;font-size:.5rem;font-weight:700;padding:1px 4px;border-radius:10px;min-width:16px;text-align:center;pointer-events:none}

/* ── WELCOME ── */
.welcome{position:fixed;inset:0;background:var(--bg);z-index:1000;display:flex;flex-direction:column;align-items:center;overflow:hidden}
.welcome-header{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:.5rem;padding:2rem 1.5rem 1.25rem;width:100%}
.ws-scroll-area{flex:1;overflow-y:auto;overflow-x:hidden;width:100%;display:flex;flex-direction:column;align-items:center;padding:.25rem 1.5rem calc(1.5rem + env(safe-area-inset-bottom,0px));scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.ws-scroll-area::-webkit-scrollbar{width:3px}
.ws-scroll-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.welcome-logo{width:64px;height:64px;background:linear-gradient(135deg,var(--blue),#7b6cf6);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:30px;margin-bottom:.5rem}
.welcome-title{font-family:var(--display);font-weight:800;font-size:1.35rem;letter-spacing:-.03em;color:var(--text);text-align:center}
.welcome-sub{font-family:var(--mono);font-size:.68rem;color:var(--text-muted);text-align:center}
.ws-box{width:100%;max-width:360px;display:flex;flex-direction:column;gap:.7rem}
.ws-user-card{display:flex;align-items:center;gap:.75rem;padding:.75rem 1rem;background:var(--surface);border:1.5px solid var(--border);border-radius:14px;cursor:pointer;transition:border-color .15s}
.ws-user-card:active{border-color:var(--blue)}
.ws-avatar{width:38px;height:38px;border-radius:10px;background:var(--blue);display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:800;font-size:1rem;color:#fff;flex-shrink:0}
.ws-user-name{font-family:var(--display);font-weight:700;font-size:.9rem;color:var(--text)}
.ws-user-status{font-family:var(--mono);font-size:.6rem}
.ws-sep{font-family:var(--mono);font-size:.62rem;color:var(--text-muted);text-align:center}
.ws-new-btn{height:46px;border-radius:13px;border:2px solid var(--blue);background:var(--blue-glow);color:var(--blue);font-family:var(--display);font-weight:700;font-size:.85rem;cursor:pointer;width:100%;transition:all .18s;display:flex;align-items:center;justify-content:center;gap:.4rem}
.ws-new-btn:active{background:rgba(79,142,247,.25)}
.ws-back{background:none;border:none;color:var(--text-muted);font-family:var(--display);font-size:.78rem;cursor:pointer;padding:.3rem;align-self:flex-start}
.ws-error{color:var(--red);font-family:var(--mono);font-size:.7rem;text-align:center;min-height:16px}

/* ── OPERATIONS TABLE ── */
.ops-wrap{padding:8px 10px calc(70px + var(--safe-b));overflow-y:auto;flex:1}
.ops-toolbar{display:flex;align-items:center;gap:6px;padding:6px 10px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.ops-table-wrap{overflow-x:auto;border-radius:14px;border:1px solid var(--border);background:var(--surface)}
.ops-table{width:100%;border-collapse:collapse;font-size:.78rem}
.ops-table th{background:var(--surface2);font-family:var(--mono);font-size:.58rem;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);padding:8px 10px;text-align:right;border-bottom:1px solid var(--border);white-space:nowrap;font-weight:500}
.ops-table td{padding:7px 10px;border-bottom:1px solid var(--border);color:var(--text-dim);vertical-align:middle;font-size:.8rem;text-align:right}
.ops-table tr:last-child td{border-bottom:none}
.ops-table tr:hover td{background:var(--surface2)}
.ops-day-badge{display:inline-block;font-family:var(--mono);font-size:.62rem;padding:2px 8px;border-radius:6px;background:var(--blue-glow);color:var(--blue);border:1px solid rgba(79,142,247,.3)}
.ops-section-hdr{font-family:var(--display);font-weight:700;font-size:.85rem;color:var(--text-dim);padding:8px 0 5px;display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--border);margin-bottom:6px}
.op-action-btn{width:26px;height:26px;border-radius:7px;border:1px solid var(--border2);background:var(--surface2);color:var(--text-muted);font-size:12px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.op-action-btn:active{transform:scale(.88)}
.op-action-btn.edit:hover{color:var(--blue);border-color:var(--blue);background:var(--blue-glow)}
.op-action-btn.del:hover{color:var(--red);border-color:rgba(247,95,95,.4);background:rgba(247,95,95,.1)}
.op-action-btn.rest:hover{color:var(--green);border-color:rgba(79,217,160,.4);background:var(--green-glow)}
.ops-export-btn{height:32px;padding:0 12px;border-radius:9px;border:1.5px solid var(--orange);background:var(--orange-glow);color:var(--orange);font-family:var(--display);font-weight:600;font-size:.75rem;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s}
.ops-export-btn:active{opacity:.8}
.act-btn.to-ops:active,.act-btn.to-ops:hover{color:var(--orange);border-color:rgba(247,136,79,.4);background:var(--orange-glow)}
/* ── TOOLS ── */
.tools-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:.5rem 0}
.tool-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.tool-card-hdr{padding:.65rem .8rem;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.tool-card-title{font-family:var(--display);font-weight:700;font-size:.78rem;color:var(--text);display:flex;align-items:center;gap:6px}
.tool-card-body{padding:.65rem .8rem .8rem;border-top:1px solid var(--border);display:none;flex-direction:column;gap:6px}
.tool-card-body.open{display:flex}
.tool-inp{width:100%;height:34px;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--body);font-size:.8rem;padding:0 8px;outline:none}
.tool-inp:focus{border-color:var(--blue)}
.tool-inp::placeholder{color:var(--text-muted)}
.tool-sel{width:100%;height:34px;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--body);font-size:.8rem;padding:0 8px;outline:none;cursor:pointer}
.tool-run-btn{width:100%;height:34px;border-radius:8px;border:none;background:var(--blue);color:#fff;font-family:var(--display);font-weight:700;font-size:.78rem;cursor:pointer}
.tool-run-btn:active{opacity:.82}
.tool-result{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:.6rem;font-size:.78rem;color:var(--text-dim);line-height:1.5;display:none}
.tool-result.show{display:block}
.tool-result strong{color:var(--text)}

/* ── NOTIFICATIONS SHEET ── */
.notif-row{display:flex;gap:10px;align-items:flex-start;padding:10px;border-radius:12px;margin-bottom:5px;cursor:pointer;transition:background .15s}
.notif-row.unread{background:rgba(79,142,247,.07);border:1px solid rgba(79,142,247,.15)}
.notif-row.read{background:var(--surface2)}
.notif-icon{font-size:20px;flex-shrink:0;margin-top:1px}
.notif-body{flex:1;min-width:0}
.notif-title{font-family:var(--display);font-weight:700;font-size:.82rem;color:var(--text)}
.notif-msg{font-size:.78rem;color:var(--text-dim);margin-top:2px;line-height:1.4}
.notif-time{font-family:var(--mono);font-size:.58rem;color:var(--text-muted);margin-top:3px}
.notif-dot{width:8px;height:8px;background:var(--blue);border-radius:50%;flex-shrink:0;margin-top:6px}

/* ── ARCHIVE TAGS ── */
.arch-tag{display:inline-block;font-family:var(--mono);font-size:.58rem;padding:1px 7px;border-radius:5px;background:rgba(167,139,250,.1);color:var(--purple);border:1px solid rgba(167,139,250,.25);margin-right:4px}
.arch-date{font-family:var(--mono);font-size:.58rem;color:var(--text-muted)}

/* ── SHIFT NOTES ── */
.sn-section{background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:.65rem;overflow:hidden}
.sn-section-hdr{padding:.65rem 1rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.sn-section-title{font-family:var(--display);font-weight:700;font-size:.82rem;color:var(--text);display:flex;align-items:center;gap:6px}
.sn-body{padding:.75rem 1rem}
.sn-ta{width:100%;min-height:80px;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--body);font-size:.85rem;padding:.55rem .8rem;resize:vertical;outline:none;transition:border-color .2s}
.sn-ta:focus{border-color:var(--blue)}
.sn-save-btn{width:100%;height:36px;border-radius:10px;border:none;background:var(--blue);color:#fff;font-family:var(--display);font-weight:700;font-size:.8rem;cursor:pointer;margin-top:.5rem}
.sn-log-item{padding:.5rem 0;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:2px}
.sn-log-item:last-child{border-bottom:none}
.sn-log-meta{font-family:var(--mono);font-size:.57rem;color:var(--text-muted);display:flex;gap:6px;align-items:center}
.sn-log-text{font-size:.82rem;color:var(--text-dim);line-height:1.45}
.sn-log-del{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:13px;padding:0 4px;margin-left:auto}
.sn-log-del:hover{color:var(--red)}

/* ── CONTACTS / USERS ── */
.user-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:.8rem 1rem;display:flex;align-items:center;gap:.75rem;margin-bottom:7px}
.user-avatar{width:40px;height:40px;border-radius:12px;background:var(--blue);display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:800;font-size:1.1rem;color:#fff;flex-shrink:0}
.user-name{font-family:var(--display);font-weight:700;font-size:.9rem;color:var(--text)}
.user-role{font-family:var(--mono);font-size:.62rem;color:var(--text-muted)}
.user-online{font-family:var(--mono);font-size:.6rem}
.online-dot{color:var(--green)}
.offline-dot{color:var(--text-muted)}

/* ── SORT DROPDOWN ── */
.sort-dropdown{position:absolute;top:calc(100% + 6px);right:0;background:var(--surface);border:1px solid var(--border2);border-radius:12px;overflow:hidden;z-index:300;min-width:150px;box-shadow:0 8px 30px rgba(0,0,0,.35);display:none}
.sort-dropdown.open{display:block;animation:dropIn .15s ease}
@keyframes dropIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.sort-opt{padding:.65rem 1rem;cursor:pointer;font-family:var(--body);font-size:.82rem;color:var(--text-dim);transition:background .1s;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)}
.sort-opt:last-child{border-bottom:none}
.sort-opt.active{color:var(--blue)}
.sort-opt:active{background:var(--surface2)}
.sort-wrap{position:relative}

/* ── PHOTO ── */
.photo-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.photo-thumb-wrap{position:relative;width:70px;height:70px;border-radius:10px;overflow:hidden;flex-shrink:0}
.photo-thumb{width:100%;height:100%;object-fit:cover;cursor:pointer}
.photo-del{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.65);color:#fff;border:none;border-radius:5px;width:18px;height:18px;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.photo-add-btn{width:70px;height:70px;border-radius:10px;border:2px dashed var(--border2);background:var(--surface2);color:var(--text-muted);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.photo-add-btn:active{border-color:var(--blue);color:var(--blue)}
.card-photos-strip{display:flex;gap:5px;overflow-x:auto;padding:.35rem .9rem .5rem;scrollbar-width:none}
.card-photos-strip::-webkit-scrollbar{display:none}
.card-photo-thumb{width:60px;height:60px;border-radius:9px;object-fit:cover;cursor:pointer;flex-shrink:0;border:1px solid var(--border)}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:1000;display:none;align-items:center;justify-content:center;flex-direction:column;gap:10px}
.lightbox.open{display:flex}
.lightbox img{max-width:95vw;max-height:80vh;border-radius:10px;object-fit:contain}
.lightbox-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.15);border:none;color:#fff;width:36px;height:36px;border-radius:10px;font-size:18px;cursor:pointer;z-index:10}
.lightbox-nav{display:flex;align-items:center;gap:12px;z-index:10}
.lightbox-nav-btn{background:rgba(255,255,255,.15);border:none;color:#fff;width:40px;height:40px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
.lightbox-nav-btn:active{background:rgba(255,255,255,.3)}
.lightbox-counter{font-family:var(--mono);font-size:.7rem;color:rgba(255,255,255,.5);min-width:40px;text-align:center}
.lightbox-ba-btn{height:32px;padding:0 14px;border-radius:10px;border:1.5px solid rgba(255,255,255,.25);background:rgba(255,255,255,.1);color:#fff;font-family:var(--display);font-weight:700;font-size:.75rem;cursor:pointer;transition:all .15s}
.lightbox-ba-btn.active{background:var(--blue);border-color:var(--blue)}
/* Before/After Slider */
.ba-slider-wrap{position:relative;display:inline-block;max-width:95vw;max-height:80vh;border-radius:10px;overflow:hidden;cursor:col-resize;user-select:none;flex-shrink:0}
.ba-slider-wrap img{display:block;max-width:95vw;max-height:80vh;object-fit:contain}
.ba-after-clip{position:absolute;inset:0;overflow:hidden}
.ba-after-clip img{position:absolute;top:0;left:0;max-width:95vw;max-height:80vh;object-fit:contain}
.ba-divider{position:absolute;top:0;bottom:0;width:3px;background:#fff;box-shadow:0 0 8px rgba(0,0,0,.6);cursor:col-resize;z-index:5}
.ba-handle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:36px;height:36px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 2px 10px rgba(0,0,0,.4);cursor:col-resize}
.ba-label{position:absolute;bottom:10px;font-family:var(--display);font-weight:700;font-size:.7rem;padding:3px 8px;border-radius:6px;color:#fff;backdrop-filter:blur(4px)}
.ba-label.before{left:10px;background:rgba(247,136,79,.8)}
.ba-label.after{right:10px;background:rgba(79,217,160,.8)}
/* Photo tag labels */
.photo-tag-btn{height:22px;padding:0 8px;border-radius:6px;border:1.5px solid var(--border2);background:var(--surface2);color:var(--text-muted);font-family:var(--mono);font-size:.58rem;cursor:pointer;transition:all .15s;white-space:nowrap}
.photo-tag-btn.active{border-color:var(--blue);color:var(--blue);background:var(--blue-glow)}
.photo-tag-btn.before-tag.active{border-color:var(--orange);color:var(--orange);background:var(--orange-glow)}
.photo-tag-btn.after-tag.active{border-color:var(--green);color:var(--green);background:rgba(79,217,160,.15)}
.photo-size-info{font-family:var(--mono);font-size:.55rem;color:var(--text-muted);text-align:center}
/* FCM notification permission banner */
.fcm-banner{position:fixed;bottom:calc(80px + var(--safe-b));left:10px;right:10px;background:var(--surface);border:1.5px solid var(--blue);border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:10px;z-index:500;box-shadow:0 4px 20px rgba(0,0,0,.3);animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.fcm-banner-txt{flex:1;font-family:var(--display);font-weight:600;font-size:.8rem;color:var(--text);line-height:1.4}
.fcm-banner-sub{font-size:.7rem;color:var(--text-muted);font-weight:400}
.fcm-allow-btn{height:34px;padding:0 14px;border-radius:10px;border:none;background:var(--blue);color:#fff;font-family:var(--display);font-weight:700;font-size:.78rem;cursor:pointer;flex-shrink:0}
.fcm-later-btn{height:34px;padding:0 10px;border-radius:10px;border:1px solid var(--border2);background:transparent;color:var(--text-muted);font-family:var(--display);font-weight:600;font-size:.75rem;cursor:pointer;flex-shrink:0}

/* ── CULTURES ── */
.culture-badge{font-family:var(--mono);font-size:.58rem;padding:1px 6px;border-radius:5px;margin-left:4px}
.cb-S{background:var(--green-glow);color:var(--green)}
.cb-R{background:rgba(247,95,95,.1);color:var(--red)}
.cb-P{background:var(--surface3);color:var(--text-muted)}

/* ── PREOP CHECKLIST ── */
.preop-badge{font-family:var(--mono);font-size:.6rem;padding:2px 8px;border-radius:6px;display:inline-flex;align-items:center}
.preop-done{background:var(--green-glow);color:var(--green)}
.preop-pending{background:var(--surface2);color:var(--text-muted)}

/* ── BURN/HAND/MAXFAC TAGS ── */
.spec-tag{display:inline-block;font-family:var(--mono);font-size:.58rem;padding:1px 7px;border-radius:5px;background:var(--orange-glow);color:var(--orange);border:1px solid rgba(247,136,79,.25);margin-right:3px}

/* ── PDF EXPORT ── */
.pdf-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(5px);z-index:800;display:none;align-items:flex-end}
.pdf-overlay.open{display:flex}
.pdf-sheet{background:var(--surface);border-radius:24px 24px 0 0;width:100%;max-height:90vh;display:flex;flex-direction:column}
#print-frame{position:fixed;left:-9999px;top:0;width:0;height:0;border:none;opacity:0}

/* scrollbar for sheet body */
.sheet-body::-webkit-scrollbar{width:3px}
.sheet-body::-webkit-scrollbar-thumb{background:var(--border)}

/* ── COMMENTS ── */
.comment-item{background:var(--surface2);border-radius:14px;padding:10px 12px;margin-bottom:8px;border-left:3px solid var(--border2)}
.comment-item.mine{border-left-color:var(--blue)}
.comment-author{font-family:var(--display);font-weight:700;font-size:.8rem;color:var(--text)}
.comment-time{font-family:var(--mono);font-size:.57rem;color:var(--text-muted)}
.comment-text{font-size:.82rem;color:var(--text-dim);margin-top:4px;line-height:1.45}
.mention{color:var(--blue);font-weight:500}

/* ── ONLINE BADGE ── */
.online-badge{font-family:var(--mono);font-size:.57rem;color:var(--green);background:var(--green-glow);border:1px solid rgba(79,217,160,.3);border-radius:7px;padding:1px 6px;margin-left:5px}

/* ── LINKS ── */
.link-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:.75rem 1rem;margin-bottom:8px;display:flex;align-items:center;gap:.75rem;transition:border-color .15s,box-shadow .15s}
.link-card:active{border-color:#4fd9e8;box-shadow:0 0 0 3px rgba(79,217,232,.1)}
.link-icon{width:38px;height:38px;border-radius:10px;background:rgba(79,217,232,.12);border:1px solid rgba(79,217,232,.25);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.link-title{font-family:var(--display);font-weight:700;font-size:.88rem;color:var(--text)}
.link-url{font-family:var(--mono);font-size:.58rem;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px}
.link-del-btn{margin-left:auto;background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:15px;flex-shrink:0;padding:4px;border-radius:8px;transition:color .15s}
.link-del-btn:hover{color:var(--red)}
.link-add-bar{display:flex;flex-direction:column;gap:7px;background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:.85rem;margin-bottom:12px}
.link-add-title{font-family:var(--mono);font-size:.6rem;color:var(--text-muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:2px}

/* ── ARTICLES ── */
.article-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:.8rem 1rem;margin-bottom:8px;cursor:pointer;transition:border-color .15s}
.article-card:active{border-color:#f78bfa}
.article-badge{display:inline-block;font-family:var(--mono);font-size:.55rem;padding:1px 7px;border-radius:5px;background:rgba(247,139,250,.12);color:#f78bfa;border:1px solid rgba(247,139,250,.25);margin-bottom:4px}
.article-title{font-family:var(--display);font-weight:700;font-size:.9rem;color:var(--text);line-height:1.35;margin-bottom:4px}
.article-body{font-size:.8rem;color:var(--text-dim);line-height:1.5;white-space:pre-wrap}
.article-meta{font-family:var(--mono);font-size:.57rem;color:var(--text-muted);margin-top:5px;display:flex;gap:8px;align-items:center}
.article-expand{max-height:80px;overflow:hidden;position:relative}
.article-expand::after{content:'';position:absolute;bottom:0;left:0;right:0;height:32px;background:linear-gradient(transparent,var(--surface))}
.article-expand.open{max-height:none}
.article-expand.open::after{display:none}
.article-add-form{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:.85rem;margin-bottom:12px;display:flex;flex-direction:column;gap:7px}

/* ── USER EDIT INLINE ── */
.user-edit-row{display:flex;gap:5px;margin-top:6px}
.user-edit-inp{flex:1;height:32px;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--body);font-size:.8rem;padding:0 8px;outline:none;transition:border-color .2s}
.user-edit-inp:focus{border-color:var(--blue)}
.user-edit-save{height:32px;padding:0 12px;border-radius:8px;border:none;background:var(--blue);color:#fff;font-family:var(--display);font-weight:700;font-size:.75rem;cursor:pointer;white-space:nowrap;flex-shrink:0}
.user-card-actions{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap}
.user-action-btn{height:28px;padding:0 10px;border-radius:7px;border:1.5px solid var(--border2);background:var(--surface2);color:var(--text-muted);font-family:var(--display);font-size:.68rem;font-weight:600;cursor:pointer;transition:all .15s}
.user-action-btn:hover{border-color:var(--blue);color:var(--blue)}
.user-action-btn.danger:hover{border-color:var(--red);color:var(--red)}
.user-contact-btns{display:flex;gap:5px;margin-top:6px}
.user-dial-btn{height:30px;padding:0 11px;border-radius:8px;border:1.5px solid rgba(79,217,160,.35);background:rgba(79,217,160,.08);color:var(--green);font-family:var(--display);font-size:.68rem;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:4px;text-decoration:none;transition:all .15s;flex:1;justify-content:center}
.user-dial-btn:active{background:rgba(79,217,160,.18);border-color:var(--green)}
.user-wa-btn{height:30px;padding:0 11px;border-radius:8px;border:1.5px solid rgba(37,211,102,.35);background:rgba(37,211,102,.08);color:#25D366;font-family:var(--display);font-size:.68rem;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:4px;text-decoration:none;transition:all .15s;flex:1;justify-content:center}
.user-wa-btn:active{background:rgba(37,211,102,.18);border-color:#25D366}

/* ── BUTTON IMPROVEMENTS ── */
.fab{position:fixed;right:14px;bottom:calc(18px + var(--safe-b));width:54px;height:54px;border-radius:18px;background:linear-gradient(135deg,var(--blue),#6b8ef7);border:none;color:#fff;font-size:26px;cursor:pointer;box-shadow:0 6px 24px rgba(79,142,247,.5);z-index:150;display:flex;align-items:center;justify-content:center;transition:all .2s}
.fab:hover{transform:scale(1.06);box-shadow:0 8px 28px rgba(79,142,247,.65)}
.fab:active{transform:scale(.92)}
.fab.hidden{display:none}
.hbtn{height:32px;min-width:32px;padding:0 8px;border:1px solid var(--border2);border-radius:9px;background:var(--surface2);color:var(--text-dim);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;position:relative;transition:all .18s}
.hbtn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-glow)}
.hbtn:active{transform:scale(.88)}
.submit-btn{width:100%;height:46px;border-radius:14px;border:none;background:linear-gradient(135deg,var(--blue),#6b8ef7);color:#fff;font-family:var(--display);font-weight:700;font-size:.95rem;cursor:pointer;transition:all .18s;box-shadow:0 4px 14px rgba(79,142,247,.35)}
.submit-btn:hover{box-shadow:0 6px 20px rgba(79,142,247,.5);transform:translateY(-1px)}
.submit-btn:active{opacity:.85;transform:translateY(0)}
.submit-btn.edit-mode{background:linear-gradient(135deg,var(--green),#3bc48a);box-shadow:0 4px 14px rgba(79,217,160,.3)}

/* ── ANIMATED SYNC DOT ── */
@keyframes pulse-ok{0%,100%{box-shadow:0 0 0 0 rgba(79,217,160,.4)}50%{box-shadow:0 0 0 4px rgba(79,217,160,.0)}}
.sync-dot.ok{background:var(--green);animation:pulse-ok 2s infinite}

/* ── INITIAL SYNC OVERLAY ── */
@keyframes syncbar{0%{width:0;margin-left:0}50%{width:60%;margin-left:20%}100%{width:0;margin-left:100%}}

/* ── ACTIVITY LOG ── */
.actlog-row{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);transition:background .15s}
.actlog-row:hover{background:var(--surface2)}
.actlog-icon{width:32px;height:32px;border-radius:9px;background:rgba(160,224,255,.1);border:1px solid rgba(160,224,255,.2);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;margin-top:2px}
.actlog-body{flex:1;min-width:0}
.actlog-action{font-family:var(--display);font-weight:600;font-size:.82rem;color:var(--text);line-height:1.3}
.actlog-meta{font-family:var(--mono);font-size:.58rem;color:var(--text-muted);margin-top:2px;display:flex;gap:6px;flex-wrap:wrap}
.actlog-user-chip{background:rgba(79,142,247,.1);color:var(--blue);border:1px solid rgba(79,142,247,.2);border-radius:5px;padding:0 5px}
.actlog-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:60px 20px;color:var(--text-muted)}
.actlog-filter-bar{display:flex;gap:5px;padding:8px 10px;overflow-x:auto;scrollbar-width:none;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.actlog-filter-bar::-webkit-scrollbar{display:none}

/* ── CHAT ── */
.chat-wrap{display:flex;flex-direction:column;height:100%;overflow:hidden}
.chat-msgs{flex:1;overflow-y:auto;padding:10px 12px calc(10px + var(--safe-b));display:flex;flex-direction:column;gap:8px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.chat-msgs::-webkit-scrollbar{width:3px}
.chat-msgs::-webkit-scrollbar-thumb{background:var(--border)}
.chat-day-sep{text-align:center;font-family:var(--mono);font-size:.58rem;color:var(--text-muted);padding:4px 0;margin:4px 0}
.chat-bubble-row{display:flex;align-items:flex-end;gap:6px;max-width:85%;position:relative;transition:transform .22s cubic-bezier(.25,.46,.45,.94)}
.chat-bubble-row.mine{align-self:flex-end;flex-direction:row-reverse}
.chat-bubble-row.theirs{align-self:flex-start}
.chat-avatar-sm{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:800;color:#fff;font-family:var(--display);flex-shrink:0;overflow:hidden}
.chat-avatar-sm img{width:100%;height:100%;object-fit:cover;border-radius:8px}
.chat-bubble{padding:8px 11px;border-radius:14px;max-width:100%;word-break:break-word;position:relative}
.chat-bubble-row.mine .chat-bubble{background:linear-gradient(135deg,var(--blue),#5a9fff);color:#fff;border-bottom-right-radius:4px}
.chat-bubble-row.theirs .chat-bubble{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-bottom-left-radius:4px}
.chat-bubble-name{font-family:var(--mono);font-size:.55rem;font-weight:700;margin-bottom:3px;opacity:.8}
.chat-bubble-text{font-size:.84rem;line-height:1.45;white-space:pre-wrap}
.chat-bubble-time{font-family:var(--mono);font-size:.5rem;margin-top:4px;opacity:.65;text-align:right;display:flex;align-items:center;justify-content:flex-end;gap:4px}
.chat-edited-label{font-size:.46rem;opacity:.6;font-style:italic}
.chat-reply-preview{background:rgba(255,255,255,.12);border-left:3px solid rgba(255,255,255,.5);border-radius:6px;padding:4px 7px;margin-bottom:5px;font-size:.72rem;line-height:1.3;opacity:.9}
.chat-bubble-row.theirs .chat-reply-preview{background:var(--surface3);border-left-color:var(--blue)}
.chat-input-bar{padding:8px 10px;background:var(--surface);border-top:1px solid var(--border);display:flex;flex-direction:column;gap:5px;flex-shrink:0}
.chat-reply-banner{display:flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:5px 8px;font-size:.75rem;color:var(--text-muted)}
.chat-reply-banner-text{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:var(--mono);font-size:.62rem}
.chat-reply-cancel{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:14px;flex-shrink:0}
.chat-edit-banner{display:flex;align-items:center;gap:6px;background:rgba(247,200,79,.1);border:1px solid rgba(247,200,79,.3);border-radius:9px;padding:5px 8px;font-size:.75rem;color:var(--yellow)}
.chat-edit-banner-text{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:var(--mono);font-size:.62rem;color:var(--text-muted)}
.chat-edit-cancel{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:14px;flex-shrink:0}
.chat-input-row{display:flex;gap:6px;align-items:flex-end}
.chat-inp{flex:1;min-height:36px;max-height:100px;background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-family:var(--body);font-size:.84rem;padding:8px 10px;outline:none;resize:none;transition:border-color .2s;overflow-y:auto;line-height:1.4}
.chat-inp:focus{border-color:var(--green)}
.chat-inp.editing{border-color:var(--yellow);box-shadow:0 0 0 3px rgba(247,200,79,.12)}
.chat-inp::placeholder{color:var(--text-muted)}
.chat-emoji-btn{height:36px;width:36px;border-radius:11px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text-muted);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.chat-emoji-btn:active{background:var(--surface3)}
.chat-photo-btn{height:36px;width:36px;border-radius:11px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text-muted);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.chat-photo-btn:active{background:var(--surface3);color:var(--blue)}
.chat-send-btn{height:36px;width:36px;border-radius:11px;border:none;background:var(--green);color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.chat-send-btn:active{opacity:.8;transform:scale(.9)}
.chat-send-btn.edit-mode{background:var(--yellow)}
.chat-emoji-picker{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:8px;display:flex;flex-wrap:wrap;gap:4px;max-height:140px;overflow-y:auto;margin-bottom:4px}
.chat-emoji-picker span{cursor:pointer;font-size:20px;padding:4px;border-radius:8px;transition:background .15s;line-height:1}
.chat-emoji-picker span:active{background:var(--surface2)}
.chat-msg-actions{position:absolute;top:-36px;right:0;display:flex;gap:3px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:3px 5px;box-shadow:0 4px 16px rgba(0,0,0,.3);z-index:10;white-space:nowrap}
.chat-bubble-row.mine .chat-msg-actions{right:0;left:auto}
.chat-bubble-row.theirs .chat-msg-actions{left:0;right:auto}
.chat-msg-action-btn{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:13px;padding:2px 5px;border-radius:6px;transition:background .15s}
.chat-msg-action-btn:hover{background:var(--surface2)}
.chat-unread-badge{position:absolute;top:-6px;right:-6px;min-width:18px;height:18px;border-radius:9px;background:var(--green);color:#fff;font-family:var(--mono);font-size:.55rem;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 4px;pointer-events:none}
/* chat photo bubble */
.chat-photo-img{max-width:200px;max-height:180px;border-radius:10px;display:block;cursor:pointer;object-fit:cover;margin-bottom:4px;border:1px solid rgba(255,255,255,.15)}
/* swipe-to-reply indicator */
.chat-reply-hint{position:absolute;top:50%;transform:translateY(-50%);font-size:18px;opacity:0;transition:opacity .15s;pointer-events:none;color:var(--blue)}
.chat-bubble-row.mine .chat-reply-hint{right:calc(100% + 6px);left:auto}
.chat-bubble-row.theirs .chat-reply-hint{left:calc(100% + 6px);right:auto}

/* ── PROFILE PIC ── */
.profile-pic-wrap{position:relative;width:42px;height:42px;cursor:pointer;flex-shrink:0}
.profile-pic-wrap img{width:42px;height:42px;object-fit:cover;border-radius:12px;border:2px solid var(--border)}
.profile-pic-edit{position:absolute;bottom:-4px;right:-4px;width:18px;height:18px;border-radius:50%;background:var(--blue);color:#fff;border:2px solid var(--surface);display:flex;align-items:center;justify-content:center;font-size:9px;pointer-events:none}
.ws-avatar-pic{width:54px;height:54px;border-radius:14px;object-fit:cover;border:2px solid var(--border)}

/* ── CHANGE PASSWORD ── */
.chpw-form{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:14px;margin-top:8px;display:flex;flex-direction:column;gap:8px}
.chpw-title{font-family:var(--display);font-weight:700;font-size:.88rem;color:var(--text)}
</style>
</head>
<body>



<!-- no splash screen -->

<!-- WELCOME SCREEN -->
<div class="welcome" id="welcomeScreen">
  <div class="welcome-header">
    <div class="welcome-logo">✌️</div>
    <div class="welcome-title">MUH Plastic Handover</div>
    <div class="welcome-sub">Mansoura University Hospital</div>
  </div>
  <div class="ws-scroll-area">
    <div class="ws-box" id="wsBox"><!-- filled by JS --></div>
  </div>
</div>

<!-- HEADER -->
<header class="hdr">
  <div class="hdr-logo">✌️</div>
  <div class="hdr-title">MUH Plastic ✌️</div>
  <div style="display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:.62rem;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">
    <span id="headerUser" style="color:var(--text-dim)"></span>
    <span id="onlineBadge" class="online-badge" style="display:none"></span>
  </div>
  <div class="hdr-right">
    <span class="sync-dot" id="syncDot" title="Sync"></span>
    <button class="hbtn" id="storiesBtn" title="Case Photos" style="font-size:13px">🖼️</button>
    <button class="hbtn" id="backupBtn" title="Backup data" style="font-size:13px">💾</button>
    <button class="hbtn" id="restoreBtn" title="Restore backup" style="font-size:13px">📂</button>
    <input type="file" id="restoreFileInput" accept=".json" style="display:none">
    <button class="hbtn" id="notifBtn" title="Notifications">🔔</button>
    <button class="hbtn" id="themeBtn" title="Toggle theme">☀️</button>
    <button class="hbtn" id="logoutBtn" title="Logout" style="display:none">🚪</button>
  </div>
</header>

<!-- SIDEBAR -->
<nav class="sidebar" id="sidebar"><!-- filled by JS --></nav>

<!-- MAIN -->
<main class="main">
  <!-- toolbar -->
  <div class="toolbar" id="toolbar">
    <div class="search-wrap">
      <input class="search-inp" id="searchInp" placeholder="Search..." autocomplete="off">
      <button class="search-clear" id="searchClear">✕</button>
    </div>
    <div class="sort-wrap">
      <button class="tbtn" id="sortBtn">⇅ Sort</button>
      <div class="sort-dropdown" id="sortDropdown">
        <div class="sort-opt active" data-sort="default">🕐 Default</div>
        <div class="sort-opt" data-sort="name">🔤 Name</div>
        <div class="sort-opt" data-sort="bed">🛏 Bed</div>
        <div class="sort-opt" data-sort="status">🟢 Status</div>
        <div class="sort-opt" data-sort="flagged">🚨 Flagged first</div>
      </div>
    </div>
    <button class="tbtn" id="pdfBtn" title="Export PDF">📄</button>
    <button class="tbtn" id="selBtn" title="Select">☑️</button>
  </div>
  <!-- filter chips -->
  <div class="filter-bar" id="filterBar">
    <button class="fchip active" data-f="all">All</button>
    <button class="fchip" data-f="Stable">Stable</button>
    <button class="fchip" data-f="Improving">Improving</button>
    <button class="fchip" data-f="Unstable">⚠️ Unstable</button>
    <button class="fchip" data-f="Discharge">Discharge</button>
    <button class="fchip" data-f="flagged">🚨 Flagged</button>
    <button class="fchip" data-f="operated">Operated</button>
    <button class="fchip" data-f="today">📅 Today</button>
    <button class="fchip" data-f="week">🗓 This Week</button>
    <button class="fchip" data-f="has_images">📷 Has Images</button>
    <button class="fchip" data-f="has_comments">💬 Has Comments</button>
    <button class="fchip" data-f="no_bed">🛏 No Bed</button>
  </div>
  <!-- list -->
  <div class="cases-list" id="casesList"></div>
</main>

<!-- FAB -->
<button class="fab" id="fabBtn" title="Add case">＋</button>

<!-- Selection bar -->
<div class="sel-bar" id="selBar">
  <span class="sel-count" id="selCount">0 selected</span>
  <button class="sel-action-btn" id="selMoveBtn">↗ Move</button>
  <button class="sel-action-btn" id="selArchBtn">🗂 Archive</button>
  <button class="sel-action-btn danger" id="selDelBtn">🗑 Delete</button>
  <button class="sel-cancel-btn" id="selCancelBtn">✕</button>
</div>

<!-- CASE FORM SHEET -->
<div class="overlay" id="caseOverlay">
  <div class="sheet" id="caseSheet">
    <div class="sheet-hdr">
      <div>
        <div class="sheet-title" id="sheetTitle">Add Case</div>
        <div style="font-family:var(--mono);font-size:.6rem;color:var(--text-muted);margin-top:2px" id="sheetMode">NEW</div>
      </div>
      <button class="sheet-close" id="sheetClose">✕</button>
    </div>
    <div class="sheet-body" id="sheetBody"><!-- filled by JS based on tab type --></div>
    <div class="sheet-footer">
      <button class="submit-btn" id="submitBtn">Add Case</button>
    </div>
  </div>
</div>

<!-- QUICK STATUS -->
<div class="qs-overlay" id="qsOverlay">
  <div class="qs-card">
    <div class="qs-name" id="qsName">—</div>
    <div class="qs-grid">
      <button class="qs-opt" data-s="Stable">Stable</button>
      <button class="qs-opt" data-s="Improving">Improving</button>
      <button class="qs-opt" data-s="Unstable">Unstable</button>
      <button class="qs-opt" data-s="Discharge">Discharge</button>
    </div>
    <button class="tbtn" id="qsCancel" style="width:100%;justify-content:center">Cancel</button>
  </div>
</div>

<!-- MOVE SHEET -->
<div class="overlay" id="moveOverlay">
  <div class="sheet">
    <div class="sheet-hdr">
      <div class="sheet-title">Move to Tab</div>
      <button class="sheet-close" id="moveClose">✕</button>
    </div>
    <div class="sheet-body" id="moveBody"></div>
  </div>
</div>

<!-- SEND TO OPS LIST SHEET -->
<div class="overlay" id="opsFormOverlay">
  <div class="sheet">
    <div class="sheet-hdr">
      <div>
        <div class="sheet-title">🏥 Add to Ops List</div>
        <div style="font-family:var(--mono);font-size:.6rem;color:var(--text-muted);margin-top:2px" id="opsFormMode">NEW</div>
      </div>
      <button class="sheet-close" id="opsFormClose">✕</button>
    </div>
    <div class="sheet-body" id="opsFormBody">
      <div class="two-col">
        <div class="field-group"><label class="field-label">Name *</label><input class="finp" id="opf_name" placeholder="Patient name" autocomplete="off"></div>
        <div class="field-group"><label class="field-label">Age</label><input class="finp" id="opf_age" type="number" placeholder="Age" min="0" max="120"></div>
      </div>
      <div class="field-group"><label class="field-label">Diagnosis</label><input class="finp" id="opf_dx" placeholder="Diagnosis"></div>
      <div class="field-group"><label class="field-label">Decision / Procedure</label><input class="finp" id="opf_decision" placeholder="e.g. Debridement + STSG"></div>
      <div class="field-group"><label class="field-label">Surgeon</label><input class="finp" id="opf_surgeon" placeholder="Operating surgeon"></div>
      <div class="field-group"><label class="field-label">Date of Operation</label><input class="finp" id="opf_date" type="date"></div>
      <div class="field-group"><label class="field-label">Day of Operation</label>
        <div class="toggle-group" id="opf_day_group"></div>
      </div>
      <div class="field-group"><label class="field-label">Notes (optional)</label><textarea class="ftextarea" id="opf_notes" placeholder="Additional notes..." rows="2"></textarea></div>
    </div>
    <div class="sheet-footer">
      <button class="submit-btn" id="opsFormSubmit">Add to Ops List</button>
    </div>
  </div>
</div>

<!-- NOTIFICATIONS SHEET -->
<div class="overlay" id="notifOverlay">
  <div class="sheet">
    <div class="sheet-hdr">
      <div>
        <div class="sheet-title">🔔 Notifications</div>
        <div style="font-family:var(--mono);font-size:.58rem;color:var(--text-muted);margin-top:2px">Firebase real-time</div>
      </div>
      <div style="display:flex;gap:6px;align-items:center">
        <button class="tbtn" id="notifMarkAll">✓ Read all</button>
        <button class="tbtn" id="notifClear">🗑</button>
        <button class="sheet-close" id="notifClose">✕</button>
      </div>
    </div>
    <div class="sheet-body" id="notifBody"></div>
  </div>
</div>

<!-- COMMENTS SHEET -->
<div class="overlay" id="commentsOverlay">
  <div class="sheet">
    <div class="sheet-hdr">
      <div>
        <div class="sheet-title">💬 Comments</div>
        <div style="font-family:var(--mono);font-size:.58rem;color:var(--text-muted);margin-top:2px" id="commentsPatientName"></div>
      </div>
      <button class="sheet-close" id="commentsClose">✕</button>
    </div>
    <div class="sheet-body" id="commentsBody"></div>
    <div class="sheet-footer" style="display:flex;gap:8px">
      <input class="finp" id="commentInp" placeholder="Add comment... @mention" style="flex:1">
      <button class="submit-btn" id="commentSend" style="width:auto;padding:0 16px">Send</button>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose">✕</button>
  <img id="lightboxImg" src="" alt="" style="display:none">
  <div id="lightboxBA" style="display:none"></div>
  <div class="lightbox-nav" id="lightboxNav" style="display:none">
    <button class="lightbox-nav-btn" id="lightboxPrev">‹</button>
    <span class="lightbox-counter" id="lightboxCounter"></span>
    <button class="lightbox-nav-btn" id="lightboxNext">›</button>
    <button class="lightbox-ba-btn" id="lightboxBABtn" style="display:none">⬛ Before/After</button>
  </div>
</div>

<!-- STORIES VIEWER -->
<div id="storiesOverlay" style="display:none;position:fixed;inset:0;z-index:2000;background:#000;flex-direction:column;touch-action:none">
  <!-- progress bars -->
  <div id="storiesProgress" style="display:flex;gap:3px;padding:10px 12px 6px;position:absolute;top:0;left:0;right:0;z-index:3">
  </div>
  <!-- top info bar -->
