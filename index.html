  <div style="position:absolute;top:30px;left:0;right:0;padding:8px 14px;z-index:3;display:flex;align-items:center;justify-content:space-between">
    <div style="display:flex;align-items:center;gap:8px">
      <div id="storiesAvatar" style="width:32px;height:32px;border-radius:9px;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:800;color:#fff;font-family:var(--display);flex-shrink:0"></div>
      <div>
        <div id="storiesName" style="font-family:var(--display);font-weight:700;font-size:.88rem;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.6)"></div>
        <div id="storiesMeta" style="font-family:var(--mono);font-size:.58rem;color:rgba(255,255,255,.65)"></div>
      </div>
    </div>
    <button id="storiesClose" style="background:rgba(255,255,255,.15);backdrop-filter:blur(6px);border:none;color:#fff;width:32px;height:32px;border-radius:10px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center">✕</button>
  </div>
  <!-- image -->

  <div id="storiesNext" style="position:absolute;right:0;top:0;bottom:0;width:35%;z-index:2;cursor:pointer"></div>
  <!-- pause on hold -->
  <div id="storiesHold" style="position:absolute;left:35%;right:35%;top:0;bottom:0;z-index:2"></div>
  <!-- counter -->
  <div id="storiesCounter" style="position:absolute;bottom:calc(20px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%);font-family:var(--mono);font-size:.62rem;color:rgba(255,255,255,.5);z-index:3;white-space:nowrap"></div>

  </div>

<script>
/* ═══════════════════════════════════════════════════
   STORIES VIEWER
   ═══════════════════════════════════════════════════ */
(function(){
  // Collect all photos across all cases
  function getStorySlides(){
    const cases = getCases();
    const slides = [];
    TABS.forEach(tab => {
      const arr = cases[tab.id] || [];
      arr.filter(Boolean).forEach(c => {
        if(c.photos && c.photos.length){
          c.photos.forEach(src => {
            slides.push({ src, name: c.patientName||c.name||'—', tab: tab.label, tabIcon: tab.icon, color: tab.color, bed: c.bed||'' });
          });
        }
      });
    });
    return slides;
  }

  let slides = [];
  let idx = 0;
  let autoTimer = null;
  let progTimer = null;
  let paused = false;
  const DURATION = 4000; // ms per slide
  let progStart = null;
  let progElapsed = 0;

  const overlay   = document.getElementById('storiesOverlay');
  const img       = document.getElementById('storiesImg');
  const nameEl    = document.getElementById('storiesName');
  const metaEl    = document.getElementById('storiesMeta');
  const avatarEl  = document.getElementById('storiesAvatar');
  const counterEl = document.getElementById('storiesCounter');
  const progressEl= document.getElementById('storiesProgress');
  const emptyEl   = document.getElementById('storiesEmpty');
  const prevZone  = document.getElementById('storiesPrev');
  const nextZone  = document.getElementById('storiesNext');
  const holdZone  = document.getElementById('storiesHold');
  const closeBtn  = document.getElementById('storiesClose');

  // ── progress bars ──────────────────────────────────
  function buildProgressBars(){
    progressEl.innerHTML = '';
    slides.forEach((_,i) => {
      const track = document.createElement('div');
      track.style.cssText = 'flex:1;height:3px;border-radius:2px;background:rgba(255,255,255,.25);overflow:hidden';
      const fill = document.createElement('div');
      fill.id = 'spb-' + i;
      fill.style.cssText = 'height:100%;width:0%;background:#fff;border-radius:2px;transition:none';
      track.appendChild(fill);
      progressEl.appendChild(track);
    });
  }

  function setBarFull(i){
    const b = document.getElementById('spb-'+i);
    if(b){ b.style.transition='none'; b.style.width='100%'; }
  }
  function setBarEmpty(i){
    const b = document.getElementById('spb-'+i);
    if(b){ b.style.transition='none'; b.style.width='0%'; }
  }
  function animateBar(i, elapsed){
    const b = document.getElementById('spb-'+i);
    if(!b) return;
    const pct = Math.min(100, (elapsed/DURATION)*100);
    b.style.transition = 'none';
    b.style.width = pct + '%';
    // smooth fill for remaining time
    const remaining = DURATION - elapsed;
    requestAnimationFrame(()=>{
      b.style.transition = `width ${remaining}ms linear`;
      b.style.width = '100%';
    });
  }
  function pauseBar(i){
    const b = document.getElementById('spb-'+i);
    if(!b) return;
    const cs = getComputedStyle(b);
    b.style.transition = 'none';
    b.style.width = cs.width; // freeze
  }

  // ── show slide ─────────────────────────────────────
  function showSlide(i, elapsed){
    if(!slides.length) return;
    idx = ((i % slides.length) + slides.length) % slides.length;
    const s = slides[idx];

    // flip animation
    img.style.transition = 'none';
    img.style.opacity = '0';
    img.style.transform = 'scale(.96)';
    img.src = s.src;
    requestAnimationFrame(()=>{
      requestAnimationFrame(()=>{
        img.style.transition = 'opacity .22s ease, transform .22s ease';
        img.style.opacity = '1';
        img.style.transform = 'scale(1)';
      });
    });

    // info
    avatarEl.textContent = (s.name||'?').charAt(0).toUpperCase();
    avatarEl.style.background = s.color || 'var(--blue)';
    nameEl.textContent = s.name;
    metaEl.textContent = s.tabIcon + ' ' + s.tab + (s.bed ? ' · Bed ' + s.bed : '');
    counterEl.textContent = (idx+1) + ' / ' + slides.length;

    // progress bars
    for(let j=0;j<idx;j++) setBarFull(j);
    for(let j=idx+1;j<slides.length;j++) setBarEmpty(j);
    animateBar(idx, elapsed||0);

    // auto-advance
    clearTimeout(autoTimer);
    const remaining = DURATION - (elapsed||0);
    progStart = Date.now();
    progElapsed = elapsed||0;
    autoTimer = setTimeout(()=>{ if(!paused) showSlide(idx+1,0); }, remaining);
  }

  // ── open / close ───────────────────────────────────
  function openStories(){
    slides = getStorySlides();
    overlay.style.display = 'flex';
    document.body.style.overflow = 'hidden';

    if(!slides.length){
      img.style.display = 'none';
      emptyEl.style.display = 'flex';
      progressEl.innerHTML = '';
      nameEl.textContent = '';
      metaEl.textContent = '';
      avatarEl.textContent = '';
      counterEl.textContent = '';
      return;
    }
    img.style.display = 'block';
    emptyEl.style.display = 'none';
    buildProgressBars();
    showSlide(0, 0);
  }

  function closeStories(){
    clearTimeout(autoTimer);
    overlay.style.display = 'none';
    document.body.style.overflow = '';
    paused = false;
  }

  // ── controls ───────────────────────────────────────
  prevZone.addEventListener('click', ()=>{
    clearTimeout(autoTimer);
    setBarEmpty(idx);
    showSlide(idx-1, 0);
  });
  nextZone.addEventListener('click', ()=>{
    clearTimeout(autoTimer);
    setBarFull(idx);
    showSlide(idx+1, 0);
  });

  // hold to pause
  function startPause(){
    if(!slides.length) return;
    paused = true;
    clearTimeout(autoTimer);
    progElapsed = progElapsed + (Date.now() - progStart);
    pauseBar(idx);
  }
  function endPause(){
    if(!slides.length || !paused) return;
    paused = false;
    showSlide(idx, progElapsed);
  }
  holdZone.addEventListener('mousedown', startPause);
  holdZone.addEventListener('touchstart', startPause, {passive:true});
  holdZone.addEventListener('mouseup', endPause);
  holdZone.addEventListener('touchend', endPause);

  closeBtn.addEventListener('click', closeStories);
  overlay.addEventListener('keydown', e=>{ if(e.key==='Escape') closeStories(); });

  // close on bg click (outside info bar)
  overlay.addEventListener('click', e=>{
    if(e.target===overlay) closeStories();
  });

  // wire header button
  document.getElementById('storiesBtn').addEventListener('click', openStories);
})();
</script>

// Cache version — bump this to invalidate ALL localStorage on next load.
// Change when data schema changes or stale cache bugs are reported.

const CACHE_VER_KEY = 'psx_cache_ver';

// On load: if version mismatch → wipe all psx_ keys from localStorage immediately.

(function _initCacheVersion(){

  if (stored !== CACHE_VERSION) {

    for (let i = 0; i < localStorage.length; i++) {

      if (k && k.startsWith('psx_') && k !== CACHE_VER_KEY) toDelete.push(k);
    }

// Per-key server-sync tracker:
// Once a key has been fetched from Supabase at least once, we mark it as "server-fresh".
// After that, localStorage is NEVER used for that key — only in-memory _cache.
// This prevents a page reload from serving stale localStorage while Supabase loads.
const _serverFresh = new Set(); // keys that have been confirmed from Supabase this session

function _fromCache(key, def) {
  // In-memory cache is always authoritative once set
  if (_cache[key] !== undefined) return _cache[key];
  // If we've already fetched this key from Supabase this session, don't fall back to localStorage
  // (it would be the old value — Supabase hasn't responded yet for this specific key)
  if (_serverFresh.has(key)) return def;
  // Cold start only: use localStorage as a display placeholder until Supabase responds
  try { return JSON.parse(localStorage.getItem(key)) ?? def; } catch(e){ return def; }
}

function _toCache(key, val) {
  _cache[key] = val;
  _serverFresh.add(key); // mark as server-confirmed — localStorage no longer authoritative
  try { localStorage.setItem(key, JSON.stringify(val)); } catch(e){}
}
// ═══════════════════════════════════════════════════════
// FIREBASE SYNC ENGINE
// ───────────────────────────────────────────────────────
// Design (simple & reliable):
//   • No splash screen — app loads from localStorage instantly
//   • Firebase Realtime DB as single source of truth
//   • .on('value') listener = instant push to all users
//   • Self-echo suppression: skip re-render for our own writes
//   • Optimistic updates: write to cache first, then to Firebase
//   • On login/re-login: Firebase delivers latest data immediately
// ═══════════════════════════════════════════════════════

// ── In-flight write tracker ─────────────────────────────
// Tracks writes we initiated so we can skip re-rendering our own echo.
// Key → Set of timestamps (ms) we wrote but haven't received back yet.
const _pendingWrites = {};  // key → Set<number>
let _fbListeners = {};      // key → Firebase ref listener handle

function _markWrite(key) {
  const ts = Date.now();
  if (!_pendingWrites[key]) _pendingWrites[key] = new Set();
  _pendingWrites[key].add(ts);
  // Auto-expire after 10s (safety net)
  setTimeout(() => { if (_pendingWrites[key]) _pendingWrites[key].delete(ts); }, 10000);
  return ts;
}

function _isSelfEcho(key) {
  // If we have any pending write for this key, this is our own echo — consume one entry
  if (!_pendingWrites[key] || _pendingWrites[key].size === 0) return false;
  const first = _pendingWrites[key].values().next().value;
  _pendingWrites[key].delete(first);
  return true;
}

// ── Firebase write ──────────────────────────────────────
// Simple set() — Firebase is the single source of truth.
// Returns a Promise.
function _fbWrite(key, val) {
  _markWrite(key);

  return ref.set(val === null ? null : val)
    .catch(e => {
      // Remove the pending mark so future echoes aren't falsely consumed
      if (_pendingWrites[key]) _pendingWrites[key].clear();
      console.warn('[FB] Write error', key, e);
      throw e;
    });
}

// ── Firebase patch (for users — merge single user only) ──
// Merges one user object into psx_data/psx_users/<devId>

async function _optimisticSave(key, newVal, getDefault) {

    ? JSON.parse(JSON.stringify(_cache[key]))
    : (getDefault ? getDefault() : null);

  _toCache(key, newVal);  // immediate local update

  try {
    await _fbWrite(key, newVal);
  } catch(e) {
    // Rollback

  if (Array.isArray(raw)) return raw;

  const v = (raw && typeof raw === 'object' && !Array.isArray(raw))

  return v;
}

// ── Parse Firebase snapshot value by key ───────────────
function _parseVal(key, raw) {
  if (key === 'psx_cases')   return _normCases(raw);
  if (key === 'psx_users')   return (raw && typeof raw === 'object' && !Array.isArray(raw)) ? raw : {};
  if (key === 'psx_shift')   return _normShift(raw);
  return _normArray(raw);
}

// ── Users structure snap (for online badge diffing) ─────
let _prevUsersSnap = '';
function _usersStructureSnap(users) {
  if (!users || typeof users !== 'object') return '';
  return Object.entries(users)
    .map(([id, u]) => id + '|' + (u.name||'') + '|' + (u.role||'') + '|' + (u.phone||'') + '|' + (u.avatar?'1':'0'))
    .sort().join(',');
}

// ═══════════════════════════════════════════════════════
// 4. FIREBASE SYNC — startSync()
// ═══════════════════════════════════════════════════════
const ALL_KEYS = ['psx_cases','psx_archive','psx_ops','psx_ops_arch',
                  'psx_users','psx_shift','psx_links','psx_articles','psx_todos',
                  'psx_actlog','psx_chat'];

function startSync() {
  setSyncDot('busy');
  _fbReady = true;

  // ── Realtime listener for each key ───────────────────
  // Firebase .on('value') fires:
  //   1. Immediately with current server value (replaces localStorage)
  //   2. On every remote change after that
  // Self-echo suppression: if we wrote this value, skip re-render.
  ALL_KEYS.forEach(key => {
    const ref = db.ref('psx_data/' + key);

    ref.on('value', snapshot => {
      const raw = snapshot.val();
      const val = _parseVal(key, raw);
      const selfEcho = _isSelfEcho(key);

      _toCache(key, val);

      if (selfEcho) {
        if (key === 'psx_cases' && _prevCasesSnap) {
          try { _prevCasesSnap = JSON.stringify(val); } catch(e) {}
        }
        return;
      }

      setSyncDot('ok');

      // Always re-render on any remote update
      if (['psx_cases','psx_archive','psx_ops','psx_ops_arch'].includes(key)) {
        renderList();
        updateCounts();
        if (key === 'psx_cases') _syncAllCaseTodosToGlobal();
      }
      if (key === 'psx_users') {
        updateOnlineBadge();
        if (currentTab === '__users__') renderList();
        _prevUsersSnap = _usersStructureSnap(val);
        // If welcome screen is still visible, re-render it with fresh user list from Firebase
        const ws = document.getElementById('welcomeScreen');
        if (ws && ws.style.display !== 'none') renderWelcome();
      }
      if (key === 'psx_shift'    && currentTab === '__shift__')    renderList();
      if (key === 'psx_links'    && currentTab === '__links__')    renderList();
      if (key === 'psx_articles' && currentTab === '__articles__') renderList();
      if (key === 'psx_todos')    _refreshTodoTab();
      if (key === 'psx_actlog'   && currentTab === '__actlog__')   renderList();
      if (key === 'psx_chat') {
        updateChatUnreadBadge();
        if(currentTab==='__chat__'){
          // Re-render just the messages area if visible, avoids losing input focus
          const msgsEl=document.getElementById('chatMsgs');
          if(msgsEl){ _renderChatMessages(msgsEl); msgsEl.scrollTop=msgsEl.scrollHeight; markChatRead(); }
          else renderList();
        }
      }
      if (key === 'psx_cases') {
        if (_prevCasesSnap) {
          try { diffCases(JSON.parse(_prevCasesSnap), val); } catch(e) {}
        }
        try { _prevCasesSnap = JSON.stringify(val); } catch(e) {}
      }
    }, err => {
      console.warn('[FB] Listener error', key, err);
      setSyncDot('err');
    });

    _fbListeners[key] = ref;
  });

  // Connection state indicator
  db.ref('.info/connected').on('value', snap => {
    setSyncDot(snap.val() === true ? 'ok' : 'err');
  });
}

// Alias
function startFirebaseSync() { startSync(); }

function esc(s){ if(!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(d){ if(!d) return '—'; const p=d.split('-'); return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:d; }
function timeAgo(ts){
  if (!ts) return '';
  const d = Date.now() - new Date(ts).getTime();
  if (d<60000) return 'just now';
  if (d<3600000) return Math.floor(d/60000)+'m ago';
  if (d<86400000) return Math.floor(d/3600000)+'h ago';
  return Math.floor(d/86400000)+'d ago';
}
function toast(msg, dur=2200){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');

const TODO_EXPIRE_MS = 24 * 60 * 60 * 1000; // 24 hours after check

function _cleanExpiredTodos(){
  const now = Date.now();
  const all  = getTodos();
  const kept = all.filter(t => {
    if (!t.checkedAt) return true;
    return (now - t.checkedAt) < TODO_EXPIRE_MS;
  });
  // sync expired items back to original case cards (remove them)
  const expired = all.filter(t => t.checkedAt && (now - t.checkedAt) >= TODO_EXPIRE_MS);
  expired.forEach(t => { if (t.caseId && t.tabId) _syncTodoToCase(t.caseId, t.tabId, t.text, 'remove'); });
  saveTodos(kept);
  return kept;
}

// Sync a todo state change back to the original patient card's c.todos[]
function _syncTodoToCase(caseId, tabId, text, action /* 'check'|'uncheck'|'remove' */){
  const cases = getCases();
  const arr = cases[tabId];
  if (!arr) return;
  const idx = arr.findIndex(c => c && c._id === caseId);
  if (idx < 0) return;
  const c = { ...arr[idx] };
  if (!c.todos || !c.todos.length) return;
  const tIdx = c.todos.findIndex(t => t.text === text);
  if (tIdx < 0) return;
  c.todos = c.todos.map((t, i) => i !== tIdx ? t : { ...t, done: action === 'check' });
  if (action === 'remove') c.todos = c.todos.filter((_, i) => i !== tIdx);
  c._rev = (c._rev || 0) + 1;
  arr[idx] = c;
  saveCases(cases);
}

function _shareTodoToWhatsApp(){
  const todos = _cleanExpiredTodos();
  const pending = todos.filter(t => !t.checkedAt);
  const done    = todos.filter(t =>  t.checkedAt);
  if (!todos.length) { toast('📋 No tasks to share', 1800); return; }

  const date = new Date().toLocaleDateString('en-GB',{weekday:'long',day:'2-digit',month:'short',year:'numeric'});
  const time = new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  const lines = [];

  lines.push('✅ *MUH Plastic Surgery — To-Do List*');
  lines.push('📅 ' + date + '  🕐 ' + time);
  lines.push('');

  if (pending.length) {
    lines.push('━━━━━━━━━━━━━━━━━━━━━');
    lines.push('📌 *Pending Tasks (' + pending.length + ')*');
    lines.push('━━━━━━━━━━━━━━━━━━━━━');

    // Group by patient
    const byPatient = {};
    const noPatient = [];
    pending.forEach(t => {
      if (t.patientName) {
        if (!byPatient[t.patientName]) byPatient[t.patientName] = { tabLabel: t.tabLabel, tasks: [] };
        byPatient[t.patientName].tasks.push(t);
      } else {
        noPatient.push(t);
      }
    });

    Object.entries(byPatient).forEach(([name, g]) => {
      lines.push('');
      lines.push('👤 *' + name + '*' + (g.tabLabel ? '  [' + g.tabLabel + ']' : ''));
      g.tasks.forEach((t, i) => {
        lines.push('  ' + (i+1) + '. ⬜ ' + t.text);
      });
    });

    if (noPatient.length) {
      lines.push('');
      lines.push('📋 *General Tasks*');
      noPatient.forEach((t, i) => {
        lines.push('  ' + (i+1) + '. ⬜ ' + t.text);
      });
    }
    lines.push('');
  }

  if (done.length) {
    lines.push('━━━━━━━━━━━━━━━━━━━━━');
    lines.push('✔️ *Done (' + done.length + ')*');
    lines.push('━━━━━━━━━━━━━━━━━━━━━');
    done.forEach((t, i) => {
      const patient = t.patientName ? ' 👤 ' + t.patientName : '';
      lines.push('  ' + (i+1) + '. ✅ ' + t.text + patient);
    });
    lines.push('');
  }

  lines.push('_Sent from MUH Plastic Handover_ ✌️');

  const text = lines.join('\n');
  window.open('https://wa.me/?text=' + encodeURIComponent(text), '_blank');
}

function _makeTodoMiniCard(t, scrollArea){
  const isDone = !!t.checkedAt;
  const now = Date.now();
  const remaining = isDone ? Math.max(0, TODO_EXPIRE_MS - (now - t.checkedAt)) : 0;
  const expirePct = isDone ? Math.min(100, ((now - t.checkedAt) / TODO_EXPIRE_MS) * 100) : 0;
  const remTxt = isDone ? _fmtRemaining(remaining) : '';

  const card = document.createElement('div');
  card.className = 'todo-minicard' + (isDone ? ' done' : '');
  card.dataset.id = t.id;

  const patientTag = t.patientName
    ? `<span class="todo-minicard-tag patient">👤 ${esc(t.patientName)}</span>`
    : '';
  const tabTag = t.tabLabel
    ? `<span class="todo-minicard-tag">${esc(t.tabLabel)}</span>`
    : '';
  const timeTxt = isDone
    ? `<span class="todo-minicard-tag time">⏳ ${remTxt}</span>`
    : `<span class="todo-minicard-tag time">${_fmtAgo(t.createdAt)}</span>`;
  const addedBy = t.addedBy
    ? `<span class="todo-minicard-tag">🧑‍⚕️ ${esc(t.addedBy)}</span>`
    : '';
  const expBar = isDone
    ? `<div class="todo-minicard-expbar"><div class="todo-minicard-expfill" style="width:${expirePct}%"></div></div>`
    : '';
  const gotoBtn = (t.caseId && t.tabId)
    ? `<button class="todo-minicard-goto" data-goto-case="${esc(t.caseId)}" data-goto-tab="${esc(t.tabId)}">🔗 ${esc(t.patientName||'Go to patient')}</button>`
    : '';

  card.innerHTML = `
    <button class="todo-minicard-del" data-del="${t.id}" title="Delete">✕</button>
    <div class="todo-minicard-top">
      <div class="todo-minicard-check" data-check="${t.id}">${isDone ? '✓' : ''}</div>
      <div class="todo-minicard-text">${esc(t.text)}</div>
    </div>
    <div class="todo-minicard-meta">
      ${patientTag}${tabTag}${timeTxt}${addedBy}
    </div>
    ${expBar}
    ${gotoBtn}`;

  // events
  card.querySelector('[data-check]').addEventListener('click', () => {
    _toggleTodo(t.id);
    _renderTodoTabItems(scrollArea);
  });
  card.querySelector('[data-del]').addEventListener('click', e => {
    e.stopPropagation();
    card.style.transform = 'scale(.92)';
    card.style.opacity = '.3';
    card.style.transition = 'all .18s';
    setTimeout(() => {
      _deleteTodo(t.id);
      _renderTodoTabItems(scrollArea);
    }, 180);
  });
  if (t.caseId && t.tabId) {
    card.querySelector('[data-goto-case]').addEventListener('click', e => {
      e.stopPropagation();
      navigateToCase(t.caseId, t.tabId);
    });
  }

  return card;
}

function _refreshTodoTab(){
  if (currentTab !== '__todo__') { updateCounts(); return; }
  const listArea = document.getElementById('todoTabList');
  if (listArea) _renderTodoTabItems(listArea);
  else renderList();
}

function navigateToCase(caseId, tabId){
  if (!caseId || !tabId) return;
  // switch to the right tab
  switchTab(tabId);
  // after render, scroll to and highlight the card
  setTimeout(() => {
    const card = document.querySelector(`.case-card`);
    // find the specific wrapper whose card matches
    const allWrappers = document.querySelectorAll('.swipe-wrapper');
    let target = null;
    allWrappers.forEach(w => {
      const editBtn = w.querySelector(`[data-edit="${caseId}"]`);
      if (editBtn) target = w;
    });
    if (target) {
      target.scrollIntoView({ behavior: 'smooth', block: 'center' });
      // flash highlight
      const inner = target.querySelector('.case-card');
      if (inner) {
        inner.style.transition = 'box-shadow .2s';
        inner.style.boxShadow = '0 0 0 3px var(--yellow)';
        setTimeout(() => { inner.style.boxShadow = ''; }, 1800);
      }
    }
  }, 300);
}

function _addTodoItem(text, patientName, tabLabel, caseId, tabId){
  const todos = getTodos();
  // avoid exact duplicates from repeated form saves
  const dup = todos.find(t => t.text===text && t.caseId===caseId);
  if (dup) return;
  todos.unshift({
    id: 'td_' + Date.now() + '_' + Math.random().toString(36).slice(2,6),
    text,
    patientName: patientName || null,
    tabLabel:    tabLabel    || null,
    caseId:      caseId      || null,
    tabId:       tabId       || null,
    addedBy:     currentUser || null,
    createdAt:   Date.now(),
    checkedAt:   null
  });
  saveTodos(todos);

  // Also push into the original patient card's c.todos[] (mini-card → main card sync)
  if (caseId && tabId) {
    const cases = getCases();
    const arr = cases[tabId];
    if (arr) {
      const idx = arr.findIndex(c => c && c._id === caseId);
      if (idx >= 0) {
        const c = { ...arr[idx] };
        if (!c.todos) c.todos = [];
        if (!c.todos.find(t => t.text === text)) {
          c.todos = [...c.todos, { text, done: false }];
          c._rev = (c._rev || 0) + 1;
          arr[idx] = c;
          saveCases(cases);
        }
      }
    }
  }
}

// ── Sync ALL case todos → global psx_todos ─────────────────────────────────
// Called every time psx_cases arrives from Firebase.
// For each case, each todo in c.todos[] is merged into global todos list.
// Never creates duplicates (keyed by caseId + text).
// Never overwrites existing checkedAt / done state in global todos.
function _syncAllCaseTodosToGlobal(){
  const cases = getCases();
  let todos = getTodos();
  let changed = false;

  TABS.forEach(tab => {
    const arr = cases[tab.id] || [];
    arr.filter(Boolean).forEach(c => {
      if (!c._id || !c.todos || !c.todos.length) return;
      c.todos.forEach(ct => {
        if (!ct || !ct.text) return;
        // Check if this combo (caseId+text) already exists in global list
        const exists = todos.find(t => t.caseId === c._id && t.text === ct.text);
        if (!exists) {
          todos.unshift({
            id: 'td_' + Date.now() + '_' + Math.random().toString(36).slice(2,6) + '_' + Math.random().toString(36).slice(2,4),
            text: ct.text,
            patientName: c.patientName || null,
            tabLabel: tab.label || null,
            caseId: c._id,
            tabId: tab.id,
            addedBy: c.addedBy || null,
            createdAt: c.addedAt ? new Date(c.addedAt).getTime() : Date.now(),
            checkedAt: ct.done ? (Date.now() - 1000) : null  // mark done ones as just-done
          });
          changed = true;
        } else {
          // If case card todo was marked done but global todo isn't — update global
          if (ct.done && !exists.checkedAt) {
            exists.checkedAt = Date.now() - 1000;
            changed = true;
          }
          // If global was un-checked but case card says not done — keep global state (user explicitly unchecked)
        }
      });
    });
  });

  if (changed) {
    saveTodos(todos);
    _refreshTodoTab();
    updateCounts();
  }
}

function _toggleTodo(id){
  const todos = getTodos();
  const t = todos.find(x => x.id === id);
  if (!t) return;
  const willBeChecked = !t.checkedAt;
  const updated = todos.map(x =>
    x.id !== id ? x : { ...x, checkedAt: willBeChecked ? Date.now() : null }
  );
  saveTodos(updated);
  if (t.caseId && t.tabId) _syncTodoToCase(t.caseId, t.tabId, t.text, willBeChecked ? 'check' : 'uncheck');
}

function _deleteTodo(id){
  const todos = getTodos();
  const t = todos.find(x => x.id === id);
  saveTodos(todos.filter(x => x.id !== id));
  if (t && t.caseId && t.tabId) _syncTodoToCase(t.caseId, t.tabId, t.text, 'remove');
}

function _fmtRemaining(ms){
  const h = Math.floor(ms / 3600000);
  const m = Math.floor((ms % 3600000) / 60000);
  if (h > 0) return h + 'h ' + m + 'm';
  return m + 'm';
}

function _fmtAgo(ts){
  const diff = Date.now() - ts;
  const m = Math.floor(diff / 60000);
  if (m < 1)  return 'just now';
  if (m < 60) return m + 'm ago';
  const h = Math.floor(m / 60);
  if (h < 24) return h + 'h ago';
  return Math.floor(h / 24) + 'd ago';
}

        <svg viewBox="0 0 24 24" width="18" height="18" fill="#fff"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
        Send via WhatsApp
      </button>
      <button class="apt-mass-cancel-btn" id="massCancelBtn">Cancel</button>
    </div>`;
  document.body.appendChild(overlay);

  document.getElementById('massCancelBtn').onclick=()=>overlay.remove();
  overlay.addEventListener('click',e=>{ if(e.target===overlay) overlay.remove(); });

  const setStatus=(txt,pct)=>{
    const s=document.getElementById('massStatus'); if(s) s.textContent=txt;
    const f=document.getElementById('massProgFill'); if(f) f.style.width=pct+'%';
  };

  // ── Step 1: render each mini card to canvas ──
  const CARD_W=320, CARD_H=130;
  const isDark=!document.body.classList.contains('light');
  const BG      = isDark?'#1c2030':'#ffffff';
  const SURFACE = isDark?'#141720':'#f5f6fa';
  const BORDER  = isDark?'#2a2f45':'#dde0ec';
  const TEXT    = isDark?'#e8eaf0':'#1a1d2e';
  const MUTED   = isDark?'#8891b0':'#8890b5';

  // resolve CSS color vars to actual hex for canvas
  const tabColorMap={
    'var(--blue)':   isDark?'#4f8ef7':'#2c6ef2',
    'var(--orange)': isDark?'#f7884f':'#d96b20',
    'var(--purple)': isDark?'#a78bfa':'#7c3aed',
  };
  function resolveColor(c){ return tabColorMap[c]||c; }

  const cardFiles=[];

  for(let i=0;i<entries.length;i++){
    const {c,tab}=entries[i];
    setStatus(`Rendering card ${i+1} / ${entries.length}…`, Math.round((i/entries.length)*70));

    await new Promise(resolve=>setTimeout(resolve,0)); // yield to UI

    const canvas=document.createElement('canvas');
    canvas.width=CARD_W*2; canvas.height=CARD_H*2; // @2x
    const ctx=canvas.getContext('2d');
    ctx.scale(2,2);

    const tabColor=resolveColor(tab.color||'var(--blue)');

    // card background
    ctx.fillStyle=BG;
    ctx.beginPath(); roundRect(ctx,0,0,CARD_W,CARD_H,12); ctx.fill();

    // left color accent bar
    ctx.fillStyle=tabColor;
    ctx.beginPath(); roundRect(ctx,0,0,4,CARD_H,12); ctx.fill();
    ctx.fillRect(4,0,1,CARD_H);

    // tab label pill
    ctx.fillStyle=tabColor+'22';
    ctx.beginPath(); roundRect(ctx,14,10,72,16,6); ctx.fill();
    ctx.fillStyle=tabColor;
    ctx.font='bold 9px sans-serif';
    ctx.fillText((tab.icon+' '+tab.label).slice(0,14), 18, 21);

    // patient name
    ctx.fillStyle=TEXT;
    ctx.font='bold 15px sans-serif';
    const nameStr=(c.patientName||'—').slice(0,28);
    ctx.fillText(nameStr, 14, 46);

    // meta line
    ctx.fillStyle=MUTED;
    ctx.font='11px monospace';
    const metaParts=[];
    if(c.age) metaParts.push('🎂 '+c.age+'y');
    if(c.bed) metaParts.push('🛏 Bed '+c.bed);
    if(c.doa) metaParts.push('📅 '+fmtDate(c.doa));
    ctx.fillText(metaParts.join('   '), 14, 64);

    // dx
    if(c.dx){
      ctx.fillStyle=MUTED;
      ctx.font='10px sans-serif';
      ctx.fillText('Dx: '+(c.dx||'').slice(0,42), 14, 80);
    }

    // status badge
    const statusColors={'Stable':'#4fd9a0','Improving':'#4f8ef7','Unstable':'#f75f5f','Critical':'#f7884f'};
    if(c.status && statusColors[c.status]){
      const sc=statusColors[c.status];
      ctx.fillStyle=sc+'33';
      ctx.beginPath(); roundRect(ctx,CARD_W-70,10,60,16,6); ctx.fill();
      ctx.fillStyle=sc;
      ctx.font='bold 9px sans-serif';
      ctx.textAlign='center';
      ctx.fillText(c.status, CARD_W-40, 21);
      ctx.textAlign='left';
    }

    // photo thumbnail (if exists)
    if(c.photos&&c.photos.length){
      await new Promise(res=>{
        const im=new Image();
        im.onload=()=>{
          // draw rounded thumbnail at right
          const tx=CARD_W-88, ty=10, tw=80, th=CARD_H-20;
          ctx.save();
          ctx.beginPath(); roundRect(ctx,tx,ty,tw,th,8); ctx.clip();
          ctx.drawImage(im,tx,ty,tw,th);
          ctx.restore();
          // photo count badge
          if(c.photos.length>1){
            ctx.fillStyle='rgba(0,0,0,.6)';
            ctx.beginPath(); roundRect(ctx,tx+tw-22,ty+th-16,22,16,4); ctx.fill();
            ctx.fillStyle='#fff';
            ctx.font='bold 9px monospace';
            ctx.textAlign='center';
            ctx.fillText('+'+c.photos.length, tx+tw-11, ty+th-5);
            ctx.textAlign='left';
          }
          res();
        };
        im.onerror=()=>res();
        im.src=c.photos[0];
      });
    }

    // bottom divider
    ctx.strokeStyle=BORDER;
    ctx.lineWidth=0.5;
    ctx.beginPath(); ctx.moveTo(14,CARD_H-18); ctx.lineTo(CARD_W-14,CARD_H-18); ctx.stroke();

    // added by
    if(c.addedBy){
      ctx.fillStyle=MUTED;
      ctx.font='9px monospace';
      ctx.fillText('👤 '+c.addedBy, 14, CARD_H-6);
    }

    // watermark
    ctx.fillStyle=MUTED+'88';
    ctx.font='8px monospace';
    ctx.textAlign='right';
    ctx.fillText('MUH Plastic Surgery', CARD_W-10, CARD_H-6);
    ctx.textAlign='left';

    // convert canvas to File
    const blob=await new Promise(res=>canvas.toBlob(res,'image/jpeg',0.92));
    const fname=(c.patientName||'patient').replace(/\s+/g,'_')+'_'+tab.id+'.jpg';
    cardFiles.push(new File([blob], fname, {type:'image/jpeg'}));
  }

  // ── Step 2: build text summary ──
  setStatus('Building summary…', 75);
  const today=new Date().toLocaleDateString('en-GB');
  let summary=`🏥 *MUH Plastic Surgery*\n📅 ${today} | Total: ${entries.length} patients\n`;
  TABS.forEach(tab=>{
    const pts=entries.filter(e=>e.tab.id===tab.id);
    if(!pts.length) return;
    summary+=`\n${tab.icon} *${tab.label}* (${pts.length})\n${'─'.repeat(20)}\n`;
    pts.forEach(({c})=>{
      const parts=[c.patientName||'—'];
      if(c.age) parts.push(c.age+'y');
      if(c.bed) parts.push('Bed '+c.bed);
      if(c.doa) parts.push('DOA: '+fmtDate(c.doa));
      if(c.status) parts.push(c.status);
      summary+='• '+parts.join(' | ')+'\n';
    });
  });
  summary+=`\n_Sent from MUH Plastic Handover_`;

  setStatus(`Ready — ${cardFiles.length} cards + summary`, 100);

  // ── Step 3: enable send button ──
  const sendBtn=document.getElementById('massSendBtn');
  if(sendBtn){
    sendBtn.disabled=false;
    sendBtn.onclick=async()=>{
      sendBtn.disabled=true;
      sendBtn.textContent='Sending…';

      // Browser detection
      const ua = navigator.userAgent;
      const isFirefox = ua.includes('Firefox') || ua.includes('FxiOS');
      const canNativeShare = !isFirefox && navigator.canShare && navigator.canShare({files: cardFiles});

      // Strategy:
      // • Android Chrome / iOS Safari → native share sheet with images
      // • Firefox (any) / desktop → text-only WhatsApp link (no annoying download prompts)
      if (canNativeShare) {
        try {
          await navigator.share({ files: cardFiles, title: 'MUH Plastic Surgery Patients', text: summary });
          toast('✅ Shared successfully!', 2200);
          overlay.remove();
          return;
        } catch(e) {
          if (e.name === 'AbortError') {
            sendBtn.disabled = false;
            sendBtn.textContent = 'Send via WhatsApp';
            return;
          }
          // Permission denied or other error → fall through to text-only
        }
      }

      // Text-only WhatsApp fallback (Firefox, desktop browsers, share API failed)
      setStatus('Opening WhatsApp…', 90);
      window.open('https://wa.me/?text=' + encodeURIComponent(summary), '_blank');
      setStatus('Done ✅', 100);
      toast('✅ WhatsApp opened with patient summary', 3000);
      setTimeout(() => overlay.remove(), 1200);
    };
  }
}

// helper: canvas rounded rect
function roundRect(ctx,x,y,w,h,r){
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

function renderList(){
  const list = document.getElementById('casesList');
  if (currentTab === '__allpatients__') { renderAllPatients(list); return; }
  if (currentTab === '__todo__') { renderTodoTab(list); return; }
  if (currentTab === '__tools__') { renderTools(list); return; }
  if (currentTab === '__shift__') { renderShift(list); return; }
  if (currentTab === '__users__') { renderUsers(list); return; }
  if (currentTab === '__archive__') { renderArchive(list); return; }
  if (currentTab === '__operations__') { renderOperations(list); return; }
  if (currentTab === '__ops_arch__') { renderOpsArchive(list); return; }
  if (currentTab === '__links__') { renderLinks(list); return; }
  if (currentTab === '__articles__') { renderArticles(list); return; }
  if (currentTab === '__actlog__') { renderActLog(list); return; }
  if (currentTab === '__chat__') { renderChat(list); return; }
  if (currentTab === '__tutorial__') { renderTutorial(list); return; }

  const cases = getCases();
  let arr = (cases[currentTab]||[]).filter(Boolean);

  // filter
  if (_filter==='flagged') arr=arr.filter(c=>c.flagged);
  else if (_filter==='operated') arr=arr.filter(c=>c.handOperated||c.maxOperated||c.stOperated);
  else if (_filter==='today') { const today=new Date().toDateString(); arr=arr.filter(c=>c.addedAt&&new Date(c.addedAt).toDateString()===today); }
  else if (_filter==='week') { const w=Date.now()-7*24*3600*1000; arr=arr.filter(c=>c.addedAt&&new Date(c.addedAt).getTime()>=w); }
  else if (_filter==='has_images') arr=arr.filter(c=>(c.photos||[]).length>0);
  else if (_filter==='has_comments') arr=arr.filter(c=>(c.comments||[]).length>0);
  else if (_filter==='no_bed') arr=arr.filter(c=>!c.bed||!c.bed.trim());
  else if (_filter && _filter!=='all') arr=arr.filter(c=>c.status===_filter);

  // search
  if (_search) {
    const q=_search.toLowerCase();
    arr=arr.filter(c=>(c.patientName||'').toLowerCase().includes(q)||(c.bed||'').toLowerCase().includes(q)||(c.dx||'').toLowerCase().includes(q)||(c.addedBy||'').toLowerCase().includes(q));
  }

  // sort
  if (_sortMode==='name') arr.sort((a,b)=>(a.patientName||'').localeCompare(b.patientName||''));
  else if (_sortMode==='bed') arr.sort((a,b)=>(a.bed||'').localeCompare(b.bed||''));
  else if (_sortMode==='status') arr.sort((a,b)=>(a.status||'').localeCompare(b.status||''));
  else if (_sortMode==='flagged') arr.sort((a,b)=>(b.flagged?1:0)-(a.flagged?1:0));

  list.innerHTML='';
  if (!arr.length) {
    list.innerHTML=`<div class="empty"><div class="empty-icon">📋</div><div class="empty-title">No cases</div><div class="empty-sub">Tap + to add a case</div></div>`;
    return;
  }
  arr.forEach(c=>{ list.appendChild(makeCaseCard(c)); });
}

function makeCaseCard(c){
  const wrapper = document.createElement('div');
  wrapper.className='swipe-wrapper'+((_selMode&&_selIds.has(c._id))?' sel-on':'');
  wrapper.dataset.id=c._id;

  const bgLeft=document.createElement('div'); bgLeft.className='swipe-bg-left'; bgLeft.textContent='✎';
  const bgRight=document.createElement('div'); bgRight.className='swipe-bg-right'; bgRight.textContent='🗂';
  wrapper.appendChild(bgLeft);
  wrapper.appendChild(bgRight);

  const card=document.createElement('div');
  card.className='case-card'+(c.flagged?' flagged':'');

  // virology — stored as string "HBV+, HCV+" but may be Array after backup restore
  const virolRaw = c.virology;
  const virolArr = Array.isArray(virolRaw)
    ? virolRaw
    : (virolRaw ? String(virolRaw).split(',').map(v=>v.trim()).filter(Boolean) : []);
  const virolHtml = virolArr.map(v=>`<span class="vtag">${esc(v)}</span>`).join('');

  // labs
  const labKeys=['hb','plt','wbc','albumin','inr','abg','cr','crp','esr','ast','alt','procal'];
  const latestLab = (c.labEntries||[]).slice().sort((a,b)=>b.date.localeCompare(a.date))[0];
  const labHtml = latestLab ? labKeys.filter(k=>latestLab[k]).map(k=>labChipHtml(k,latestLab[k])).join('') : '';

  // spec tags
  let specTag='';
  if (HAND_TABS.includes(currentTab)&&c.handOperated) specTag=`<span class="spec-tag">${esc(c.handOperated)}</span>`;
  if (MAXFAC_TABS.includes(currentTab)&&c.maxCategory) specTag=`<span class="spec-tag">${esc(c.maxCategory)}</span>`;
  if (ST_TABS.includes(currentTab)&&c.stOperated) specTag=`<span class="spec-tag">${esc(c.stOperated)}</span>`;

  const commentCount=(c.comments||[]).length;
  const isFol=isFollowed(c._id);

  card.innerHTML=`
    <div class="card-top">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:6px">
        <div>
          <div class="card-name${c.flagged?' flagged':''}">${esc(c.patientName)}</div>
          <div class="card-meta">
            <span class="card-bed">🛏 ${esc(c.bed)}</span>
            ${c.age?`<span>${esc(c.age)}y</span>`:''}
            ${c.doa?`<span>· ${fmtDate(c.doa)}</span>`:''}
            ${specTag}
            ${c.addedBy?`<span>👤 ${esc(c.addedBy)}</span>`:''}
            ${c.editedBy?`<span>✏️ ${esc(c.editedBy)}</span>`:''}
          </div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0">
          ${statusBadgeHtml(c.status)}
        </div>
      </div>
      ${virolHtml?`<div style="margin-top:4px">${virolHtml}</div>`:''}

// ═══════════════════════════════════════════════════════
// 8. SWIPE
// ═══════════════════════════════════════════════════════
function initSwipe(wrapper, c){
  const card = wrapper.querySelector('.case-card');
  const bgL = wrapper.querySelector('.swipe-bg-left');
  const bgR = wrapper.querySelector('.swipe-bg-right');
  let startX=0, startY=0, curX=0, swiping=false, locked=false;
  const THRESHOLD=70;

  card.addEventListener('pointerdown', e=>{
    if (_selMode) return;
    startX=e.clientX; startY=e.clientY; curX=0; swiping=false; locked=false;
    card.setPointerCapture(e.pointerId);
  },{passive:true});

  card.addEventListener('pointermove', e=>{
    if (locked) return;
    const dx=e.clientX-startX, dy=e.clientY-startY;
    if (!swiping && Math.abs(dy)>Math.abs(dx)*1.2) { locked=true; return; }
    if (!swiping && Math.abs(dx)>8) swiping=true;
    if (!swiping) return;
    curX=dx;
    card.style.transition='none';
    card.style.transform=`translateX(${Math.sign(dx)*Math.min(Math.abs(dx),120)}px)`;
    bgL.style.opacity = dx<-20 ? Math.min((-dx-20)/50,1) : 0;
    bgR.style.opacity = dx>20  ? Math.min((dx-20)/50,1) : 0;
  },{passive:true});

  card.addEventListener('pointerup', ()=>{
    if (!swiping) return;
    card.style.transition='';
    card.style.transform='';
    bgL.style.opacity=0; bgR.style.opacity=0;
    if (curX < -THRESHOLD) editCase(c._id);        // swipe left → edit
    else if (curX > THRESHOLD) archiveCase(c._id); // swipe right → archive
    swiping=false;
  });
  card.addEventListener('pointercancel', ()=>{
    card.style.transition=''; card.style.transform='';
    bgL.style.opacity=0; bgR.style.opacity=0; swiping=false;
  });
}

// ═══════════════════════════════════════════════════════
// 9. CASE ACTIONS
// ═══════════════════════════════════════════════════════
function archiveCase(id){
  const cases=getCases(); const arr=cases[currentTab]||[];
  const idx=arr.findIndex(c=>c&&c._id===id); if(idx<0) return;
  const c=arr.splice(idx,1)[0];
  c._fromTab=currentTab; c._fromLabel=getTabLabel(currentTab);
  c._archivedAt=new Date().toISOString(); c._deletedBy=currentUser;
  const arch=getArchive(); arch.unshift(c); saveArchive(arch);
  cases[currentTab]=arr; saveCases(cases);
  renderList(); updateCounts();
  toast('🗂 Archived: '+c.patientName, 2000);
  logActivity('Archived case: '+c.patientName, getTabLabel(currentTab), '🗂');
}

function deleteCase(id){
  const cases=getCases(); const arr=cases[currentTab]||[];
  const idx=arr.findIndex(c=>c&&c._id===id); if(idx<0) return;
  const name=arr[idx]?.patientName||'';
  if (!confirm('Delete this case?')) return;
  arr.splice(idx,1); cases[currentTab]=arr; saveCases(cases);
  renderList(); updateCounts(); toast('🗑 Deleted', 1800);
  logActivity('Deleted case: '+name, getTabLabel(currentTab), '🗑');
}

window.toggleFlag = function(id){
  const cases=getCases(); const arr=cases[currentTab]||[];
  const c=arr.find(c=>c&&c._id===id); if(!c) return;
  c.flagged=!c.flagged; c._rev=(c._rev||0)+1; saveCases(cases); renderList();
  toast(c.flagged?'🚨 Flagged':'Flag removed', 1600);
};

// 11. SELECTION MODE
// ═══════════════════════════════════════════════════════
function enterSel(){ _selMode=true; _selIds.clear(); updateSelBar(); renderList(); }
function exitSel(){ _selMode=false; _selIds.clear(); updateSelBar(); renderList(); }
function toggleSel(id, wrapper){
  if (_selIds.has(id)) { _selIds.delete(id); wrapper.classList.remove('sel-on'); }
  else { _selIds.add(id); wrapper.classList.add('sel-on'); }
  updateSelBar();
}
function updateSelBar(){
  const bar=document.getElementById('selBar');
  bar.classList.toggle('show', _selMode);
  document.getElementById('selCount').textContent=_selIds.size+' selected';
}
document.getElementById('selBtn').addEventListener('click',()=>_selMode?exitSel():enterSel());
document.getElementById('selCancelBtn').addEventListener('click',exitSel);
document.getElementById('selArchBtn').addEventListener('click',()=>{
  if(!_selIds.size) return;
  const cases=getCases(); const arr=cases[currentTab]||[];
  const arch=getArchive();
  [..._selIds].forEach(id=>{
    const idx=arr.findIndex(c=>c&&c._id===id); if(idx<0) return;
    const c=arr.splice(idx,1)[0];
    c._fromTab=currentTab; c._archivedAt=new Date().toISOString(); c._deletedBy=currentUser;
    arch.unshift(c);
  });
  saveArchive(arch); cases[currentTab]=arr; saveCases(cases);
  const archivedCount=_selIds.size; exitSel(); renderList(); updateCounts(); toast('🗂 Archived '+archivedCount+' cases', 2000);
});
document.getElementById('selDelBtn').addEventListener('click',()=>{
  if(!_selIds.size) return;
  if(!confirm('Delete '+_selIds.size+' cases?')) return;
  const cases=getCases(); const arr=cases[currentTab]||[];
  cases[currentTab]=arr.filter(c=>!_selIds.has(c._id));
  saveCases(cases); exitSel(); renderList(); updateCounts(); toast('🗑 Deleted', 1800);
});
document.getElementById('selMoveBtn').addEventListener('click',()=>{
  if(!_selIds.size) return;
  const body=document.getElementById('moveBody');
  body.innerHTML='';
  TABS.filter(t=>t.id!==currentTab).forEach(t=>{
    const btn=document.createElement('button');
    btn.className='sel-action-btn';
    btn.style.cssText='width:100%;height:44px;border-radius:12px;margin-bottom:8px;font-size:.88rem;display:flex;align-items:center;gap:8px;padding:0 14px';
    btn.innerHTML=t.icon+' '+t.label;
    btn.onclick=()=>{
      const cases=getCases();
      const srcArr=cases[currentTab]||[];
      if(!cases[t.id]) cases[t.id]=[];
      [..._selIds].forEach(id=>{
        const idx=srcArr.findIndex(c=>c&&c._id===id); if(idx<0) return;
        const c=srcArr.splice(idx,1)[0];
        c.editedBy=currentUser; c.editedByDevId=currentDevId; c.editedAt=new Date().toISOString();
        cases[t.id].push(c);
      });
      cases[currentTab]=srcArr; saveCases(cases);
      closeOverlay('moveOverlay'); exitSel(); renderList(); updateCounts();
      toast('↗ Moved to '+t.label, 2000);
    };
    body.appendChild(btn);
  });
  openOverlay('moveOverlay');
});

function initFormEvents(){
  // toggle groups
  document.querySelectorAll('#sheetBody .toggle-group').forEach(grp=>{
    grp.addEventListener('click',e=>{
      const btn=e.target.closest('.toggle-btn'); if(!btn) return;
      const id=grp.id;
      if (['fg_virol'].includes(id)) {
        const val=btn.dataset.val;
        const cleanVals=['Clean','Unknown'];
        const infVals=['HBV+','HCV+','HIV+'];
        if(cleanVals.includes(val)){
          // deselect all infection buttons
          grp.querySelectorAll('.toggle-btn').forEach(b=>{ if(infVals.includes(b.dataset.val)) b.classList.remove('on'); });
          btn.classList.toggle('on');
        } else if(infVals.includes(val)){
          // deselect Clean/Unknown
          grp.querySelectorAll('.toggle-btn').forEach(b=>{ if(cleanVals.includes(b.dataset.val)) b.classList.remove('on'); });
          btn.classList.toggle('on');
        }
        _formState.virology=Array.from(grp.querySelectorAll('.toggle-btn.on')).map(b=>b.dataset.val);
      } else {
        grp.querySelectorAll('.toggle-btn').forEach(b=>b.classList.remove('on'));
        btn.classList.add('on');
        if (id==='fg_status')     _formState.status=btn.dataset.val;
        else if (id==='fg_handOp'){
          _formState.handOperated=btn.dataset.val;
          // show surgeon field if operated
          const wrap=document.getElementById('fg_surgeon_wrap');
          if(wrap) wrap.style.display=btn.dataset.val.startsWith('Yes')?'block':'none';
        }
        else if (id==='fg_maxCat')  _formState.maxCategory=btn.dataset.val;
        else if (id==='fg_stOp')    _formState.stOperated=btn.dataset.val;
        else if (id==='fg_nvArterial') _formState.nvArterial=btn.dataset.val;
        else if (id==='fg_nvVenous')   _formState.nvVenous=btn.dataset.val;
        else if (id==='fg_nvNerve')    _formState.nvNerve=btn.dataset.val;
        else if (id==='fg_facialN')    _formState.facialN=btn.dataset.val;
      }
    });
  });

  // pre-op
  const preList=document.getElementById('f_preop_list');
  if (preList && !preList.children.length) {
    if (!_formState.preOp.length) _formState.preOp=PREOP_DEFAULTS.map(l=>({label:l,done:false}));
    renderPreOp();
  }

  // ── LAB SYSTEM (fixed core + dynamic extras) ──
  document.getElementById('lab_date').valueAsDate=new Date();
  window._labPending={};
  function _refreshLabPending(){
    const el=document.getElementById('lab_pending'); if(!el) return;
    const keys=Object.keys(window._labPending);
    el.innerHTML=keys.map(k=>`<span style="display:inline-flex;align-items:center;gap:3px;background:var(--blue-glow);color:var(--blue);border:1px solid rgba(79,142,247,.3);border-radius:6px;padding:2px 7px;font-family:var(--mono);font-size:.62rem">${esc(k)}: <strong>${esc(window._labPending[k])}</strong> <span style="cursor:pointer;color:var(--red);margin-left:2px" onclick="delete window._labPending['${k}'];_refreshLabPending_()">✕</span></span>`).join('');
  }
  window._refreshLabPending_=function(){ _refreshLabPending(); };

  document.getElementById('lab_add_btn').addEventListener('click',()=>{
    const name=(document.getElementById('lab_custom_name').value||'').trim();
    const val=(document.getElementById('lab_custom_val').value||'').trim();
    if(!name||!val){toast('⚠️ Enter name and value',1600);return;}
    window._labPending[name]=val;
    document.getElementById('lab_custom_name').value='';
    document.getElementById('lab_custom_val').value='';
    _refreshLabPending();
  });
  document.getElementById('lab_custom_val').addEventListener('keydown',e=>{ if(e.key==='Enter') document.getElementById('lab_add_btn').click(); });

  document.getElementById('lab_save_entry_btn').addEventListener('click',()=>{
    const date=document.getElementById('lab_date').value||new Date().toISOString().slice(0,10);
    const hb=(document.getElementById('lab_hb')?.value||'').trim();
    const wbc=(document.getElementById('lab_wbc')?.value||'').trim();
    const plt=(document.getElementById('lab_plt')?.value||'').trim();
    const inr=(document.getElementById('lab_inr')?.value||'').trim();
    const alb=(document.getElementById('lab_alb')?.value||'').trim();
    const crp=(document.getElementById('lab_crp')?.value||'').trim();
    const cr=(document.getElementById('lab_cr')?.value||'').trim();
    const na=(document.getElementById('lab_na')?.value||'').trim();
    const k=(document.getElementById('lab_k')?.value||'').trim();
    const procal=(document.getElementById('lab_procal')?.value||'').trim();
    const entry={date};
    if(hb) entry.Hb=hb;
    if(wbc) entry.WBCs=wbc;
    if(plt) entry.Plt=plt;
    if(inr) entry.INR=inr;
    if(alb) entry.Alb=alb;
    if(crp) entry.CRP=crp;
    if(cr) entry['S.Cr']=cr;
    if(na) entry.Na=na;
    if(k) entry.K=k;
    if(procal) entry.Procal=procal;
    Object.assign(entry, window._labPending);
    const vals=Object.keys(entry).filter(k=>k!=='date');
    if(!vals.length){toast('⚠️ Enter at least one value',1600);return;}
    _formState.labEntries.push(entry);
    window._labPending={};
    _refreshLabPending();
    // clear fields
    ['lab_hb','lab_wbc','lab_plt','lab_inr','lab_alb','lab_crp','lab_cr','lab_na','lab_k','lab_procal','lab_custom_name','lab_custom_val'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
    renderLabsList();
    toast('✅ Lab entry saved',1400);
  });

  // ── BURN DRESSING items ──
  const dressingInp=document.getElementById('dressing_inp');
  const dressingAddBtn=document.getElementById('dressing_add_btn');
  if(dressingInp&&dressingAddBtn){
    function _renderDressingList(){
      const dl=document.getElementById('f_dressing_list'); if(!dl) return;
      dl.innerHTML='';
      (_formState.dressingItems||[]).forEach((item,i)=>{
        const span=document.createElement('span');
        span.style.cssText='display:inline-flex;align-items:center;gap:4px;background:var(--orange-glow);color:var(--orange);border:1px solid rgba(247,136,79,.3);border-radius:7px;padding:2px 9px;font-size:.75rem;font-family:var(--mono)';
        span.innerHTML=`${esc(item)} <button type="button" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:12px;padding:0 2px">✕</button>`;
        span.querySelector('button').onclick=()=>{ _formState.dressingItems.splice(i,1); _renderDressingList(); };
        dl.appendChild(span);
      });
    }
    _renderDressingList();
    const addDressing=()=>{
      const v=dressingInp.value.trim(); if(!v) return;
      if(!_formState.dressingItems) _formState.dressingItems=[];
      _formState.dressingItems.push(v); dressingInp.value=''; _renderDressingList();
    };
    dressingAddBtn.addEventListener('click',addDressing);
    dressingInp.addEventListener('keydown',e=>{ if(e.key==='Enter') addDressing(); });
  }

  // ── VAC THERAPY toggle visibility ──
  const vacGrp=document.getElementById('fg_vac');
  if(vacGrp){
    vacGrp.addEventListener('click',e=>{
      const b=e.target.closest('.toggle-btn'); if(!b) return;
      vacGrp.querySelectorAll('.toggle-btn').forEach(x=>x.classList.remove('on'));
      b.classList.add('on');
      _formState.vacStatus=b.dataset.val;
      const det=document.getElementById('fg_vac_details');
      const startLbl=document.getElementById('lbl_vac_start');
      const endLbl=document.getElementById('lbl_vac_end');
      const endInp=document.getElementById('f_vac_end');
      if(det){
        if(b.dataset.val==='Active'){
          det.style.display='flex';
          if(startLbl) startLbl.style.display='';
          if(endLbl) endLbl.style.display='none';
          if(endInp) endInp.style.display='none';
        } else if(b.dataset.val==='Completed'){
          det.style.display='flex';
          if(startLbl) startLbl.style.display='';
          if(endLbl) endLbl.style.display='';
          if(endInp) endInp.style.display='';
        } else {
          det.style.display='none';
        }
      }
    });
    // init on edit
    if(_formState.vacStatus==='Active'||_formState.vacStatus==='Completed'){
      const det=document.getElementById('fg_vac_details');
      if(det){ det.style.display='flex'; }
      if(_formState.vacStatus==='Completed'){
        const endLbl=document.getElementById('lbl_vac_end');
        const endInp=document.getElementById('f_vac_end');
        if(endLbl) endLbl.style.display='';
        if(endInp) endInp.style.display='';
      }
    }
  }

  // meds
  document.getElementById('med_add_btn').addEventListener('click',addMed);
  document.getElementById('med_freq').addEventListener('keydown',e=>{ if(e.key==='Enter') addMed(); });

  // todos
  document.getElementById('todo_add_btn').addEventListener('click',addTodo);
  document.getElementById('todo_inp').addEventListener('keydown',e=>{ if(e.key==='Enter') addTodo(); });

  // photos
  const photoGrid=document.getElementById('f_photos_grid');
  renderPhotoGrid();
  const addPhotoBtn=document.createElement('button');
  addPhotoBtn.type='button'; addPhotoBtn.className='photo-add-btn'; addPhotoBtn.textContent='+';
  addPhotoBtn.onclick=()=>document.getElementById('photoFileInput').click();
  photoGrid.appendChild(addPhotoBtn);
  document.getElementById('photoFileInput').addEventListener('change',function(){
    const rem=MAX_PHOTOS-_formState.photos.length;
    if(rem<=0){toast('Max '+MAX_PHOTOS+' photos',1600);return;}
    const files=Array.from(this.files).slice(0,rem);
    this.value='';
    let loaded=0;
    files.forEach(f=>{
      const r=new FileReader();
      r.onload=e2=>{
        // Compress image to max 900px wide/tall at 72% JPEG quality
        // Raw photos are 1-5MB; this brings each down to ~50-100KB
        const img=new Image();
        img.onload=()=>{
          const MAX_DIM=900, QUALITY=0.72;
          let w=img.width, h=img.height;
          if(w>MAX_DIM||h>MAX_DIM){
            if(w>h){ h=Math.round(h*MAX_DIM/w); w=MAX_DIM; }
            else    { w=Math.round(w*MAX_DIM/h); h=MAX_DIM; }
          }
          const canvas=document.createElement('canvas');
          canvas.width=w; canvas.height=h;
          canvas.getContext('2d').drawImage(img,0,0,w,h);
          const compressed=canvas.toDataURL('image/jpeg',QUALITY);
          _formState.photos.push(compressed);
          loaded++;
          if(loaded===files.length) renderPhotoGrid();
        };
        img.onerror=()=>{ loaded++; if(loaded===files.length) renderPhotoGrid(); };
        img.src=e2.target.result;
      };
      r.readAsDataURL(f);
    });
  });
}

function renderPreOp(){
  const list=document.getElementById('f_preop_list'); if(!list) return;
  list.innerHTML='';
  _formState.preOp.forEach((item,i)=>{
    const row=document.createElement('div');
    row.style.cssText='display:flex;align-items:center;gap:8px;padding:4px 0;font-size:.82rem;color:var(--text-dim)';
    const cb=document.createElement('input'); cb.type='checkbox'; cb.checked=item.done;
    cb.onchange=()=>{ _formState.preOp[i].done=cb.checked; };
    row.appendChild(cb); row.appendChild(document.createTextNode(item.label));
    list.appendChild(row);
  });
}

function renderLabsList(){
  const list=document.getElementById('f_labs_list'); if(!list) return;
  list.innerHTML='';
  _formState.labEntries.slice().sort((a,b)=>(b.date||'').localeCompare(a.date||'')).forEach((e,i)=>{
    // build chips for all keys except 'date'
    const chips=Object.entries(e).filter(([k])=>k!=='date'&&e[k]).map(([k,v])=>labChipHtml(k,v)).join('');
    const div=document.createElement('div');
    div.style.cssText='display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--border);flex-wrap:wrap';
    div.innerHTML=`<span style="font-family:var(--mono);font-size:.6rem;color:var(--text-muted);min-width:54px;flex-shrink:0">${fmtDate(e.date)}</span><div style="flex:1;display:flex;flex-wrap:wrap;gap:2px">${chips}</div><button type="button" style="margin-left:auto;background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:13px;flex-shrink:0" data-labidx="${i}">✕</button>`;
    div.querySelector('button').onclick=()=>{ _formState.labEntries.splice(_formState.labEntries.indexOf(e),1); renderLabsList(); };
    list.appendChild(div);
  });
}

function addMed(){
  const name=document.getElementById('med_name').value.trim();
  if (!name) return;
  _formState.meds.push({name, dose:document.getElementById('med_dose').value.trim(), freq:document.getElementById('med_freq').value.trim()});
  ['med_name','med_dose','med_freq'].forEach(id=>document.getElementById(id).value='');
  renderMedsList();
}
function renderMedsList(){
  const list=document.getElementById('f_meds_list'); if(!list) return;
  list.innerHTML='';
  _formState.meds.forEach((m,i)=>{
    const span=document.createElement('span'); span.className='med-chip';
    span.style.cursor='pointer';
    span.innerHTML=`${esc(m.name)}${m.dose?' · '+esc(m.dose):''}${m.freq?' · '+esc(m.freq):''}  <span style="color:var(--red)">✕</span>`;
    span.querySelector('span').onclick=()=>{ _formState.meds.splice(i,1); renderMedsList(); };
    list.appendChild(span);
  });
}

function addTodo(){
  const text=document.getElementById('todo_inp').value.trim(); if(!text) return;
  _formState.todos.push({text,done:false});
  document.getElementById('todo_inp').value='';
  renderTodosList();
}
function renderTodosList(){
  const list=document.getElementById('f_todos_list'); if(!list) return;
  list.innerHTML='';
  _formState.todos.forEach((t,i)=>{
    const div=document.createElement('div'); div.className='todo-item';
    div.style.cursor='pointer';
    div.innerHTML=`${t.done?'✅':'⬜'} ${esc(t.text)} <span style="margin-left:auto;color:var(--red);font-size:12px">✕</span>`;
    div.onclick=()=>{ _formState.todos[i].done=!t.done; renderTodosList(); };
    div.querySelector('span').onclick=e=>{ e.stopPropagation(); _formState.todos.splice(i,1); renderTodosList(); };
    list.appendChild(div);
  });
}

function renderPhotoGrid(){
  const grid=document.getElementById('f_photos_grid'); if(!grid) return;
  const addBtn=grid.querySelector('.photo-add-btn');
  Array.from(grid.querySelectorAll('.photo-thumb-wrap')).forEach(el=>el.remove());
  _formState.photos.forEach((src,i)=>{
    const wrap=document.createElement('div'); wrap.className='photo-thumb-wrap';
    wrap.innerHTML=`<img class="photo-thumb" src="${src}" onclick="openLightbox('${src}')"><button class="photo-del" type="button">✕</button>`;
    wrap.querySelector('.photo-del').onclick=()=>{ _formState.photos.splice(i,1); renderPhotoGrid(); };
    if (addBtn) grid.insertBefore(wrap,addBtn); else grid.appendChild(wrap);
  });
}

function openCaseForm(id=null){
  _editId=id;
  const isNew=id===null;
  document.getElementById('sheetTitle').textContent=isNew?'Add Case':'Edit Case';
  document.getElementById('sheetMode').textContent=isNew?'NEW':'EDIT';
  document.getElementById('submitBtn').textContent=isNew?'Add Case':'Update Case';
  document.getElementById('submitBtn').className='submit-btn'+(isNew?'':' edit-mode');

  if (isNew) {
    _formState={todos:[],meds:[],cultures:[],preOp:[],labEntries:[],virology:[],status:'',photos:[],handOperated:'',nvArterial:'',nvVenous:'',nvNerve:'',maxCategory:'',maxOperated:'',facialN:'',bite:'',opening:'',ophtho:'',stOperated:'',vacStatus:'',vacStartDate:'',vacEndDate:'',burnCompartments:[],surgeonHand:'',dressingItems:[]};
  } else {
    const cases=getCases(); const arr=cases[currentTab]||[];
    const c=arr.find(c=>c&&c._id===id); if(!c) return;
    _formState={
      todos:(c.todos||[]).map(t=>({...t})),
      meds:(c.medications||[]).map(m=>({...m})),
      cultures:(c.cultures||[]).slice(),
      preOp:(c.preOpItems||[]).length?(c.preOpItems||[]).map(i=>({...i})):PREOP_DEFAULTS.map(l=>({label:l,done:false})),
      labEntries:(c.labEntries||[]).slice(),
      virology:c.virology?c.virology.split(',').map(v=>v.trim()).filter(Boolean):[],
      status:c.status||'',
      photos:(c.photos||[]).slice(),
      handOperated:c.handOperated||'',
      nvArterial:c.nvArterial||'',nvVenous:c.nvVenous||'',nvNerve:c.nvNerve||'',
      maxCategory:c.maxCategory||'',maxOperated:c.maxOperated||'',facialN:c.facialN||'',
      bite:c.bite||'',opening:c.opening||'',ophtho:c.ophtho||'',
      stOperated:c.stOperated||'',vacStatus:c.vacStatus||'',vacStartDate:c.vacStartDate||'',vacEndDate:c.vacEndDate||'',
      burnCompartments:(c.burnCompartments||[]).slice(),
      surgeonHand:c.surgeonHand||'',dressingItems:(c.dressingItems||[]).slice()
    };
  }

  document.getElementById('sheetBody').innerHTML=buildFormHtml();
  initFormEvents();

  if (!isNew) {
    const cases=getCases(); const arr=cases[currentTab]||[];
    const c=arr.find(c=>c&&c._id===id);

function submitCaseForm(){
  const name=(document.getElementById('f_name')?.value||'').trim();
  if (!name) { toast('⚠️ Patient name required', 2000); document.getElementById('f_name')?.focus(); return; }

  const cases=getCases();
  const isNew=_editId===null;
  const now=new Date().toISOString();

  const caseData = {
    patientName:name,
    age:(document.getElementById('f_age')?.value||'').trim(),
    bed:(document.getElementById('f_bed')?.value||'').trim(),
    doa:(document.getElementById('f_doa')?.value||''),
    dob:(document.getElementById('f_dob')?.value||''),
    dx:(document.getElementById('f_dx')?.value||'').trim(),
    tbsa:(document.getElementById('f_tbsa')?.value||'').trim(),
    burnFluidRate:(document.getElementById('f_burnFluid')?.value||'').trim(),
    plan:(document.getElementById('f_plan')?.value||'').trim(),
    medHx:(document.getElementById('f_medhx')?.value||'').trim(),
    vitals:(document.getElementById('f_vitals')?.value||'').trim(),
    surgeon:(document.getElementById('f_surgeon')?.value||'').trim(),
    surgeonHand:(document.getElementById('f_surgeon_hand')?.value||'').trim(),
    nvArterial:_formState.nvArterial,
    nvVenous:_formState.nvVenous,
    nvNerve:_formState.nvNerve,
    facialN:_formState.facialN,
    maxOperated:(document.getElementById('f_maxOp')?.value||'').trim(),
    handOperated:_formState.handOperated,
    maxCategory:_formState.maxCategory,
    stOperated:_formState.stOperated,
    vacStatus:_formState.vacStatus,
    vacStartDate:(document.getElementById('f_vac_start')?.value||''),
    vacEndDate:(document.getElementById('f_vac_end')?.value||''),
    status:_formState.status,
    virology:_formState.virology.join(', '),
    todos:_formState.todos,
    medications:_formState.meds,
    cultures:_formState.cultures,
    preOpItems:_formState.preOp,
    labEntries:_formState.labEntries,
    photos:_formState.photos,
    burnCompartments:_formState.burnCompartments,
    dressingItems:_formState.dressingItems,
    vacSettings:(document.getElementById('f_vac_settings')?.value||'').trim(),
  };

  if (isNew) {
    caseData._id=genId();
    caseData._rev=1;                          // ← revision starts at 1
    caseData.addedBy=currentUser;
    caseData.addedByDevId=currentDevId;
    caseData.addedAt=now;
    if (!cases[currentTab]) cases[currentTab]=[];
    cases[currentTab].unshift(caseData);
  } else {
    const arr=cases[currentTab]||[];
    const idx=arr.findIndex(c=>c&&c._id===_editId);
    if (idx>=0) {
      const old=arr[idx];
      caseData._id=old._id;
      caseData._rev=(old._rev||0)+1;          // ← increment rev — last write wins
      caseData.addedBy=old.addedBy; caseData.addedByDevId=old.addedByDevId; caseData.addedAt=old.addedAt;
      caseData.editedBy=currentUser; caseData.editedByDevId=currentDevId; caseData.editedAt=now;
      caseData.flagged=old.flagged||false;
      caseData.comments=old.comments||[];
      arr[idx]=caseData;
    }
  }
  saveCases(cases);
  closeOverlay('caseOverlay');
  renderList(); updateCounts();
  toast(isNew?'✅ Case added: '+name:'✅ Updated: '+name, 2200);
  logActivity(isNew?'Added case: '+name:'Edited case: '+name, (document.getElementById('f_dx')?.value||'').trim()||getTabLabel(currentTab), isNew?'🆕':'✏️');

  // ── Sync form todos → global To-Do tab ──
  const savedId = caseData._id;
  const savedTab = currentTab;
  (_formState.todos||[]).forEach(t => {
    if (t.text) _addTodoItem(t.text, name, (TABS.find(x=>x.id===savedTab)||{}).label||savedTab, savedId, savedTab);
  });
  _refreshTodoTab();
}

function archiveOp(id){
  if(!confirm('Move this operation to archive?')) return;
  let ops=getOps(); const idx=ops.findIndex(o=>o._id===id); if(idx<0) return;
  const op=ops.splice(idx,1)[0];
  op._archivedAt=new Date().toISOString(); op._deletedBy=currentUser;
  const arch=getOpsArch(); arch.unshift(op); saveOpsArch(arch); saveOps(ops);
  updateCounts(); renderList(); toast('📁 Moved to Ops Archive',2000);
}

function restoreOp(i){
  const arch=getOpsArch(); const op=arch.splice(i,1)[0];
  delete op._archivedAt; delete op._deletedBy;
  op.restoredBy=currentUser; op.restoredAt=new Date().toISOString();
  const ops=getOps(); ops.unshift(op); saveOps(ops); saveOpsArch(arch);
  updateCounts(); renderList(); toast('↩ Restored to Ops List',2000);
}

function permDeleteOp(i){
  if(!confirm('Permanently delete this operation?')) return;
  const arch=getOpsArch(); arch.splice(i,1); saveOpsArch(arch);
  updateCounts(); renderList(); toast('🗑 Deleted permanently',1800);
}

function exportOpsPDF(){
  const ops=getOps();

  // Group by day
  const byDay={};
  ops.forEach(op=>{ const day=op.day||'غير محدد'; if(!byDay[day]) byDay[day]=[]; byDay[day].push(op); });
  const dayOrder=[...OP_DAYS,'غير محدد'];

  let rows='';
  dayOrder.forEach(day=>{
    if(!byDay[day]||!byDay[day].length) return;
    rows+=`<tr style="background:#f0f4ff"><td colspan="7" style="font-weight:700;padding:8px 12px;color:#2c6ef2;font-size:13px">📅 ${day}</td></tr>`;
    byDay[day].forEach((op,i)=>{
      rows+=`<tr>
        <td style="text-align:center;color:#888">${i+1}</td>
        <td style="font-weight:600">${op.name||'—'}</td>
        <td style="text-align:center">${op.age||'—'}</td>
        <td>${op.dx||'—'}</td>
        <td>${op.decision||'—'}</td>
        <td>${op.surgeon||'—'}</td>
        <td style="font-size:12px;color:#666">${op.date?fmtDate(op.date):'—'}</td>
      </tr>`;
    });
  });

  const html=`<!DOCTYPE html><html dir="rtl" lang="ar"><head><meta charset="UTF-8">
  <title>Ops List - MUH Plastic Surgery</title>
  <style>
    body{font-family:'Segoe UI',Arial,sans-serif;margin:0;padding:20px;color:#1a1d2e;direction:rtl}
    h1{font-size:18px;margin-bottom:4px;color:#1a1d2e}
    .sub{font-size:12px;color:#666;margin-bottom:18px}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th{background:#1a1d2e;color:#fff;padding:8px 12px;text-align:right;font-weight:600;font-size:12px}
    td{padding:7px 12px;border-bottom:1px solid #e0e0e0;text-align:right}
    tr:last-child td{border-bottom:none}
    @media print{body{padding:10px}}
  </style></head><body>
  <h1>🏥 Ops List — MUH Plastic Surgery</h1>
  <div class="sub">Exported: ${new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'})} | Total: ${ops.length} operations</div>
  <table><thead><tr><th>#</th><th>الاسم</th><th>العمر</th><th>التشخيص</th><th>القرار</th><th>الجراح</th><th>التاريخ</th></tr></thead>
  <tbody>${rows}</tbody></table>
  <scr\x69pt>window.onload=()=>window.print();<\/scr\x69pt>
  </body></html>`;

  const blob=new Blob([html],{type:'text/html'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url;
  a.download='Ops_List_MUH_'+new Date().toISOString().slice(0,10)+'.html';
  document.body.appendChild(a); a.click();
  setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); },1000);
  toast('📄 Ops List PDF exported',2000);
}

window.restoreCase=function(i){
  const arch=getArchive(); const c=arch.splice(i,1)[0]; saveArchive(arch);
  const cases=getCases(); const tab=c._fromTab||'er_hand';
  if (!cases[tab]) cases[tab]=[];
  delete c._fromTab; delete c._fromLabel; delete c._archivedAt; delete c._deletedBy;
  c.restoredBy=currentUser; c.restoredAt=new Date().toISOString();
  cases[tab].unshift(c); saveCases(cases);
  renderList(); updateCounts(); toast('↩ Restored: '+c.patientName, 2000);
};
window.permDeleteCase=function(i){
  if (!confirm('Permanently delete?')) return;
  const arch=getArchive(); arch.splice(i,1); saveArchive(arch);
  renderList(); updateCounts(); toast('🗑 Deleted permanently', 1800);
};

window.adminRemoveUser=function(devId, name){

  const users=getUsers(); delete users[devId]; _toCache('psx_users',users);

  const now=new Date().toISOString();

  db.ref('psx_data/psx_users/' + devId).remove()
    .catch(e=>console.warn('[FB] adminRemove error',e));

window.confirmDeleteUser=function(devId){

};

function buildWhatsAppSummary(){
  const sn    = getShiftNotes();
  const cases = getCases();
  const date  = new Date().toLocaleDateString('en-GB',{weekday:'long',day:'2-digit',month:'short',year:'numeric'});
  const time  = new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});

  // Helper: compact a field value for inline display
  function brief(val, maxLen){ if(!val) return ''; const s=String(val).replace(/\n/g,' ').trim(); return s.length>maxLen ? s.substring(0,maxLen)+'…' : s; }
  function row(label, val){ return val ? '    ◦ ' + label + ': ' + val : ''; }

  let lines = [];
  lines.push('🏥 *MUH Plastic Surgery — Shift Handover*');
  lines.push('📅 ' + date + '  🕐 ' + time);
  if (sn.onCallName) lines.push('👤 On-Call: *' + sn.onCallName + '*');
  lines.push('');

  TABS.forEach(tab => {
    const arr = (cases[tab.id] || []).filter(Boolean);
    if (!arr.length) return;
    lines.push('━━━━━━━━━━━━━━━━━━━━━━━━');
    lines.push(tab.icon + ' *' + tab.label + '*  (' + arr.length + ' patient' + (arr.length>1?'s':'') + ')');
    lines.push('');

    arr.forEach((c, idx) => {
      const flag = c.flagged ? '🚨 ' : '';
      const name = c.patientName || '—';
      const age  = c.age  ? c.age + 'y'  : '';
      const bed  = c.bed  ? 'Bed ' + c.bed : '';
      const meta = [age, bed].filter(Boolean).join(' · ');

      // Header line
      lines.push('  ' + (idx+1) + '. ' + flag + '*' + name + '*' + (meta?' ('+meta+')':''));

      // Status
      if (c.status) lines.push('    📊 Status: *' + c.status + '*');

      // Diagnosis
      if (c.dx) lines.push('    🔬 Dx: ' + brief(c.dx, 80));

      // Specialty-specific fields
      if (c.handOperated) lines.push('    ✋ Op: ' + c.handOperated + (c.surgeonHand?' — '+c.surgeonHand:''));
      if (c.maxCategory)  lines.push('    🦷 Category: ' + c.maxCategory + (c.maxOperated?' — '+brief(c.maxOperated,40):''));
      if (c.stOperated)   lines.push('    🩹 Op: ' + c.stOperated);

      // NV status
      const nv = [c.nvArterial&&'Art:'+c.nvArterial, c.nvVenous&&'Ven:'+c.nvVenous, c.nvNerve&&'Nerve:'+c.nvNerve].filter(Boolean).join(' · ');
      if (nv) lines.push('    🫀 NV: ' + nv);
      if (c.facialN) lines.push('    🧠 Facial N: ' + c.facialN);

      // Burn-specific
      if (c.tbsa)          lines.push('    🔥 TBSA: ' + c.tbsa + '%');
      if (c.burnFluidRate) lines.push('    💧 Fluids: ' + brief(c.burnFluidRate, 50));
      if (c.burnCompartments && c.burnCompartments.length)
        lines.push('    🗺 Areas: ' + c.burnCompartments.join(', '));

      // Vitals
      if (c.vitals) lines.push('    💓 Vitals: ' + brief(c.vitals, 60));

      // Labs (show abnormal first, then up to 5 total)
      if (c.labEntries && c.labEntries.length) {
        const abn = c.labEntries.filter(l=>l.flag==='abn');
        const normal = c.labEntries.filter(l=>l.flag!=='abn');
        const show = [...abn, ...normal].slice(0,6);
        const labStr = show.map(l=>(l.flag==='abn'?'⚠':'')+l.key+':'+l.val+(l.unit?' '+l.unit:'')).join('  ');
        if (labStr) lines.push('    🧪 Labs: ' + labStr);
      }

      // Medications
      if (c.medications && c.medications.length) {
        const meds = c.medications.slice(0,5).map(m=>m.name||(typeof m==='string'?m:'')).filter(Boolean).join(', ');
        if (meds) lines.push('    💊 Meds: ' + meds + (c.medications.length>5?' +'+( c.medications.length-5)+' more':''));
      }

      // Cultures
      if (c.cultures && c.cultures.length) {
        const cx = c.cultures.map(cu=>(cu.site||'?')+':'+(cu.result||'?')+(cu.organism?' ('+cu.organism+')':'')).join(' | ');
        if (cx) lines.push('    🦠 Cx: ' + cx);
      }

      // Virology
      if (c.virology) lines.push('    🧬 Virology: ' + c.virology);

      // VAC
      if (c.vacStatus) {
        let vacLine = '    🩹 VAC: ' + c.vacStatus;
        if (c.vacSettings) vacLine += ' — ' + brief(c.vacSettings, 40);
        if (c.vacStartDate) vacLine += ' (from ' + c.vacStartDate + (c.vacEndDate?' → '+c.vacEndDate:'') + ')';
        lines.push(vacLine);
      }

      // Med Hx
      if (c.medHx) lines.push('    📁 PMHx: ' + brief(c.medHx, 60));

      // Todos (pending only)
      if (c.todos && c.todos.length) {
        const pending = c.todos.filter(t=>!t.done).map(t=>t.text||t).filter(Boolean);
        if (pending.length) lines.push('    ✅ Pending: ' + pending.slice(0,4).join(' · ') + (pending.length>4?' +'+( pending.length-4):''));
      }

      // Pre-op checklist (pending items)
      if (c.preOpItems && c.preOpItems.length) {
        const notDone = c.preOpItems.filter(p=>!p.done).map(p=>p.label||p).filter(Boolean);
        if (notDone.length) lines.push('    📋 Pre-op pending: ' + notDone.join(', '));
      }

      // Plan
      if (c.plan) lines.push('    📌 Plan: ' + brief(c.plan, 100));

      // DOA / DOB
      const dates = [c.doa&&'Admitted:'+c.doa, c.dob&&'DoB:'+c.dob].filter(Boolean).join('  ');
      if (dates) lines.push('    📆 ' + dates);

      // Added by
      if (c.addedBy) lines.push('    👤 Added by: ' + c.addedBy);

      lines.push('');
    });
  });

  // Flagged summary block
  const flagged = [];
  TABS.forEach(tab => {
    (cases[tab.id]||[]).filter(c=>c&&c.flagged).forEach(c=>{
      flagged.push('  🚨 ' + (c.patientName||'—') + ' (' + tab.label + ')' + (c.plan?' → '+brief(c.plan,60):''));
    });
  });
  if (flagged.length) {
    lines.push('━━━━━━━━━━━━━━━━━━━━━━━━');
    lines.push('⚠️ *Flagged / Critical*');
    flagged.forEach(f => lines.push(f));
    lines.push('');
  }

  // Manual shift summary
  if (sn.summary && sn.summary.trim()) {
    lines.push('━━━━━━━━━━━━━━━━━━━━━━━━');
    lines.push('📋 *Shift Notes*');
    lines.push(sn.summary.trim());
    lines.push('');
  }

  // Shift log
  if (sn.log && sn.log.length) {
    lines.push('━━━━━━━━━━━━━━━━━━━━━━━━');
    lines.push('📌 *Shift Log*');
    sn.log.slice(0,15).forEach(e => {
      const t = e.ts ? new Date(e.ts).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}) : '';
      lines.push('  • [' + t + '] ' + e.text + (e.by?' ('+e.by+')':''));
    });
    lines.push('');
  }

  lines.push('━━━━━━━━━━━━━━━━━━━━━━━━');
  lines.push('_Sent via MUH Plastic Handover_');
  return lines.join('\n');
}
