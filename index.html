<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra PRO Handover Form</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  body { font-family: 'DM Sans', sans-serif; background:#f5f5f5; margin:0; padding:0;}
  .container { max-width:1200px; margin:20px auto; background:#fff; padding:20px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.1);}
  h1 { text-align:center; color:#333; }
  .tabs { display:flex; margin-bottom:20px; cursor:pointer; }
  .tab { flex:1; padding:10px; text-align:center; background:#eee; margin-right:2px; border-radius:5px 5px 0 0; }
  .tab.active { background:#ff9800; color:#fff; font-weight:700; }
  .tab-content { display:none; }
  .tab-content.active { display:block; }
  .field { margin-bottom:15px; }
  label { display:block; margin-bottom:5px; font-weight:500; }
  input[type=text], input[type=number], textarea { width:100%; padding:8px; border:1px solid #ccc; border-radius:5px; }
  textarea { resize:vertical; }
  .buttons-group button { margin:3px; padding:5px 10px; border:none; border-radius:5px; cursor:pointer; }
  .buttons-group button.active { background:#ff9800; color:#fff; }
  .todo-list { list-style:none; padding:0; }
  .todo-list li { display:flex; align-items:center; margin-bottom:5px; }
  .todo-list input[type=checkbox] { margin-right:10px; }
  .lab-table { width:100%; border-collapse:collapse; margin-top:10px; }
  .lab-table th, .lab-table td { border:1px solid #ccc; padding:5px; text-align:center; }
  .actions { margin-top:20px; display:flex; justify-content:flex-end; gap:10px; }
  .actions button { padding:10px 20px; background:#ff9800; border:none; color:#fff; border-radius:5px; cursor:pointer; }
</style>
</head>
<body>
<div class="container">
<h1>Ultra PRO Handover Form</h1>

<div class="tabs">
  <div class="tab active" data-tab="burn">Burn</div>
  <div class="tab" data-tab="hand">Hand</div>
  <div class="tab" data-tab="maxfac">Maxillo-Facial</div>
</div>

<!-- Tab Contents -->
<div class="tab-content active" id="burn">
  <div class="field"><label>Name:</label><input type="text" id="name_burn"></div>
  <div class="field"><label>Age:</label><input type="number" id="age_burn"></div>
  <div class="field"><label>Bed:</label><input type="text" id="bed_burn"></div>
  <div class="field"><label>Dx:</label><input type="text" id="dx_burn"></div>
  <div class="field"><label>TBSA in burn 🔥:</label><input type="text" id="tbsa_burn"></div>

  <div class="field">
    <label>Virology:</label>
    <div class="buttons-group" id="virology_burn">
      <button>HBsAg</button>
      <button>HCV</button>
      <button>HIV</button>
      <button>COVID</button>
    </div>
  </div>

  <div class="field">
    <label>Status:</label>
    <select id="status_burn">
      <option>Stable</option>
      <option>Improving</option>
      <option>Unstable</option>
      <option>Discharge</option>
    </select>
  </div>

  <div class="field">
    <label>Plan:</label>
    <textarea id="plan_burn" rows="3"></textarea>
  </div>

  <div class="field">
    <label>To Do:</label>
    <ul class="todo-list" id="todo_burn"></ul>
    <input type="text" id="newtodo_burn" placeholder="Add new task">
    <button onclick="addTodo('burn')">Add</button>
  </div>

  <div class="field">
    <label>Medical & Surgical Hx:</label>
    <textarea id="medhx_burn" rows="3"></textarea>
  </div>

  <div class="field">
    <label>Important Vitals:</label>
    <textarea id="vitals_burn" rows="3"></textarea>
  </div>

  <div class="field">
    <label>Important Labs:</label>
    <table class="lab-table">
      <tr><th>Hb</th><th>Plt</th><th>WBC</th><th>Albumin</th><th>INR</th></tr>
      <tr>
        <td><input type="text" id="hb_burn"></td>
        <td><input type="text" id="plt_burn"></td>
        <td><input type="text" id="wbc_burn"></td>
        <td><input type="text" id="albumin_burn"></td>
        <td><input type="text" id="inr_burn"></td>
      </tr>
    </table>
  </div>
</div>

<div class="tab-content" id="hand">
  <!-- Copy the same structure for Hand -->
  <div class="field"><label>Name:</label><input type="text" id="name_hand"></div>
  <div class="field"><label>Age:</label><input type="number" id="age_hand"></div>
  <div class="field"><label>Bed:</label><input type="text" id="bed_hand"></div>
  <div class="field"><label>Dx:</label><input type="text" id="dx_hand"></div>
  <div class="field"><label>TBSA in burn 🔥:</label><input type="text" id="tbsa_hand"></div>

  <div class="field">
    <label>Virology:</label>
    <div class="buttons-group" id="virology_hand">
      <button>HBsAg</button>
      <button>HCV</button>
      <button>HIV</button>
      <button>COVID</button>
    </div>
  </div>

  <div class="field">
    <label>Status:</label>
    <select id="status_hand">
      <option>Stable</option>
      <option>Improving</option>
      <option>Unstable</option>
      <option>Discharge</option>
    </select>
  </div>

  <div class="field">
    <label>Plan:</label>
    <textarea id="plan_hand" rows="3"></textarea>
  </div>

  <div class="field">
    <label>To Do:</label>
    <ul class="todo-list" id="todo_hand"></ul>
    <input type="text" id="newtodo_hand" placeholder="Add new task">
    <button onclick="addTodo('hand')">Add</button>
  </div>

  <div class="field">
    <label>Medical & Surgical Hx:</label>
    <textarea id="medhx_hand" rows="3"></textarea>
  </div>

  <div class="field">
    <label>Important Vitals:</label>
    <textarea id="vitals_hand" rows="3"></textarea>
  </div>

  <div class="field">
    <label>Important Labs:</label>
    <table class="lab-table">
      <tr><th>Hb</th><th>Plt</th><th>WBC</th><th>Albumin</th><th>INR</th></tr>
      <tr>
        <td><input type="text" id="hb_hand"></td>
        <td><input type="text" id="plt_hand"></td>
        <td><input type="text" id="wbc_hand"></td>
        <td><input type="text" id="albumin_hand"></td>
        <td><input type="text" id="inr_hand"></td>
      </tr>
    </table>
  </div>
</div>

<div class="tab-content" id="maxfac">
  <!-- Copy the same structure for Maxillo-Facial -->
  <div class="field"><label>Name:</label><input type="text" id="name_maxfac"></div>
  <div class="field"><label>Age:</label><input type="number" id="age_maxfac"></div>
  <div class="field"><label>Bed:</label><input type="text" id="bed_maxfac"></div>
  <div class="field"><label>Dx:</label><input type="text" id="dx_maxfac"></div>
  <div class="field"><label>TBSA in burn 🔥:</label><input type="text" id="tbsa_maxfac"></div>

  <div class="field">
    <label>Virology:</label>
    <div class="buttons-group" id="virology_maxfac">
      <button>HBsAg</button>
      <button>HCV</button>
      <button>HIV</button>
      <button>COVID</button>
    </div>
  </div>

  <div class="field">
    <label>Status:</label>
    <select id="status_maxfac">
      <option>Stable</option>
      <option>Improving</option>
      <option>Unstable</option>
      <option>Discharge</option>
    </select>
  </div>

  <div class="field">
    <label>Plan:</label>
    <textarea id="plan_maxfac" rows="3"></textarea>
  </div>

  <div class="field">
    <label>To Do:</label>
    <ul class="todo-list" id="todo_maxfac"></ul>
    <input type="text" id="newtodo_maxfac" placeholder="Add new task">
    <button onclick="addTodo('maxfac')">Add</button>
  </div>

  <div class="field">
    <label>Medical & Surgical Hx:</label>
    <textarea id="medhx_maxfac" rows="3"></textarea>
  </div>

  <div class="field">
    <label>Important Vitals:</label>
    <textarea id="vitals_maxfac" rows="3"></textarea>
  </div>

  <div class="field">
    <label>Important Labs:</label>
    <table class="lab-table">
      <tr><th>Hb</th><th>Plt</th><th>WBC</th><th>Albumin</th><th>INR</th></tr>
      <tr>
        <td><input type="text" id="hb_maxfac"></td>
        <td><input type="text" id="plt_maxfac"></td>
        <td><input type="text" id="wbc_maxfac"></td>
        <td><input type="text" id="albumin_maxfac"></td>
        <td><input type="text" id="inr_maxfac"></td>
      </tr>
    </table>
  </div>
</div>

<div class="actions">
  <button onclick="exportPDF()">Export PDF</button>
  <button onclick="saveData()">Save</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
  // Tabs
  document.querySelectorAll('.tab').forEach(tab=>{
    tab.addEventListener('click', ()=>{
      document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById(tab.dataset.tab).classList.add('active');
    });
  });

  // Virology buttons toggle
  document.querySelectorAll('.buttons-group').forEach(group=>{
    group.querySelectorAll('button').forEach(btn=>{
      btn.addEventListener('click', ()=> btn.classList.toggle('active'));
    });
  });

  // To-Do List
  function addTodo(tab){
    const input = document.getElementById('newtodo_' + tab);
    if(input.value.trim() === '') return;
    const li = document.createElement('li');
    const checkbox = document.createElement('input'); checkbox.type='checkbox';
    li.appendChild(checkbox);
    li.appendChild(document.createTextNode(input.value));
    document.getElementById('todo_' + tab).appendChild(li);
    input.value = '';
  }

  // Save to localStorage
  function saveData(){
    ['burn','hand','maxfac'].forEach(tab=>{
      const data = {
        name: document.getElementById('name_'+tab).value,
        age: document.getElementById('age_'+tab).value,
        bed: document.getElementById('bed_'+tab).value,
        dx: document.getElementById('dx_'+tab).value,
        tbsa: document.getElementById('tbsa_'+tab).value,
        plan: document.getElementById('plan_'+tab).value,
        medhx: document.getElementById('medhx_'+tab).value,
        vitals: document.getElementById('vitals_'+tab).value,
        status: document.getElementById('status_'+tab).value,
        virology: Array.from(document.querySelectorAll('#virology_'+tab+' button.active')).map(b=>b.innerText),
        todo: Array.from(document.querySelectorAll('#todo_'+tab+' li')).map(li=>({text:li.innerText, done: li.querySelector('input').checked})),
        labs: {
          hb: document.getElementById('hb_'+tab).value,
          plt: document.getElementById('plt_'+tab).value,
          wbc: document.getElementById('wbc_'+tab).value,
          albumin: document.getElementById('albumin_'+tab).value,
          inr: document.getElementById('inr_'+tab).value
        }
      };
      localStorage.setItem('handover_'+tab, JSON.stringify(data));
    });
    alert('Data saved!');
  }

  // Export PDF
  async function exportPDF(){
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    let y = 10;
    ['burn','hand','maxfac'].forEach(tab=>{
      const data = JSON.parse(localStorage.getItem('handover_'+tab) || '{}');
      if(Object.keys(data).length===0) return;
      doc.setFontSize(14); doc.text(tab.toUpperCase(), 10, y); y+=7;
      Object.entries(data).forEach(([key,val])=>{
        if(key==='virology') val = val.join(', ');
        if(key==='todo') val = val.map(t=>'[ '+(t.done?'x':' ')+' ] '+t.text).join(', ');
        if(key==='labs') val = `Hb:${val.hb} Plt:${val.plt} WBC:${val.wbc} Albumin:${val.albumin} INR:${val.inr}`;
        doc.setFontSize(10); doc.text(`${key}: ${val}`, 10, y); y+=6;
      });
      y+=10;
    });
    doc.save('handover.pdf');
  }

  // Load saved data
  window.onload = ()=>{
    ['burn','hand','maxfac'].forEach(tab=>{
      const data = JSON.parse(localStorage.getItem('handover_'+tab) || '{}');
      if(!data.name) return;
      document.getElementById('name_'+tab).value = data.name;
      document.getElementById('age_'+tab).value = data.age;
      document.getElementById('bed_'+tab).value = data.bed;
      document.getElementById('dx_'+tab).value = data.dx;
      document.getElementById('tbsa_'+tab).value = data.tbsa;
      document.getElementById('plan_'+tab).value = data.plan;
      document.getElementById('medhx_'+tab).value = data.medhx;
      document.getElementById('vitals_'+tab).value = data.vitals;
      document.getElementById('status_'+tab).value = data.status;
      document.querySelectorAll('#virology_'+tab+' button').forEach(b=>{ if(data.virology?.includes(b.innerText)) b.classList.add('active'); });
      data.todo?.forEach(t=>{
        const li = document.createElement('li');
        const checkbox = document.createElement('input'); checkbox.type='checkbox'; checkbox.checked = t.done;
        li.appendChild(checkbox);
        li.appendChild(document.createTextNode(t.text));
        document.getElementById('todo_'+tab).appendChild(li);
      });
      Object.entries(data.labs || {}).forEach(([k,v])=>{ document.getElementById(k+'_'+tab).value = v; });
    });
  }
</script>
</div>
</body>
</html>
